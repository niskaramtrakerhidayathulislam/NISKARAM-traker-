<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none !important; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 9px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .att-btn { padding: 12px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; border: none; }
        .a-active { background: #dc2626 !important; color: white !important; border: none; }
        .chat-container { height: 350px; overflow-y: auto; background: #f9fafb; padding: 10px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; max-width: 80%; padding: 10px; border-radius: 15px; font-size: 13px; }
        .msg-own { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-other { background: white; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #eee; }
        .subject-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .sub-box { background: #f1f5f9; padding: 6px; border-radius: 8px; text-align: center; font-size: 10px; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3 uppercase">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div id="holiday-banner" class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-xl hidden mb-4 text-center text-amber-900 font-bold text-sm">
                <p id="holiday-reason-text"></p>
            </div>
            <div id="admin-holiday-tool" class="card hidden border-emerald-300 bg-emerald-50">
                <p class="text-[10px] font-black text-emerald-800 uppercase mb-3 text-center">Admin Notice</p>
                <textarea id="h-reason-input" class="w-full p-3 border rounded-xl text-xs mb-3 outline-none" placeholder="Reason..."></textarea>
                <button id="h-notice-btn" class="w-full py-3 rounded-xl text-xs font-black uppercase text-white shadow-md"></button>
            </div>
            
            <div class="card mt-2 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Azan Timings</p>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase mb-4">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span id="t-asr" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span id="t-magh" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span id="t-isha" class="text-emerald-700">-</span></div>
                </div>
                <div id="admin-azan-tool" class="hidden border-t mt-4 pt-4">
                    <div class="grid grid-cols-5 gap-1 mb-3">
                        <input type="text" id="up-subhi" placeholder="Sub" class="p-1 border rounded text-[8px]">
                        <input type="text" id="up-duhar" placeholder="Duh" class="p-1 border rounded text-[8px]">
                        <input type="text" id="up-asr" placeholder="Asr" class="p-1 border rounded text-[8px]">
                        <input type="text" id="up-magh" placeholder="Mag" class="p-1 border rounded text-[8px]">
                        <input type="text" id="up-isha" placeholder="Ish" class="p-1 border rounded text-[8px]">
                    </div>
                    <button id="up-azan-btn" class="w-full bg-emerald-600 text-white py-2 rounded-lg text-[10px] font-black uppercase">Update Timings</button>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        
        <div id="results-page" class="p-5 hidden">
            <h2 class="text-center font-black text-emerald-800 uppercase mb-4 text-sm tracking-widest">Public Results 2026</h2>
            <input type="text" id="res-srch" onkeyup="searchStudent()" placeholder="Search name..." class="w-full p-4 mb-4 rounded-xl border outline-none text-sm shadow-sm bg-gray-50">
            <div id="results-list"></div>
        </div>

        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>

        <div id="profile-page" class="p-5 hidden">
            <div class="card text-center mb-4">
                <p id="profile-email" class="text-xs font-bold text-emerald-700 mb-4"></p>
                <button id="logout-btn-final" class="w-full border border-red-500 text-red-500 py-2 rounded-xl text-[10px] font-bold uppercase">Sign Out</button>
            </div>
            <div class="card p-4">
                <h3 class="text-xs font-black text-gray-500 uppercase mb-4 border-b pb-2">Live Chat</h3>
                <div id="chat-box-area" class="chat-container"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-text-input" placeholder="Message..." class="flex-1 p-2 bg-gray-100 rounded-lg text-sm outline-none border-none">
                    <button id="btn-chat-send" class="bg-emerald-700 text-white px-4 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-pg="home"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" data-pg="tracker"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" data-pg="attendance"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" data-pg="results"><i class="fa-solid fa-scroll"></i>RESULTS</div>
            <div class="nav-item" data-pg="history"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" data-pg="profile"><i class="fa-solid fa-comments"></i>CHAT</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card shadow-2xl">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase">Login</h2>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none text-sm border-none shadow-inner">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 rounded-xl mb-2 bg-gray-100 outline-none text-sm border-none shadow-inner">
            <div class="text-right mb-6"><span id="btn-forgot" class="text-[10px] text-gray-500 font-bold underline cursor-pointer uppercase">Forgot Password?</span></div>
            <button id="btn-login-final" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-4 uppercase shadow-lg">Login</button>
            <p class="text-xs font-bold text-gray-400">New parent? <span id="switch-to-signup" class="text-emerald-700 underline cursor-pointer">Create Account</span></p>
        </div>
        <div id="signup-box" class="card hidden shadow-2xl">
            <h2 class="text-xl font-black text-blue-800 mb-8 uppercase">Register</h2>
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none text-sm">
            <input type="password" id="reg-pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-gray-100 outline-none text-sm">
            <button id="btn-signup-final" class="w-full bg-blue-800 text-white font-black py-4 rounded-xl mb-4 uppercase shadow-lg">Sign Up</button>
            <p id="switch-to-login" class="text-xs font-bold text-gray-400 underline cursor-pointer uppercase text-center">Back to Login</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let globalHoliday = false;

        const fullResults = [
            { name: "MUHAMMAD SIFAN", reg: "550211", scores: { "Dur-1": "90 A", "Fiq": "77 B+", "Taj": "84 A", "Dur-2": "69 B", "Quran": "78 B+", "Prac": "92 A+" }, total: 490, remark: "DISTINCTION" },
            { name: "MUHAMMAD YASEEN", reg: "550212", scores: { "Dur-1": "68 B", "Fiq": "68 B", "Taj": "60 C+", "Dur-2": "63 B", "Quran": "72 B+", "Prac": "88 A" }, total: 419, remark: "PASSED" },
            { name: "MUHAMMAD SUHAIR", reg: "550213", scores: { "Dur-1": "80 B+", "Fiq": "76 B+", "Taj": "87 A", "Dur-2": "76 B+", "Quran": "69 B", "Prac": "95 A+" }, total: 483, remark: "DISTINCTION" },
            { name: "MUHAMMAD FAZIL", reg: "550214", scores: { "Dur-1": "81 A", "Fiq": "77 B+", "Taj": "78 B+", "Dur-2": "74 B+", "Quran": "45 C", "Prac": "94 A+" }, total: 449, remark: "PASSED" },
            { name: "TWALHATH", reg: "550215", scores: { "Dur-1": "57 C+", "Fiq": "49 C", "Taj": "52 C+", "Dur-2": "45 C", "Quran": "68 B", "Prac": "98 A++" }, total: 369, remark: "PASSED" },
            { name: "MUHAMMAD DISHAN K.A", reg: "550216", scores: { "Dur-1": "90 A", "Fiq": "89 A", "Taj": "91 A+", "Dur-2": "81 A", "Quran": "80 B+", "Prac": "98 A++" }, total: 529, remark: "DISTINCTION" },
            { name: "RASEENA", reg: "550217", scores: { "Dur-1": "60 C+", "Fiq": "58 C+", "Taj": "40 C", "Dur-2": "54 C+", "Quran": "40 C", "Prac": "98 A++" }, total: 350, remark: "PASSED" },
            { name: "NAFEESATH AIZA", reg: "550218", scores: { "Dur-1": "58 C+", "Fiq": "50 C", "Taj": "52 C+", "Dur-2": "53 C+", "Quran": "47 C", "Prac": "95 A+" }, total: 355, remark: "PASSED" },
            { name: "AFREENA", reg: "550219", scores: { "Dur-1": "76 B+", "Fiq": "76 B+", "Taj": "81 A", "Dur-2": "70 B", "Quran": "70 B", "Prac": "99 A++" }, total: 472, remark: "PASSED" },
            { name: "MISHA FATHIMA", reg: "550220", scores: { "Dur-1": "40 C", "Fiq": "47 C", "Taj": "50 C", "Dur-2": "47 C", "Quran": "44 C", "Prac": "85 A" }, total: 313, remark: "PASSED" },
            { name: "SHAKIRA", reg: "550221", scores: { "Dur-1": "96 A++", "Fiq": "96 A++", "Taj": "95 A+", "Dur-2": "91 A+", "Quran": "80 B+", "Prac": "100 A++" }, total: 558, remark: "DISTINCTION" },
            { name: "FATHIMATH RIFA", reg: "550222", scores: { "Dur-1": "75 B+", "Fiq": "72 B+", "Taj": "75 B+", "Dur-2": "66 B", "Quran": "51 C+", "Prac": "83 A" }, total: 422, remark: "PASSED" },
            { name: "SUHAIBA", reg: "550223", scores: { "Dur-1": "79 B+", "Fiq": "68 B", "Taj": "86 A", "Dur-2": "73 B+", "Quran": "50 C", "Prac": "93 A+" }, total: 449, remark: "PASSED" },
            { name: "KADEEJATHU NILA", reg: "550224", scores: { "Dur-1": "84 A", "Fiq": "70 B", "Taj": "84 A", "Dur-2": "78 B+", "Quran": "71 B+", "Prac": "100 A++" }, total: 487, remark: "DISTINCTION" },
            { name: "FATHIMATH FIDA", reg: "550225", scores: { "Dur-1": "79 B+", "Fiq": "77 B+", "Taj": "80 B+", "Dur-2": "64 B", "Quran": "73 B+", "Prac": "99 A++" }, total: 472, remark: "PASSED" }
        ];

        // --- CORE AUTH ---
        document.getElementById('switch-to-signup').onclick = () => { document.getElementById('login-box').classList.add('hidden'); document.getElementById('signup-box').classList.remove('hidden'); };
        document.getElementById('switch-to-login').onclick = () => { document.getElementById('signup-box').classList.add('hidden'); document.getElementById('login-box').classList.remove('hidden'); };
        
        document.getElementById('btn-login-final').onclick = () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if(!e || !p) return alert("Please enter email and password");
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        document.getElementById('btn-signup-final').onclick = () => {
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            if(!e || !p) return alert("Please enter email and password");
            createUserWithEmailAndPassword(auth, e, p).then(() => alert("Account Created!")).catch(err => alert(err.message));
        };

        document.getElementById('btn-forgot').onclick = () => {
            const e = document.getElementById('auth-email').value;
            if(!e) return alert("Enter your email in the box first!");
            sendPasswordResetEmail(auth, e).then(() => alert("Reset link sent to your email!")).catch(err => alert(err.message));
        };

        document.getElementById('logout-btn-final').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('profile-email').innerText = u.email;
                const isAdmin = u.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                document.getElementById('admin-holiday-tool').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-azan-tool').classList.toggle('hidden', !isAdmin);
                syncHoliday(); loadAzan(); loadChat();
                document.getElementById('global-date').value = selectedDate;
                navigate('home', document.querySelector('.nav-item'));
            }
        });

        // --- AZAN ---
        document.getElementById('up-azan-btn').onclick = () => {
            const d = { subhi: document.getElementById('up-subhi').value, duhar: document.getElementById('up-duhar').value, asr: document.getElementById('up-asr').value, magh: document.getElementById('up-magh').value, isha: document.getElementById('up-isha').value };
            setDoc(doc(db, "settings", "timings"), d, {merge: true}).then(() => alert("Updated!"));
        };

        function loadAzan() {
            onSnapshot(doc(db, "settings", "timings"), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    if(d.subhi) document.getElementById('t-subhi').innerText = d.subhi;
                    if(d.duhar) document.getElementById('t-duhar').innerText = d.duhar;
                    if(d.asr) document.getElementById('t-asr').innerText = d.asr;
                    if(d.magh) document.getElementById('t-magh').innerText = d.magh;
                    if(d.isha) document.getElementById('t-isha').innerText = d.isha;
                }
            });
        }

        // --- CHAT ---
        document.getElementById('btn-chat-send').onclick = async () => {
            const t = document.getElementById('chat-text-input').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "chats"), { sender: auth.currentUser.email, text: t, time: Timestamp.now() });
            document.getElementById('chat-text-input').value = "";
        };

        function loadChat() {
            onSnapshot(query(collection(db, "chats"), orderBy("time", "desc"), limit(50)), (snap) => {
                const b = document.getElementById('chat-box-area'); b.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data(); const isOwn = m.sender === auth.currentUser.email;
                    b.innerHTML += `<div class="msg ${isOwn ? 'msg-own' : 'msg-other'}"><p class="text-[8px] font-bold opacity-60">${m.sender.split('@')[0]}</p><p>${m.text}</p></div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }

        // --- NAVIGATION ---
        window.navigate = (page, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            ['home', 'tracker', 'attendance', 'results', 'history', 'profile'].forEach(pg => document.getElementById(pg + '-page').classList.toggle('hidden', pg !== page));
            if(page === 'results') loadResults();
            if(page === 'tracker') loadTracker();
            if(page === 'attendance') loadAttendance();
            if(page === 'history') loadHistory();
        };
        document.querySelectorAll('.nav-item').forEach(ni => { ni.onclick = () => navigate(ni.getAttribute('data-pg'), ni); });

        // --- FEATURES ---
        window.loadResults = () => {
            document.getElementById('results-list').innerHTML = fullResults.map((r, i) => `
                <div class="card result-item" onclick="document.getElementById('m-${i}').classList.toggle('hidden')">
                    <div class="flex justify-between items-center">
                        <div><p class="name text-[10px] font-black uppercase">${r.name}</p><p class="text-[8px] font-bold ${r.remark === 'DISTINCTION' ? 'text-emerald-600' : 'text-gray-400'}">${r.remark}</p></div>
                        <p class="text-lg font-black text-
