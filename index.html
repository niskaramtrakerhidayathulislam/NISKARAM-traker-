<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niskaram Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .header-bg { background-color: #065f46; color: white; }
    </style>
</head>
<body>

    <div class="header-bg p-6 rounded-b-3xl shadow-lg text-center">
        <h1 class="text-2xl font-bold">Tracker</h1>
        <p class="text-sm opacity-80">SAKLESHPUR MOSQUE</p>
    </div>

    <div class="m-4 p-6 bg-emerald-700 text-white rounded-2xl shadow-md">
        <p class="uppercase text-xs font-semibold opacity-75">Today's Date</p>
        <h2 id="currentDate" class="text-xl font-bold mt-1"></h2>
    </div>

    <div class="px-4">
        <h3 class="text-gray-700 font-bold mb-3 flex items-center">
            <span class="mr-2">🏆</span> Leaderboards
        </h3>

        <div id="studentList" class="space-y-3">
            </div>
    </div>

    <script>
        // ഇന്നത്തെ തീയതി കാണിക്കാൻ
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options);

        // നിങ്ങളുടെ വിദ്യാർത്ഥികളുടെ ലിസ്റ്റ്
        const students = ["Dishan", "Talhat", "Sifan", "Yasin", "Suhair", "Faasil"];

        const listContainer = document.getElementById('studentList');

        students.forEach((name, index) => {
            const card = `
                <div class="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between border-l-4 border-yellow-400">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-600">
                            ${name[0]}
                        </div>
                        <div>
                            <p class="font-bold text-gray-800">${name}</p>
                            <p class="text-xs text-gray-500">Class: 1</p>
                        </div>
                    </div>
                    <div class="bg-blue-50 px-3 py-1 rounded-lg text-blue-600 text-sm font-bold">
                        Points: 0
                    </div>
                </div>
            `;
            listContainer.innerHTML += card;
        });
    </script>
</body>
</html>
