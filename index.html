<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
        .p-btn { background: #f9fafb; border: 1px solid #ddd; padding: 12px 0; border-radius: 12px; font-size: 11px; font-weight: 800; width: 100%; color: #374151; }
        .p-btn.active { background: #10b981 !important; color: white !important; border-color: #059669; }
        
        /* Attendance Buttons */
        .att-btn { padding: 10px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; border: 1px solid #eee; background: #f9fafb; color: #6b7280; }
        .att-btn.p-active { background: #059669 !important; color: white !important; border: none; }
        .att-btn.a-active { background: #dc2626 !important; color: white !important; border: none; }
        .att-btn.l-active { background: #2563eb !important; color: white !important; border: none; }

        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; border-top: 1px solid #e5e7eb; z-index: 1000; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 800; color: #9ca3af; cursor: pointer; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .hidden { display: none; }
        .header-bg { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 30px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="app-ui" class="hidden">
        <div class="header-bg">
            <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
            <p id="top-date" class="text-xs font-bold text-amber-400 mt-2"></p>
        </div>

        <div class="p-4">
            <div id="tracker-page">
                <div id="tracker-list"></div>
            </div>

            <div id="attend-page" class="hidden">
                <div id="attend-list"></div>
            </div>

            <div id="stats-page" class="hidden">
                <div id="stats-list"></div>
            </div>

            <div id="profile-page" class="hidden text-center">
                <div class="card py-12">
                    <p id="user-display-email" class="text-sm font-black text-gray-600 mb-8"></p>
                    <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-black py-4 rounded-2xl uppercase text-xs">Logout</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="showPage('tracker', this)"><i class="fa fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="showPage('attend', this)"><i class="fa fa-user-clock"></i>ATTEND</div>
            <div class="nav-item" onclick="showPage('stats', this)"><i class="fa fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="showPage('profile', this)"><i class="fa fa-circle-user"></i>ME</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center bg-gray-50">
        <div class="card shadow-2xl border-none p-8 text-center">
            <h2 class="text-2xl font-black text-emerald-800 mb-6">LOGIN</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 border rounded-xl mb-4 outline-none bg-gray-50">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 border rounded-xl mb-6 outline-none bg-gray-50">
            <button onclick="handleAuth('login')" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl">ENTER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const USTHAD = "Kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];
        const today = new Date().toLocaleDateString('en-CA');

        document.getElementById('top-date').innerText = new Date().toDateString().toUpperCase();

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('app-ui').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('user-display-email').innerText = u.email;
                loadTracker();
            }
        });

        window.handleAuth = (type) => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login Failed: " + err.message));
        };

        window.handleLogout = () => signOut(auth);

        window.showPage = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            ['tracker', 'attend', 'stats', 'profile'].forEach(id => document.getElementById(id+'-page').classList.toggle('hidden', id !== p));
            if(p === 'tracker') loadTracker();
            if(p === 'attend') loadAttend();
            if(p === 'stats') loadStats();
        };

        function loadTracker() {
            const container = document.getElementById('tracker-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", today)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const sData = data[s + "_" + today] || {};
                    return `<div class="card">
                        <p class="font-black text-xs mb-3 uppercase text-emerald-900">${s}</p>
                        <div class="grid grid-cols-5 gap-1">
                            ${prayers.map(p => `<button onclick="toggleP('${s}','${p}',${!!sData[p]})" class="p-btn ${sData[p] ? 'active' : ''}">${sData[p] ? '✓' : p}</button>`).join('')}
                        </div>
                    </div>`;
                }).join('');
            });
        }

        window.toggleP = async (name, prayer, current) => {
            await setDoc(doc(db, "daily", name + "_" + today), { name, date: today, [prayer]: !current }, { merge: true });
        };

        async function loadAttend() {
            const isAdmin = auth.currentUser.email === USTHAD;
            const container = document.getElementById('attend-list');
            container.innerHTML = "<p class='text-center py-5'>Loading Attendance...</p>";
            
            onSnapshot(query(collection(db, "daily"), where("date", "==", today)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const sData = data[s + "_" + today] || {};
                    return `<div class="card">
                        <div class="flex justify-between items-center mb-3">
                            <p class="font-black text-xs uppercase">${s}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="${isAdmin ? `setA('${s}','P')` : ''}" class="att-btn ${sData.status === 'P' ? 'p-active' : ''}">PRESENT</button>
                            <button onclick="${isAdmin ? `setA('${s}','A')` : ''}" class="att-btn ${sData.status === 'A' ? 'a-active' : ''}">ABSENT</button>
                            <button onclick="${isAdmin ? `setA('${s}','L')` : ''}" class="att-btn ${sData.status === 'L' ? 'l-active' : ''}">LEAVE</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        window.setA = async (name, status) => {
            await setDoc(doc(db, "daily", name + "_" + today), { name, date: today, status: status }, { merge: true });
        };

        async function loadStats() {
            const container = document.getElementById('stats-list');
            container.innerHTML = "<p class='text-center py-5 text-xs font-bold'>CALCULATING SCORES...</p>";
            const snap = await getDocs(collection(db, "daily"));
            const scores = {}; students.forEach(s => scores[s] = 0);
            snap.forEach(d => {
                const doc = d.data();
                if(scores[doc.name] !== undefined) prayers.forEach(p => { if(doc[p]) scores[doc.name]++; });
            });
            container.innerHTML = students.sort((a,b) => scores[b]-scores[a]).map(s => `
                <div class="card flex justify-between items-center py-5">
                    <span class="font-black text-sm uppercase">${s}</span>
                    <span class="font-black text-lg text-emerald-600">${scores[s]}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
