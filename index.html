<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Connect - EduSafa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 100px; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .glass-header { background: linear-gradient(135deg, #065f46 0%, #059669 100%); color: white; border-radius: 0 0 35px 35px; padding: 30px 20px; text-align: center; position: relative; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 2000; }
        .nav-item { text-align: center; font-size: 8px; color: #94a3b8; font-weight: 800; cursor: pointer; flex: 1; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); }
        .admin-box { background: #f0fdf4; border: 1px dashed #10b981; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: none; }
        .view-page { display: none; }
        .view-page.active { display: block; }
        .p-btn-active { background-color: #10b981 !important; color: white !important; }
        .att-btn { padding: 8px 12px; border-radius: 10px; font-weight: 900; border: 2px solid #e2e8f0; font-size: 10px; min-width: 80px; text-transform: uppercase; }
        .is-present { background: #10b981 !important; color: white !important; }
        .is-absent { background: #ef4444 !important; color: white !important; }
        .date-input { background: rgba(255,255,255,0.2); border: none; color: white; font-weight: 900; font-size: 12px; padding: 6px 12px; border-radius: 10px; outline: none; }
        .badge { font-size: 9px; padding: 2px 8px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay" class="fixed inset-0 bg-emerald-900 z-[5000] flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 id="auth-title" class="text-2xl font-black text-emerald-900 mb-6 uppercase">Admin Login</h2>
            <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-4 border rounded-xl mb-3 outline-none font-bold">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border rounded-xl mb-6 outline-none font-bold">
            <button id="btn-auth-action" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-black uppercase mb-4 shadow-lg">Login</button>
            <p onclick="document.getElementById('login-overlay').classList.add('hidden')" class="text-xs font-bold text-gray-500 cursor-pointer uppercase">View Only Mode</p>
        </div>
    </div>

    <div class="glass-header shadow-lg">
        <button id="btn-logout" class="absolute right-6 top-8 text-white opacity-50 hidden"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
        <h1 id="madrasa-title-display" class="text-xl font-black uppercase text-white tracking-tighter">HIDAYATUL ISLAM MADRASA</h1>
        <div class="mt-3"><input type="date" id="global-date" class="date-input"></div>
    </div>

    <div id="home-page" class="view-page active p-4">
        <div class="card bg-emerald-700 text-white p-6">
            <p class="text-[10px] font-bold uppercase opacity-80">Notice Board</p>
            <p id="display-notice" class="text-lg font-black mt-1">Welcome to Hidayatul Islam Madrasa Portal</p>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="card text-center">
                <p class="text-[8px] font-black text-gray-400 uppercase">Status</p>
                <p id="display-status" class="text-xs font-bold text-emerald-700">Loading...</p>
            </div>
            <div class="card text-center">
                <p class="text-[8px] font-black text-gray-400 uppercase">Today's Topic</p>
                <p id="display-topic" class="text-xs font-bold text-amber-600">Loading...</p>
            </div>
        </div>

        <div class="admin-box" id="admin-home">
            <p class="text-[10px] font-bold mb-2 uppercase text-emerald-700 text-center underline">Admin Dashboard Update</p>
            <textarea id="notice-input" class="w-full p-3 border rounded-xl text-xs font-bold mb-2 outline-none" placeholder="Update Notice Board..."></textarea>
            <input type="text" id="status-input" class="w-full p-3 border rounded-xl text-xs font-bold mb-2 outline-none" placeholder="Status (eg: Madrasa Open)">
            <input type="text" id="topic-input" class="w-full p-3 border rounded-xl text-xs font-bold mb-2 outline-none" placeholder="Today's Topic (eg: Fiqh Page 10)">
            <button id="btn-post-notice" class="w-full bg-emerald-700 text-white py-3 rounded-xl text-[10px] font-black uppercase">Update Website</button>
        </div>
    </div>

    <div id="hajar-page" class="view-page p-4">
        <h2 class="text-center font-black text-emerald-900 uppercase mb-4">Attendance Register</h2>
        <div id="attendance-list" class="space-y-3"></div>
    </div>

    <div id="routine-page" class="view-page p-4">
        <h2 class="text-center font-black text-emerald-900 uppercase mb-4">Daily Routine Tracker</h2>
        <div id="routine-list" class="space-y-4"></div>
    </div>

    <div id="stats-page" class="view-page p-4">
        <div class="admin-box" id="admin-marks">
            <p class="text-[10px] font-bold mb-2 uppercase text-emerald-700 text-center">Update Student Marks</p>
            <div class="flex gap-2">
                <select id="mark-student-select" class="flex-1 p-2 border rounded text-xs font-bold"></select>
                <input type="number" id="mark-value" placeholder="Marks" class="w-20 p-2 border rounded text-xs font-bold">
                <button id="btn-save-mark" class="bg-emerald-700 text-white px-4 rounded text-[10px] font-black">SAVE</button>
            </div>
        </div>
        <div id="marks-display-list" class="space-y-3"></div>
    </div>

    <div id="fees-page" class="view-page p-4">
        <div class="admin-box" id="admin-fees">
            <p class="text-[10px] font-bold mb-2 uppercase text-emerald-700 text-center">Fee Management</p>
            <select id="fee-student-select" class="w-full p-2 border rounded text-xs font-bold mb-2"></select>
            <button id="btn-mark-paid" class="w-full bg-emerald-700 text-white py-2 rounded text-[10px] font-black uppercase">Mark as Paid</button>
        </div>
        <div id="fees-list" class="space-y-2"></div>
    </div>

    <div class="bottom-nav">
        <div onclick="navigate('home')" class="nav-item active" id="nav-home"><i class="fa-solid fa-house-chimney text-lg mb-1"></i><br>Home</div>
        <div onclick="navigate('hajar')" class="nav-item" id="nav-hajar"><i class="fa-solid fa-clipboard-user text-lg mb-1"></i><br>Hajar</div>
        <div onclick="navigate('routine')" class="nav-item" id="nav-routine"><i class="fa-solid fa-book-quran text-lg mb-1"></i><br>Routine</div>
        <div onclick="navigate('stats')" class="nav-item" id="nav-stats"><i class="fa-solid fa-chart-simple text-lg mb-1"></i><br>Marks</div>
        <div onclick="navigate('fees')" class="nav-item" id="nav-fees"><i class="fa-solid fa-file-invoice-dollar text-lg mb-1"></i><br>Fees</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection, addDoc, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Student List (Kept Exactly Same)
        const studentList = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let isUsthad = false;

        document.getElementById('global-date').value = selectedDate;
        document.getElementById('global-date').onchange = (e) => { selectedDate = e.target.value; renderAll(); };

        // Authentication State
        onAuthStateChanged(auth, user => {
            isUsthad = user && user.email === "kereemk81@gmail.com";
            document.querySelectorAll('.admin-box').forEach(b => b.style.display = isUsthad ? 'block' : 'none');
            document.getElementById('btn-logout').classList.toggle('hidden', !user);
            document.getElementById('login-overlay').classList.toggle('hidden', !!user);
            populateSelects();
            renderAll();
        });

        document.getElementById('btn-auth-action').onclick = () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login Failed: Check Credentials"));
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        function populateSelects() {
            const html = studentList.map(s => `<option value="${s}">${s}</option>`).join('');
            document.getElementById('mark-student-select').innerHTML = html;
            document.getElementById('fee-student-select').innerHTML = html;
        }

        window.navigate = (p) => {
            document.querySelectorAll('.view-page').forEach(page => page.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + p).classList.add('active');
        };

        function renderAll() {
            renderAttendance();
            renderRoutine();
            renderMarks();
            renderFees();
        }

        // --- DASHBOARD UPDATES (STATUS & TOPIC) ---
        document.getElementById('btn-post-notice').onclick = async () => {
            if(!isUsthad) return;
            const noticeTxt = document.getElementById('notice-input').value;
            const statusTxt = document.getElementById('status-input').value;
            const topicTxt = document.getElementById('topic-input').value;
            
            await setDoc(doc(db, "settings", "dashboard"), { 
                notice: noticeTxt,
                status: statusTxt,
                topic: topicTxt
            });
            alert("Dashboard Updated Successfully!");
        };

        onSnapshot(doc(db, "settings", "dashboard"), snap => {
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('display-notice').innerText = d.notice || "Welcome to Hidayatul Islam";
                document.getElementById('display-status').innerText = d.status || "Madrasa Open";
                document.getElementById('display-topic').innerText = d.topic || "Loading...";
            }
        });

        // --- ATTENDANCE LOGIC ---
        function renderAttendance() {
            const container = document.getElementById('attendance-list');
            container.innerHTML = studentList.map(name => `
                <div class="card flex justify-between items-center py-3">
                    <p class="text-sm font-black uppercase text-emerald-900">${name}</p>
                    <button onclick="toggleAttendance('${name}')" id="att-${name}" class="att-btn">MARK</button>
                </div>`).join('');
            syncAttendance();
        }

        window.toggleAttendance = async (name) => {
            if(!isUsthad) return alert("Usthad access required");
            const ref = doc(db, "daily_attendance", `${selectedDate}_${name}`);
            const snap = await getDoc(ref);
            await setDoc(ref, { name, status: (snap.exists() && snap.data().status === 'present') ? 'absent' : 'present' });
        };

        function syncAttendance() {
            studentList.forEach(name => {
                onSnapshot(doc(db, "daily_attendance", `${selectedDate}_${name}`), snap => {
                    const btn = document.getElementById(`att-${name}`);
                    if(!btn) return;
                    if(snap.exists()){
                        btn.className = `att-btn ${snap.data().status === 'present' ? 'is-present' : 'is-absent'}`;
                        btn.innerText = snap.data().status.toUpperCase();
                    } else { btn.className = "att-btn"; btn.innerText = "MARK"; }
                });
            });
        }

        // --- ROUTINE TRACKER (Quran & Study) ---
        function renderRoutine() {
            const container = document.getElementById('routine-list');
            container.innerHTML = studentList.map(name => `
                <div class="card">
                    <p class="text-xs font-black uppercase mb-3 text-emerald-800">${name}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="toggleRoutine('${name}','quran')" id="rot-${name}-quran" class="p-3 border rounded-xl text-[10px] font-bold uppercase">Quran Reading</button>
                        <button onclick="toggleRoutine('${name}','study')" id="rot-${name}-study" class="p-3 border rounded-xl text-[10px] font-bold uppercase">Subject Study</button>
                    </div>
                </div>`).join('');
            syncRoutine();
        }

        window.toggleRoutine = async (name, type) => {
            if(!isUsthad) return;
            const ref = doc(db, "routine", `${selectedDate}_${name}`);
            const snap = await getDoc(ref);
            await setDoc(ref, { [type]: !(snap.exists() && snap.data()[type]) }, { merge: true });
        };

        function syncRoutine() {
            studentList.forEach(name => {
                onSnapshot(doc(db, "routine", `${selectedDate}_${name}`), snap => {
                    const data = snap.data();
                    ['quran', 'study'].forEach(type => {
                        const btn = document.getElementById(`rot-${name}-${type}`);
                        if(btn) {
                            if(data && data[type]) btn.classList.add('p-btn-active');
                            else btn.classList.remove('p-btn-active');
                        }
                    });
                });
            });
        }

        // --- MARKS MANAGEMENT ---
        document.getElementById('btn-save-mark').onclick = async () => {
            const s = document.getElementById('mark-student-select').value;
            const v = document.getElementById('mark-value').value;
            if(s && v) {
                await setDoc(doc(db, "marks", s), { score: v, date: selectedDate });
                alert("Marks Updated for " + s);
            }
        };

        function renderMarks() {
            const container = document.getElementById('marks-display-list');
            container.innerHTML = studentList.map(name => `
                <div class="card flex justify-between items-center">
                    <span class="text-xs font-bold uppercase">${name}</span>
                    <span id="mark-val-${name}" class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg font-black text-xs">--</span>
                </div>`).join('');
            studentList.forEach(name => {
                onSnapshot(doc(db, "marks", name), snap => {
                    if(snap.exists()) document.getElementById(`mark-val-${name}`).innerText = snap.data().score;
                });
            });
        }

        // --- FEE MANAGEMENT ---
        document.getElementById('btn-mark-paid').onclick = async () => {
            const s = document.getElementById('fee-student-select').value;
            await setDoc(doc(db, "fees", s), { status: 'Paid', date: new Date().toLocaleDateString() });
            alert("Fee status updated for " + s);
        };

        function renderFees() {
            const container = document.getElementById('fees-list');
            container.innerHTML = studentList.map(name => `
                <div class="card flex justify-between items-center py-2">
                    <span class="text-[10px] font-bold uppercase">${name}</span>
                    <span id="fee-stat-${name}" class="badge bg-rose-100 text-rose-600">Pending</span>
                </div>`).join('');
            studentList.forEach(name => {
                onSnapshot(doc(db, "fees", name), snap => {
                    const el = document.getElementById(`fee-stat-${name}`);
                    if(snap.exists()) { el.innerText = "PAID"; el.className = "badge bg-emerald-100 text-emerald-600"; }
                });
            });
        }

    </script>
</body>
</html>
