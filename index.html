<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
        .msg-box { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 13px; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #065f46; color: white; border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: white; color: #1f2937; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none" onchange="changeDate(this.value)">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div id="holiday-banner" class="hidden notice-card bg-amber-50 border-l-4 border-amber-500 p-4 rounded-xl mb-4 text-amber-900 font-bold text-sm">
                <p id="holiday-reason-text"></p>
            </div>
            <div class="card text-center">
                <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest">Azan Timings</h3>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase mb-4 text-emerald-700">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span>05:15</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span>12:38</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span>03:58</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span>06:39</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span>07:49</span></div>
                </div>
            </div>
        </div>

        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="results-page" class="p-5 hidden"><div id="results-list"></div></div>
        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>

        <div id="profile-page" class="p-5 hidden text-center">
            <div class="card py-10">
                <i class="fa-solid fa-circle-user text-5xl text-emerald-700 mb-4"></i>
                <p id="user-email-text" class="text-xs font-bold text-gray-500 mb-8"></p>
                <button onclick="navigate('chat')" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl mb-4 uppercase text-[10px] flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-solid fa-comments text-lg"></i> Open Chat
                </button>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-3 rounded-xl uppercase text-[10px]">Sign Out</button>
            </div>
        </div>

        <div id="chat-page" class="hidden h-screen flex flex-col bg-white">
            <div class="bg-[#065f46] text-white p-4 flex items-center justify-between shadow-md">
                <div class="flex items-center gap-4">
                    <button onclick="navigate('profile')"><i class="fa-solid fa-arrow-left text-lg"></i></button>
                    <div>
                        <h2 class="font-black uppercase text-sm tracking-wider">Madrasa Connect</h2>
                        <p class="text-[8px] opacity-80 font-bold uppercase">Public Group Chat</p>
                    </div>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col bg-[#f8fafc]"></div>
            <div class="p-4 bg-white border-t flex gap-2">
                <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 p-4 bg-gray-100 rounded-2xl text-xs font-bold outline-none border-none">
                <button onclick="sendMessage()" class="bg-emerald-700 text-white p-4 rounded-2xl w-14 h-14 flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane text-lg"></i></button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-scroll"></i>RESULTS</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-user-circle"></i>ME</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase tracking-widest text-center">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] outline-none text-sm border-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-[#f0f4f8] outline-none text-sm border-none">
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-4 uppercase shadow-lg">Login</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Config from the screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31",
            measurementId: "G-5HG7QCXYE7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        let chatName = localStorage.getItem('madrasa_chat_name') || "";

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('user-email-text').innerText = u.email;
            }
        });

        window.navigate = (p, el) => {
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
            ['home', 'tracker', 'attendance', 'results', 'history', 'profile', 'chat'].forEach(pg => {
                const element = document.getElementById(pg + '-page');
                if(element) element.classList.toggle('hidden', pg !== p);
            });
            if(p === 'chat') {
                document.getElementById('app-header').classList.add('hidden');
                document.querySelector('.bottom-nav').classList.add('hidden');
                initChat();
            } else {
                document.getElementById('app-header').classList.remove('hidden');
                document.querySelector('.bottom-nav').classList.remove('hidden');
            }
        };

        function initChat() {
            const user = auth.currentUser;
            const isAdmin = user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
            if (isAdmin) {
                chatName = "ADMIN";
            } else if (!chatName) {
                let n = prompt("Please enter Student Name to start chatting:");
                if (n && n.trim() !== "") {
                    chatName = n.trim();
                    localStorage.setItem('madrasa_chat_name', chatName);
                } else {
                    navigate('profile');
                    return;
                }
            }
            listenMessages(isAdmin);
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            await addDoc(collection(db, "messages"), {
                sender: chatName,
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        function listenMessages(isAdmin) {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const isMe = data.sender === chatName;
                    const deleteBtn = isAdmin ? `<button onclick="deleteMsg('${d.id}')" class="text-[8px] text-red-500 font-bold ml-2">DELETE</button>` : "";
                    container.innerHTML += `
                        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2">
                            <div class="flex items-center">
                                <span class="text-[8px] font-black uppercase text-gray-400 px-1">${data.sender}</span>
                                ${deleteBtn}
                            </div>
                            <div class="msg-box ${isMe ? 'msg-me' : 'msg-them'}">
                                <p>${data.text}</p>
                            </div>
                        </div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.deleteMsg = async (id) => {
            if(confirm("Delete this message?")) {
                await deleteDoc(doc(db, "messages", id));
            }
        };

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        window.handleLogout = () => signOut(auth);
    </script>
</body>
</html>
