<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .main-card { background: linear-gradient(180deg, #064e3b 0%, #065f46 100%); border-radius: 0 0 40px 40px; padding: 30px 20px; text-align: center; position: relative; }
        .timer-box { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .student-card { background: #161b22; border-radius: 18px; padding: 18px; margin-bottom: 16px; border: 1px solid #30363d; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
        .p-btn { background: #21262d; border: 1px solid #30363d; padding: 12px 2px; border-radius: 10px; font-size: 10px; font-weight: 800; color: #c9d1d9; cursor: pointer; }
        .active { background: #10b981 !important; color: white !important; pointer-events: none; border-color: #10b981; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="main-card">
            <h2 class="text-[10px] font-bold text-emerald-200 uppercase tracking-widest">Hidayatul Islam Madrasa Achangi</h2>
            <h1 class="text-lg font-black uppercase text-white mb-2">Class 6</h1>
            
            <div class="timer-box">
                <p class="text-[10px] text-emerald-300 uppercase font-black mb-1">PRAYER TIMES (AZAN)</p>
                <div class="grid grid-cols-5 gap-1 text-[11px] font-black uppercase tracking-tighter">
                    <div class="bg-black/20 p-2 rounded-lg">SUBHI<br><span class="text-yellow-400">05:15</span></div>
                    <div class="bg-black/20 p-2 rounded-lg">DUHAR<br>12:38</div>
                    <div class="bg-black/20 p-2 rounded-lg">ASR<br>03:58</div>
                    <div class="bg-black/20 p-2 rounded-lg">MAGHRIB<br>06:39</div>
                    <div class="bg-black/20 p-2 rounded-lg">ISHA<br>07:49</div>
                </div>
            </div>
        </div>

        <div id="list" class="p-5"></div>

        <div class="p-6 text-center border-t border-gray-800 mt-10">
            <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest">Admin: Abdul Kareem Falili AL-jalali</p>
        </div>
    </div>

    <script>
        const today = new Date().toISOString().split('T')[0];
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        
        // ഫോണിൽ നിന്ന് പഴയ ഡാറ്റ എടുക്കുന്നു
        let savedData = JSON.parse(localStorage.getItem('madrassa_data')) || {};

        // പുതിയ ദിവസമാണെങ്കിൽ പഴയ ഡാറ്റ ക്ലിയർ ചെയ്യുന്നു (ഓപ്ഷണൽ)
        if (savedData.date !== today) {
            savedData = { date: today, records: {} };
        }

        function loadTracker() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            students.forEach(name => {
                listDiv.innerHTML += `
                    <div class="student-card">
                        <h3 class="font-black text-gray-100 uppercase mb-2 text-lg">${name}</h3>
                        <div class="prayer-grid">
                            ${["Subhi", "Duhar", "Asr", "Maghrib", "Isha"].map(p => {
                                const isDone = savedData.records[`${name}_${p}`];
                                return `<button id="${name}_${p}" onclick="submitP('${name}','${p}')" class="p-btn ${isDone ? 'active' : ''}">${isDone ? '✓ ' + p : p}</button>`;
                            }).join('')}
                        </div>
                    </div>`;
            });
        }

        window.submitP = (name, prayer) => {
            const btn = document.getElementById(`${name}_${prayer}`);
            if(btn.classList.contains('active')) return;

            // ഡാറ്റ ഫോണിൽ സേവ് ചെയ്യുന്നു
            savedData.records[`${name}_${prayer}`] = true;
            localStorage.setItem('madrassa_data', JSON.stringify(savedData));

            // ഗൂഗിൾ ഫോമിലേക്കും അയക്കുന്നു
            const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfoB6SzEuo4nrvGKGzdcjrvXLqFCZyu6kKyTa0mG8Gl8yUPMA/formResponse";
            const formData = new FormData();
            formData.append("entry.877237437", name);
            formData.append("entry.330346532", prayer);
            fetch(FORM_URL, { method: "POST", body: formData, mode: "no-cors" });

            btn.classList.add('active');
            btn.innerText = "✓ " + prayer;
        }

        loadTracker();
    </script>
</body>
</html>
