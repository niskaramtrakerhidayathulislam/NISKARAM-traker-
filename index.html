<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 9px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .att-btn { padding: 12px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; border: none; }
        .a-active { background: #dc2626 !important; color: white !important; border: none; }
        .chat-container { height: 400px; overflow-y: auto; background: #f9fafb; padding: 10px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; max-width: 85%; padding: 10px; border-radius: 15px; font-size: 13px; background: white; border: 1px solid #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .subject-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .sub-box { background: #f1f5f9; padding: 6px; border-radius: 8px; text-align: center; font-size: 10px; }
    </style>
</head>
<body>

    <div class="header-card">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3 uppercase">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none" onchange="changeDate(this.value)">
    </div>

    <div id="main-content" class="p-5">
        <div id="home-page">
            <div id="holiday-banner" class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-xl hidden mb-4 text-amber-900 font-bold text-sm">
                <p id="holiday-reason-text"></p>
            </div>
            
            <div class="card bg-emerald-50 border-emerald-200">
                <p class="text-[10px] font-black text-emerald-800 uppercase mb-2">Notice Board & Settings</p>
                <textarea id="h-reason-input" class="w-full p-2 border rounded-xl text-xs mb-2 outline-none" placeholder="Reason for leave..."></textarea>
                <button id="h-notice-btn" onclick="toggleGlobalHoliday()" class="w-full py-2 rounded-xl text-[10px] font-black uppercase text-white mb-4 shadow-md"></button>
                
                <div class="border-t pt-3">
                    <p class="text-[9px] font-bold text-gray-500 uppercase mb-2">Edit Azan Timings</p>
                    <div class="grid grid-cols-5 gap-1 mb-2">
                        <input type="text" id="up-subhi" placeholder="Sub" class="p-1 border rounded text-[8px] text-center">
                        <input type="text" id="up-duhar" placeholder="Duh" class="p-1 border rounded text-[8px] text-center">
                        <input type="text" id="up-asr" placeholder="Asr" class="p-1 border rounded text-[8px] text-center">
                        <input type="text" id="up-magh" placeholder="Mag" class="p-1 border rounded text-[8px] text-center">
                        <input type="text" id="up-isha" placeholder="Ish" class="p-1 border rounded text-[8px] text-center">
                    </div>
                    <button onclick="updateAzanTimes()" class="w-full bg-emerald-600 text-white py-2 rounded-lg text-[9px] font-black uppercase shadow-md">Update Timings</button>
                </div>
            </div>

            <div class="card text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Current Azan Timings</p>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span id="t-asr" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span id="t-magh" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span id="t-isha" class="text-emerald-700">-</span></div>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="hidden"><div id="tracker-list"></div></div>
        <div id="attendance-page" class="hidden"><div id="attendance-list"></div></div>
        <div id="results-page" class="hidden">
            <h2 class="text-center font-black text-emerald-800 uppercase mb-4 text-sm tracking-widest">Public Results 2026</h2>
            <input type="text" id="res-srch" onkeyup="searchStudent()" placeholder="Search name..." class="w-full p-4 mb-4 rounded-xl border outline-none text-sm bg-white shadow-sm">
            <div id="results-list"></div>
        </div>
        <div id="history-page" class="hidden"><div id="history-list"></div></div>
        <div id="chat-page" class="hidden">
            <div class="card p-4">
                <div id="chat-box" class="chat-container"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Message..." class="flex-1 p-2 bg-gray-100 rounded-lg text-sm outline-none">
                    <button onclick="sendMessage()" class="bg-emerald-700 text-white px-4 rounded-lg shadow-md"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
        <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
        <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
        <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-scroll"></i>RESULTS</div>
        <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
        <div class="nav-item" onclick="navigate('chat', this)"><i class="fa-solid fa-comments"></i>CHAT</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let globalHoliday = false;

        const resultsData = [
            { name: "MUHAMMAD SIFAN", scores: { "Dur-1": "90 A", "Fiq": "77 B+", "Taj": "84 A", "Dur-2": "69 B", "Quran": "78 B+", "Prac": "92 A+" }, total: 490, remark: "DISTINCTION" },
            { name: "MUHAMMAD YASEEN", scores: { "Dur-1": "68 B", "Fiq": "68 B", "Taj": "60 C+", "Dur-2": "63 B", "Quran": "72 B+", "Prac": "88 A" }, total: 419, remark: "PASSED" },
            { name: "MUHAMMAD SUHAIR", scores: { "Dur-1": "80 B+", "Fiq": "76 B+", "Taj": "87 A", "Dur-2": "76 B+", "Quran": "69 B", "Prac": "95 A+" }, total: 483, remark: "DISTINCTION" },
            { name: "MUHAMMAD FAZIL", scores: { "Dur-1": "81 A", "Fiq": "77 B+", "Taj": "78 B+", "Dur-2": "74 B+", "Quran": "45 C", "Prac": "94 A+" }, total: 449, remark: "PASSED" },
            { name: "TWALHATH", scores: { "Dur-1": "57 C+", "Fiq": "49 C", "Taj": "52 C+", "Dur-2": "45 C", "Quran": "68 B", "Prac": "98 A++" }, total: 369, remark: "PASSED" },
            { name: "MUHAMMAD DISHAN K.A", scores: { "Dur-1": "90 A", "Fiq": "89 A", "Taj": "91 A+", "Dur-2": "81 A", "Quran": "80 B+", "Prac": "98 A++" }, total: 529, remark: "DISTINCTION" },
            { name: "RASEENA", scores: { "Dur-1": "60 C+", "Fiq": "58 C+", "Taj": "40 C", "Dur-2": "54 C+", "Quran": "40 C", "Prac": "98 A++" }, total: 350, remark: "PASSED" },
            { name: "NAFEESATH AIZA", scores: { "Dur-1": "58 C+", "Fiq": "50 C", "Taj": "52 C+", "Dur-2": "53 C+", "Quran": "47 C", "Prac": "95 A+" }, total: 355, remark: "PASSED" },
            { name: "AFREENA", scores: { "Dur-1": "76 B+", "Fiq": "76 B+", "Taj": "81 A", "Dur-2": "70 B", "Quran": "70 B", "Prac": "99 A++" }, total: 472, remark: "PASSED" },
            { name: "MISHA FATHIMA", scores: { "Dur-1": "40 C", "Fiq": "47 C", "Taj": "50 C", "Dur-2": "47 C", "Quran": "44 C", "Prac": "85 A" }, total: 313, remark: "PASSED" },
            { name: "SHAKIRA", scores: { "Dur-1": "96 A++", "Fiq": "96 A++", "Taj": "95 A+", "Dur-2": "91 A+", "Quran": "80 B+", "Prac": "100 A++" }, total: 558, remark: "DISTINCTION" },
            { name: "FATHIMATH RIFA", scores: { "Dur-1": "75 B+", "Fiq": "72 B+", "Taj": "75 B+", "Dur-2": "66 B", "Quran": "51 C+", "Prac": "83 A" }, total: 422, remark: "PASSED" },
            { name: "SUHAIBA", scores: { "Dur-1": "79 B+", "Fiq": "68 B", "Taj": "86 A", "Dur-2": "73 B+", "Quran": "50 C", "Prac": "93 A+" }, total: 449, remark: "PASSED" },
            { name: "KADEEJATHU NILA", scores: { "Dur-1": "84 A", "Fiq": "70 B", "Taj": "84 A", "Dur-2": "78 B+", "Quran": "71 B+", "Prac": "100 A++" }, total: 487, remark: "DISTINCTION" },
            { name: "FATHIMATH FIDA", scores: { "Dur-1": "79 B+", "Fiq": "77 B+", "Taj": "80 B+", "Dur-2": "64 B", "Quran": "73 B+", "Prac": "99 A++" }, total: 472, remark: "PASSED" }
        ];

        // INITIAL LOAD
        document.getElementById('global-date').value = selectedDate;
        syncHoliday();
        loadAzan();
        loadChat();

        // FUNCTIONS
        window.navigate = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            ['home', 'tracker', 'attendance', 'results', 'history', 'chat'].forEach(pg => {
                const element = document.getElementById(pg + (pg==='home'?'':'-page'));
                if(element) element.classList.toggle('hidden', pg !== p);
            });
            if(p === 'results') loadResults();
            if(p === 'tracker') loadTracker();
            if(p === 'attendance') loadAttendance();
            if(p === 'history') loadHistory();
        };

        function loadAzan() {
            onSnapshot(doc(db, "settings", "timings"), (s) => {
                if(s.exists()){
                    const d = s.data();
                    ['subhi', 'duhar', 'asr', 'magh', 'isha'].forEach(k => {
                        if(d[k]) document.getElementById('t-' + k).innerText = d[k];
                    });
                }
            });
        }

        window.updateAzanTimes = () => {
            const d = { 
                subhi: document.getElementById('up-subhi').value || document.getElementById('t-subhi').innerText, 
                duhar: document.getElementById('up-duhar').value || document.getElementById('t-duhar').innerText, 
                asr: document.getElementById('up-asr').value || document.getElementById('t-asr').innerText, 
                magh: document.getElementById('up-magh').value || document.getElementById('t-magh').innerText, 
                isha: document.getElementById('up-isha').value || document.getElementById('t-isha').innerText 
            };
            setDoc(doc(db, "settings", "timings"), d, {merge: true}).then(() => alert("Timings Updated!"));
        };

        window.loadResults = () => {
            document.getElementById('results-list').innerHTML = resultsData.map((r, i) => `
                <div class="card result-item" onclick="document.getElementById('mks-${i}').classList.toggle('hidden')">
                    <div class="flex justify-between items-center">
                        <div><p class="nm text-[10px] font-black uppercase">${r.name}</p><p class="text-[8px] font-bold ${r.remark==='DISTINCTION'?'text-emerald-600':'text-gray-400'}">${r.remark}</p></div>
                        <p class="text-lg font-black text-emerald-800">${r.total}/600</p>
                    </div>
                    <div id="mks-${i}" class="hidden subject-grid">
                        ${Object.entries(r.scores).map(([k,v]) => `<div class="sub-box"><p class="uppercase text-[7px] text-gray-400">${k}</p><p class="font-bold">${v}</p></div>`).join('')}
                    </div>
                </div>`).join('');
        };

        window.searchStudent = () => {
            let v = document.getElementById('res-srch').value.toLowerCase();
            document.querySelectorAll('.result-item').forEach(it => { it.style.display = it.querySelector('.nm').innerText.toLowerCase().includes(v) ? "" : "none"; });
        };

        function loadAttendance() {
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                document.getElementById('attendance-list').innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    if(globalHoliday) return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="p-3 bg-blue-600 text-white rounded-lg text-center font-bold">LEAVE</div></div>`;
                    return `<div class="card"><p class="text-xs font-black mb-3 uppercase">${s}</p><div class="flex gap-2"><button onclick="setA('${s}','P')" class="att-btn ${d.status==='P'?'p-active':''}">PRESENT</button><button onclick="setA('${s}','A')" class="att-btn ${d.status==='A'?'a-active':''}">ABSENT</button></div></div>`;
                }).join('');
            });
        }

        function loadTracker() {
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                document.getElementById('tracker-list').innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="grid grid-cols-5 gap-1">${["Subhi","Duhar","Asr","Maghrib","Isha"].map(p => `<button onclick="toggleP('${s}','${p}',${!!d[p]})" class="p-btn ${d[p] ? 'active' : ''}">${d[p] ? '✓' : p}</button>`).join('')}</div></div>`;
                }).join('');
            });
        }

        async function loadHistory() {
            const snap = await getDocs(collection(db, "daily")); const st = {}; students.forEach(s => st[s] = { p:0, a:0, pr:0 });
            snap.forEach(d => { const doc = d.data(); if(st[doc.name]) { ["Subhi","Duhar","Asr","Maghrib","Isha"].forEach(p => { if(doc[p]) st[doc.name].pr++; }); if(doc.status === 'P') st[doc.name].p++; if(doc.status === 'A') st[doc.name].a++; } });
            document.getElementById('history-list').innerHTML = students.map(s => `<div class="card"><p class="font-black text-sm uppercase mb-2">${s}</p><div class="flex justify-between text-[10px] font-bold"><span class="text-emerald-600">PRAYERS: ${st[s].pr}</span><span class="text-blue-600">PRESENT: ${st[s].p}</span><span class="text-red-600">ABSENT: ${st[s].a}</span></div></div>`).join('');
        }

        function syncHoliday() {
            onSnapshot(doc(db, "settings", "madrasa_status"), (snap) => {
                const d = snap.exists() ? snap.data() : { isHoliday: false, reason: "" }; globalHoliday = d.isHoliday;
                document.getElementById('holiday-banner').classList.toggle('hidden', !globalHoliday);
                if(globalHoliday) document.getElementById('holiday-reason-text').innerText = d.reason;
                const btn = document.getElementById('h-notice-btn'); btn.innerText = globalHoliday ? "STOP LEAVE" : "POST LEAVE NOTICE";
                btn.className = globalHoliday ? "w-full py-2 rounded-xl text-[10px] font-black uppercase bg-red-600 shadow-md text-white" : "w-full py-2 rounded-xl text-[10px] font-black uppercase bg-blue-600 shadow-md text-white";
                loadAttendance();
            });
        }

        window.toggleGlobalHoliday = () => {
            const r = document.getElementById('h-reason-input').value;
            setDoc(doc(db, "settings", "madrasa_status"), { isHoliday: !globalHoliday, reason: r || "Madrasa is on leave." });
            document.getElementById('h-reason-input').value = "";
        };

        window.sendMessage = async () => {
            const t = document.getElementById('chat-input').value; if(!t.trim()) return;
            await addDoc(collection(db, "chats"), { sender: "User", text: t, time: Timestamp.now() });
            document.getElementById('chat-input').value = "";
        };

        function loadChat() {
            onSnapshot(query(collection(db, "chats"), orderBy("time", "desc"), limit(30)), (snap) => {
                const b = document.getElementById('chat-box'); b.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    b.innerHTML += `<div class="msg"><p>${m.text}</p></div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }

        window.toggleP = (n, p, cur) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, [p]: !cur }, { merge: true });
        window.setA = (n, s) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, status: s }, { merge: true });
        window.changeDate = (v) => { selectedDate = v; navigate('home', document.querySelector('.nav-item.active')); };
    </script>
</body>
</html>
