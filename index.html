<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 9px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .att-btn { padding: 12px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; border: none; }
        .a-active { background: #dc2626 !important; color: white !important; border: none; }
        .p-btn { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 800; width: 100%; }
        .p-btn.active { background: #10b981 !important; color: white !important; }
        .chat-container { height: 300px; overflow-y: auto; background: #f9fafb; padding: 10px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; max-width: 80%; padding: 10px; border-radius: 15px; font-size: 12px; background: white; border: 1px solid #eee; }
        .msg-own { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .subject-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .sub-box { background: #f1f5f9; padding: 6px; border-radius: 8px; text-align: center; font-size: 10px; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3 uppercase">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none border-none shadow-lg">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div id="holiday-banner" class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-xl hidden mb-4 text-center text-amber-900 font-bold text-sm">
                <p id="holiday-reason-text"></p>
            </div>
            
            <div id="admin-tools" class="hidden">
                <div class="card bg-emerald-50 border-emerald-200">
                    <p class="text-[10px] font-black text-emerald-800 uppercase mb-2">Settings & Notice Board</p>
                    <textarea id="h-reason-input" class="w-full p-2 border rounded-xl text-xs mb-2 outline-none" placeholder="Leave reason..."></textarea>
                    <button id="h-notice-btn" onclick="toggleGlobalHoliday()" class="w-full py-2 rounded-xl text-[10px] font-black uppercase text-white mb-4 bg-blue-600 shadow-md"></button>
                    
                    <div class="border-t pt-3">
                        <p class="text-[9px] font-bold text-gray-500 uppercase mb-2">Edit Azan Timings</p>
                        <div class="grid grid-cols-5 gap-1 mb-2">
                            <input type="text" id="up-subhi" placeholder="Sub" class="p-1 border rounded text-[8px] text-center">
                            <input type="text" id="up-duhar" placeholder="Duh" class="p-1 border rounded text-[8px] text-center">
                            <input type="text" id="up-asr" placeholder="Asr" class="p-1 border rounded text-[8px] text-center">
                            <input type="text" id="up-magh" placeholder="Mag" class="p-1 border rounded text-[8px] text-center">
                            <input type="text" id="up-isha" placeholder="Ish" class="p-1 border rounded text-[8px] text-center">
                        </div>
                        <button onclick="updateAzanTimes()" class="w-full bg-emerald-600 text-white py-2 rounded-lg text-[9px] font-black uppercase shadow-md">Update Timings</button>
                    </div>
                </div>
            </div>

            <div class="card text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Azan Timings</p>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span id="t-asr" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span id="t-magh" class="text-emerald-700">-</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span id="t-isha" class="text-emerald-700">-</span></div>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        
        <div id="results-page" class="p-5 hidden">
            <h2 class="text-center font-black text-emerald-800 uppercase mb-4 text-sm tracking-widest">Public Results 2026</h2>
            <input type="text" id="res-srch" onkeyup="searchStudent()" placeholder="Search name..." class="w-full p-4 mb-4 rounded-xl border outline-none text-sm bg-white shadow-sm">
            <div id="results-list"></div>
        </div>

        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>
        
        <div id="chat-page" class="p-5 hidden text-center">
            <div class="card py-10 mb-4">
                <p id="profile-email" class="text-xs font-bold text-emerald-700 mb-4"></p>
                <button onclick="handleLogout()" class="w-full border border-red-500 text-red-500 py-2 rounded-xl text-[10px] font-bold uppercase">Sign Out</button>
            </div>
            <div class="card p-4 text-left">
                <h3 class="text-xs font-black text-gray-500 uppercase mb-4 border-b pb-2">Community Chat</h3>
                <div id="chat-box" class="chat-container"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Message..." class="flex-1 p-2 bg-gray-100 rounded-lg text-sm outline-none">
                    <button onclick="sendMessage()" class="bg-emerald-700 text-white px-4 rounded-lg shadow-md"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav hidden" id="nav-bar">
        <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
        <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
        <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
        <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-scroll"></i>RESULTS</div>
        <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
        <div class="nav-item" onclick="navigate('chat', this)"><i class="fa-solid fa-comments"></i>ME</div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card shadow-2xl">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase tracking-widest">Login</h2>
            <input type="email" id="email-l" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none text-sm border-none shadow-inner">
            <input type="password" id="pass-l" placeholder="Password" class="w-full p-4 rounded-xl mb-2 bg-gray-100 outline-none text-sm border-none shadow-inner">
            <div class="text-right mb-6"><span onclick="forgotPass()" class="text-[10px] text-gray-500 font-bold underline cursor-pointer uppercase">Forgot Password?</span></div>
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-4 uppercase shadow-lg">Login</button>
            <p class="text-xs font-bold text-gray-400">New? <span onclick="toggleAuth(true)" class="text-emerald-700 underline cursor-pointer">Register</span></p>
        </div>
        <div id="signup-box" class="card hidden shadow-2xl">
            <h2 class="text-xl font-black text-blue-800 mb-8 uppercase">Register</h2>
            <input type="email" id="email-s" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none">
            <input type="password" id="pass-s" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-gray-100 outline-none">
            <button onclick="handleSignUp()" class="w-full bg-blue-800 text-white font-black py-4 rounded-xl mb-4 uppercase">Sign Up</button>
            <p onclick="toggleAuth(false)" class="text-xs font-bold text-gray-400 underline cursor-pointer uppercase text-center">Back to Login</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let globalHoliday = false;

        const resultsData = [
            { name: "MUHAMMAD SIFAN", scores: { "Dur-1": "90 A", "Fiq": "77 B+", "Taj": "84 A", "Dur-2": "69 B", "Quran": "78 B+", "Prac": "92 A+" }, total: 490, remark: "DISTINCTION" },
            { name: "MUHAMMAD YASEEN", scores: { "Dur-1": "68 B", "Fiq": "68 B", "Taj": "60 C+", "Dur-2": "63 B", "Quran": "72 B+", "Prac": "88 A" }, total: 419, remark: "PASSED" },
            { name: "MUHAMMAD SUHAIR", scores: { "Dur-1": "80 B+", "Fiq": "76 B+", "Taj": "87 A", "Dur-2": "76 B+", "Quran": "69 B", "Prac": "95 A+" }, total: 483, remark: "DISTINCTION" },
            { name: "MUHAMMAD FAZIL", scores: { "Dur-1": "81 A", "Fiq": "77 B+", "Taj": "78 B+", "Dur-2": "74 B+", "Quran": "45 C", "Prac": "94 A+" }, total: 449, remark: "PASSED" },
            { name: "TWALHATH", scores: { "Dur-1": "57 C+", "Fiq": "49 C", "Taj": "52 C+", "Dur-2": "45 C", "Quran": "68 B", "Prac": "98 A++" }, total: 369, remark: "PASSED" },
            { name: "MUHAMMAD DISHAN K.A", scores: { "Dur-1": "90 A", "Fiq": "89 A", "Taj": "91 A+", "Dur-2": "81 A", "Quran": "80 B+", "Prac": "98 A++" }, total: 529, remark: "DISTINCTION" },
            { name: "RASEENA", scores: { "Dur-1": "60 C+", "Fiq": "58 C+", "Taj": "40 C", "Dur-2": "54 C+", "Quran": "40 C", "Prac": "98 A++" }, total: 350, remark: "PASSED" },
            { name: "NAFEESATH AIZA", scores: { "Dur-1": "58 C+", "Fiq": "50 C", "Taj": "52 C+", "Dur-2": "53 C+", "Quran": "47 C", "Prac": "95 A+" }, total: 355, remark: "PASSED" },
            { name: "AFREENA", scores: { "Dur-1": "76 B+", "Fiq": "76 B+", "Taj": "81 A", "Dur-2": "70 B", "Quran": "70 B", "Prac": "99 A++" }, total: 472, remark: "PASSED" },
            { name: "MISHA FATHIMA", scores: { "Dur-1": "40 C", "Fiq": "47 C", "Taj": "50 C", "Dur-2": "47 C", "Quran": "44 C", "Prac": "85 A" }, total: 313, remark: "PASSED" },
            { name: "SHAKIRA", scores: { "Dur-1": "96 A++", "Fiq": "96 A++", "Taj": "95 A+", "Dur-2": "91 A+", "Quran": "80 B+", "Prac": "100 A++" }, total: 558, remark: "DISTINCTION" },
            { name: "FATHIMATH RIFA", scores: { "Dur-1": "75 B+", "Fiq": "72 B+", "Taj": "75 B+", "Dur-2": "66 B", "Quran": "51 C+", "Prac": "83 A" }, total: 422, remark: "PASSED" },
            { name: "SUHAIBA", scores: { "Dur-1": "79 B+", "Fiq": "68 B", "Taj": "86 A", "Dur-2": "73 B+", "Quran": "50 C", "Prac": "93 A+" }, total: 449, remark: "PASSED" },
            { name: "KADEEJATHU NILA", scores: { "Dur-1": "84 A", "Fiq": "70 B", "Taj": "84 A", "Dur-2": "78 B+", "Quran": "71 B+", "Prac": "100 A++" }, total: 487, remark: "DISTINCTION" },
            { name: "FATHIMATH FIDA", scores: { "Dur-1": "79 B+", "Fiq": "77 B+", "Taj": "80 B+", "Dur-2": "64 B", "Quran": "73 B+", "Prac": "99 A++" }, total: 472, remark: "PASSED" }
        ];

        // STARTUP & AUTH
        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            document.getElementById('nav-bar').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('profile-email').innerText = u.email;
                if(u.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) document.getElementById('admin-tools').classList.remove('hidden');
                document.getElementById('global-date').value = selectedDate;
                loadAzan(); syncHoliday(); loadChat(); navigate('home', document.querySelector('.nav-item'));
            }
        });

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email-l').value, document.getElementById('pass-l').value).catch(e => alert(e.message));
        window.handleSignUp = () => createUserWithEmailAndPassword(auth, document.getElementById('email-s').value, document.getElementById('pass-s').value).then(() => alert("Success!")).catch(e => alert(e.message));
        window.forgotPass = () => { const e = document.getElementById('email-l').value; if(!e) return alert("Enter Email"); sendPasswordResetEmail(auth, e).then(() => alert("Link Sent")); };
        window.handleLogout = () => signOut(auth);
        window.toggleAuth = (s) => { document.getElementById('login-box').classList.toggle('hidden', s); document.getElementById('signup-box').classList.toggle('hidden', !s); };

        // NAVIGATION
        window.navigate = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            ['home', 'tracker', 'attendance', 'results', 'history', 'chat'].forEach(pg => {
                const element = document.getElementById(pg + (pg==='home'?'':'-page'));
                if(element) element.classList.toggle('hidden', pg !== p);
            });
            if(p === 'tracker') loadTracker();
            if(p === 'attendance') loadAttendance();
            if(p === 'results') loadResults();
            if(p === 'history') loadHistory();
        };

        // CORE LOGIC
        document.getElementById('global-date').onchange = (e) => {
            selectedDate = e.target.value;
            const currentActive = document.querySelector('.nav-item.active').innerText.toLowerCase().trim();
            navigate(currentActive === 'me' ? 'chat' : currentActive, document.querySelector('.nav-item.active'));
        };

        function loadAzan() {
            onSnapshot(doc(db, "settings", "timings"), (s) => {
                if(s.exists()){
                    const d = s.data();
                    ['subhi', 'duhar', 'asr', 'magh', 'isha'].forEach(k => { if(d[k]) document.getElementById('t-' + k).innerText = d[k]; });
                }
            });
        }

        window.updateAzanTimes = () => {
            const d = { subhi: document.getElementById('up-subhi').value, duhar: document.getElementById('up-duhar').value, asr: document.getElementById('up-asr').value, magh: document.getElementById('up-magh').value, isha: document.getElementById('up-isha').value };
            setDoc(doc(db, "settings", "timings"), d, {merge: true}).then(() => alert("Updated!"));
        };

        function syncHoliday() {
            onSnapshot(doc(db, "settings", "madrasa_status"), (s) => {
                const d = s.exists() ? s.data() : { isHoliday: false, reason: "" }; globalHoliday = d.isHoliday;
                document.getElementById('holiday-banner').classList.toggle('hidden', !globalHoliday);
                if(globalHoliday) document.getElementById('holiday-reason-text').innerText = d.reason;
                const btn = document.getElementById('h-notice-btn'); btn.innerText = globalHoliday ? "STOP LEAVE NOTICE" : "POST LEAVE NOTICE";
                loadAttendance();
            });
        }

        window.toggleGlobalHoliday = () => {
            const r = document.getElementById('h-reason-input').value;
            setDoc(doc(db, "settings", "madrasa_status"), { isHoliday: !globalHoliday, reason: r || "On Leave" });
            document.getElementById('h-reason-input').value = "";
        };

        function loadTracker() {
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                document.getElementById('tracker-list').innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="grid grid-cols-5 gap-1">
                        ${["Subhi","Duhar","Asr","Maghrib","Isha"].map(p => `<button onclick="toggleP('${s}','${p}',${!!d[p]})" class="p-btn ${d[p] ? 'active' : ''}">${d[p] ? '✓' : p.substring(0,3)}</button>`).join('')}
                    </div></div>`;
                }).join('');
            });
        }

        function loadAttendance() {
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                document.getElementById('attendance-list').innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
