<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .hidden { display: none; }
        .main-card { background: linear-gradient(180deg, #064e3b 0%, #065f46 100%); border-radius: 0 0 40px 40px; padding: 30px 20px; text-align: center; position: relative; }
        .timer-box { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .student-card { background: #161b22; border-radius: 18px; padding: 18px; margin-bottom: 16px; border: 1px solid #30363d; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
        .p-btn { background: #21262d; border: 1px solid #30363d; padding: 12px 2px; border-radius: 10px; font-size: 10px; font-weight: 800; color: #c9d1d9; cursor: pointer; }
        .active { background: #10b981 !important; color: white !important; pointer-events: none; border-color: #10b981; }
        .login-box { background: #1f2937; padding: 30px; border-radius: 20px; border: 1px solid #374151; width: 90%; max-width: 380px; }
        .input-field { background-color: white !important; color: black !important; font-weight: bold; }
    </style>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31",
            measurementId: "G-5HG7QCXYE7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginPage = document.getElementById('login-page');
        const mainContent = document.getElementById('main-content');
        const emailField = document.getElementById('email');
        const passwordField = document.getElementById('password');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginPage.classList.add('hidden');
                mainContent.classList.remove('hidden');
                loadTracker();
            } else {
                loginPage.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        });

        window.handleLogin = () => {
            if(!emailField.value || !passwordField.value) return alert("Please enter Email and Password");
            signInWithEmailAndPassword(auth, emailField.value, passwordField.value)
                .catch(err => alert("Login Error: " + err.message));
        };

        window.handleSignUp = () => {
            if(!emailField.value || !passwordField.value) return alert("Enter details to Create Account");
            createUserWithEmailAndPassword(auth, emailField.value, passwordField.value)
                .then(() => alert("Account Created Successfully!"))
                .catch(err => alert("Registration Error: " + err.message));
        };

        window.forgotPassword = () => {
            if(!emailField.value) return alert("Enter your email id");
            sendPasswordResetEmail(auth, emailField.value)
                .then(() => alert("Password reset link sent to your email inbox/spam."));
        };

        window.handleLogout = () => signOut(auth);

        const today = new Date().toISOString().split('T')[0];

        async function loadTracker() {
            startTimer();
            const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "<p class='text-center text-xs opacity-50'>Syncing Data...</p>";

            const q = query(collection(db, "prayers"), where("date", "==", today));
            const querySnapshot = await getDocs(q);
            const savedData = {};
            querySnapshot.forEach((doc) => { savedData[doc.id] = doc.data(); });

            listDiv.innerHTML = "";
            students.forEach(name => {
                listDiv.innerHTML += `
                    <div class="student-card">
                        <h3 class="font-black text-gray-100 uppercase mb-2 text-lg">${name}</h3>
                        <div class="prayer-grid">
                            ${["Subhi", "Duhar", "Asr", "Maghrib", "Isha"].map(p => {
                                const isDone = savedData[`${name}_${today}`]?.[p];
                                return `<button id="${name}_${p}" onclick="submitP('${name}','${p}')" class="p-btn ${isDone ? 'active' : ''}">${isDone ? '✓ ' + p : p}</button>`;
                            }).join('')}
                        </div>
                    </div>`;
            });
        }

        window.submitP = async (name, prayer) => {
            const btn = document.getElementById(`${name}_${prayer}`);
            if(btn.classList.contains('active')) return;

            try {
                const docId = `${name}_${today}`;
                await setDoc(doc(db, "prayers", docId), {
                    name: name,
                    date: today,
                    [prayer]: true
                }, { merge: true });

                btn.classList.add('active');
                btn.innerText = "✓ " + prayer;
            } catch (e) {
                alert("Storage Error: " + e.message);
            }
        }

        function startTimer() {
            const PRAYER_TIMES = [{id:'Subhi',h:5,m:15},{id:'Duhar',h:12,m:38},{id:'Asr',h:15,m:58},{id:'Maghrib',h:18,m:39},{id:'Isha',h:19,m:49}];
            setInterval(() => {
                const now = new Date();
                let target = null;
                for (let p of PRAYER_TIMES) {
                    let t = new Date(); t.setHours(p.h, p.m, 0);
                    if (t > now) { target = t; break; }
                }
                if (!target) {
                    target = new Date(); target.setDate(target.getDate()+1);
                    target.setHours(PRAYER_TIMES[0].h, PRAYER_TIMES[0].m, 0);
                }
                const diff = target - now;
                const hh = Math.floor(diff/3600000); const mm = Math.floor((diff%3600000)/60000); const ss = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
            }, 1000);
        }
    </script>

    <div id="login-page" class="flex items-center justify-center min-h-screen p-4 text-center">
        <div class="login-box shadow-2xl">
            <h2 class="text-2xl font-black text-emerald-400 mb-6 uppercase tracking-wider">Hidayatul Islam</h2>
            <input type="email" id="email" placeholder="Email Address" class="input-field w-full p-4 rounded-xl mb-3 outline-none">
            <input type="password" id="password" placeholder="Password" class="input-field w-full p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl mb-3 uppercase">Login</button>
            
            <div class="flex items-center my-4">
                <hr class="flex-grow border-gray-700">
                <span class="px-3 text-gray-500 text-xs">OR</span>
                <hr class="flex-grow border-gray-700">
            </div>

            <button onclick="handleSignUp()" class="w-full border border-emerald-500 text-emerald-400 font-bold py-3 rounded-xl mb-4 text-xs uppercase">Create Account</button>
            <p onclick="forgotPassword()" class="text-xs text-gray-400 cursor-pointer underline">Forgot Password?</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="main-card">
            <button onclick="handleLogout()" class="absolute top-4 right-4 text-[10px] bg-white/10 px-3 py-1 rounded-full border border-white/20 font-bold uppercase">Logout</button>
            <h1 class="text-xl font-black uppercase text-emerald-50">Hidayatul Islam Tracker</h1>
            <div class="timer-box">
                <p class="text-[10px] text-emerald-300 uppercase font-black mb-1">Next Prayer In:</p>
                <div id="timer" class="text-4xl font-black font-mono">00:00:00</div>
            </div>
        </div>
        <div id="list" class="p-5"></div>
        <div class="p-6 text-center border-t border-gray-800 mt-10">
            <p class="text-gray-400 text-xs uppercase font-bold">Admin: Abdul Kareem Falili AL-jalali</p>
        </div>
    </div>

</body>
</html>
