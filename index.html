<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
        .p-btn { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 10px 0; border-radius: 10px; font-size: 9px; font-weight: 800; width: 100%; }
        .p-btn.active { background: #10b981 !important; color: white !important; }
        .att-btn { padding: 15px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .res-card { border-left: 5px solid #065f46; cursor: pointer; }
        .subject-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .sub-box { background: #f8fafc; padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #edf2f7; }
        .msg-box { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 13px; }
        .msg-me { align-self: flex-end; background: #065f46; color: white; border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: white; color: #1f2937; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none" onchange="changeDate(this.value)">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div class="card text-center">
                <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase">Azan Timings</h3>
                <div class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase text-emerald-700">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span>05:15</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span>12:38</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span>03:58</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span>06:39</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span>07:49</span></div>
                </div>
            </div>
        </div>

        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list" class="space-y-2"></div></div>
        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list" class="space-y-2"></div></div>
        <div id="results-page" class="p-5 hidden">
            <h2 class="text-center font-black text-emerald-800 uppercase mb-4 tracking-widest text-sm">Public Exam Results 2026</h2>
            <div id="results-list" class="space-y-3"></div>
        </div>
        <div id="history-page" class="p-5 hidden"><div id="history-list" class="space-y-2"></div></div>

        <div id="profile-page" class="p-5 hidden text-center">
            <div class="card py-10">
                <i class="fa-solid fa-circle-user text-5xl text-emerald-700 mb-4"></i>
                <p id="user-email-text" class="text-xs font-bold text-gray-400 mb-8"></p>
                <button onclick="navigate('chat')" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl mb-4 uppercase text-[10px] flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-solid fa-comments text-lg"></i> Open Chat
                </button>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-3 rounded-xl uppercase text-[10px]">Sign Out</button>
            </div>
        </div>

        <div id="chat-page" class="hidden h-screen flex flex-col bg-white">
            <div class="bg-[#065f46] text-white p-4 flex items-center justify-between">
                <div class="flex items-center gap-4"><button onclick="navigate('profile')"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black uppercase text-sm">Chat</h2></div>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col bg-gray-50"></div>
            <div class="p-4 bg-white border-t flex gap-2">
                <input type="text" id="chat-input" placeholder="Message..." class="flex-1 p-3 bg-gray-100 rounded-xl outline-none">
                <button onclick="sendMessage()" class="bg-emerald-700 text-white p-3 rounded-xl w-12 h-12 flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-scroll"></i>RESULTS</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-user-circle"></i>ME</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-gray-100 outline-none">
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-4 uppercase">Login</button>
            <p onclick="toggleAuth(true)" class="text-xs font-bold text-gray-400 uppercase cursor-pointer">New? <span class="text-emerald-700 underline">Register</span></p>
        </div>
        <div id="signup-box" class="card hidden">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase text-center">Register</h2>
            <input type="email" id="s-email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none text-sm border-none">
            <input type="password" id="s-pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-gray-100 outline-none text-sm border-none">
            <button onclick="handleSignUp()" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl mb-4 uppercase">Create Account</button>
            <p onclick="toggleAuth(false)" class="text-xs font-bold text-gray-400 underline cursor-pointer uppercase text-center">Back to Login</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        
        const fullResults = [
            { name: "MUHAMMAD DISHAN K.A", total: 529, remark: "DISTINCTION", scores: { "Dur-1": "90 A", "Fiq": "89 A", "Taj": "91 A+", "Dur-2": "81 A", "Quran": "80 B+", "Prac": "98 A++" } },
            { name: "SHAKIRA", total: 558, remark: "DISTINCTION", scores: { "Dur-1": "96 A++", "Fiq": "96 A++", "Taj": "95 A+", "Dur-2": "91 A+", "Quran": "80 B+", "Prac": "100 A++" } },
            { name: "MUHAMMAD SIFAN", total: 490, remark: "DISTINCTION", scores: { "Dur-1": "90 A", "Fiq": "77 B+", "Taj": "84 A", "Dur-2": "69 B", "Quran": "78 B+", "Prac": "92 A+" } },
            { name: "KADEEJATHU NILA", total: 487, remark: "DISTINCTION", scores: { "Dur-1": "84 A", "Fiq": "70 B", "Taj": "84 A", "Dur-2": "78 B+", "Quran": "71 B+", "Prac": "100 A++" } },
            { name: "MUHAMMAD SUHAIR", total: 483, remark: "DISTINCTION", scores: { "Dur-1": "80 B+", "Fiq": "76 B+", "Taj": "87 A", "Dur-2": "76 B+", "Quran": "69 B", "Prac": "95 A+" } },
            { name: "AFREENA", total: 472, remark: "PASSED", scores: { "Dur-1": "76 B+", "Fiq": "76 B+", "Taj": "81 A", "Dur-2": "70 B", "Quran": "70 B", "Prac": "99 A++" } },
            { name: "FATHIMATH FIDA", total: 472, remark: "PASSED", scores: { "Dur-1": "79 B+", "Fiq": "77 B+", "Taj": "80 B+", "Dur-2": "64 B", "Quran": "73 B+", "Prac": "99 A++" } },
            { name: "MUHAMMAD FAZIL", total: 449, remark: "PASSED", scores: { "Dur-1": "81 A", "Fiq": "77 B+", "Taj": "78 B+", "Dur-2": "74 B+", "Quran": "45 C", "Prac": "94 A+" } },
            { name: "SUHAIBA", total: 449, remark: "PASSED", scores: { "Dur-1": "79 B+", "Fiq": "68 B", "Taj": "86 A", "Dur-2": "73 B+", "Quran": "50 C", "Prac": "93 A+" } },
            { name: "FATHIMATH RIFA", total: 422, remark: "PASSED", scores: { "Dur-1": "75 B+", "Fiq": "72 B+", "Taj": "75 B+", "Dur-2": "66 B", "Quran": "51 C+", "Prac": "83 A" } },
            { name: "MUHAMMAD YASEEN", total: 419, remark: "PASSED", scores: { "Dur-1": "68 B", "Fiq": "68 B", "Taj": "60 C+", "Dur-2": "63 B", "Quran": "72 B+", "Prac": "88 A" } },
            { name: "TWALHATH", total: 369, remark: "PASSED", scores: { "Dur-1": "57 C+", "Fiq": "49 C", "Taj": "52 C+", "Dur-2": "45 C", "Quran": "68 B", "Prac": "98 A++" } },
            { name: "NAFEESATH AIZA", total: 355, remark: "PASSED", scores: { "Dur-1": "58 C+", "Fiq": "50 C", "Taj": "52 C+", "Dur-2": "53 C+", "Quran": "47 C", "Prac": "95 A+" } },
            { name: "RASEENA", total: 350, remark: "PASSED", scores: { "Dur-1": "60 C+", "Fiq": "58 C+", "Taj": "40 C", "Dur-2": "54 C+", "Quran": "40 C", "Prac": "98 A++" } },
            { name: "MISHA FATHIMA", total: 313, remark: "PASSED", scores: { "Dur-1": "40 C", "Fiq": "47 C", "Taj": "50 C", "Dur-2": "47 C", "Quran": "44 C", "Prac": "85 A" } }
        ];

        let selectedDate = new Date().toLocaleDateString('en-CA');
        let chatName = localStorage.getItem('madrasa_chat_name') || "";

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('user-email-text').innerText = u.email;
                document.getElementById('global-date').value = selectedDate;
            }
        });

        window.navigate = (p, el) => {
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            ['home', 'tracker', 'attendance', 'results', 'history', 'profile', 'chat'].forEach(pg => {
                const element = document.getElementById(pg + '-page');
                if(element) element.classList.toggle('hidden', pg !== p);
            });
            if(p === 'chat') { document.getElementById('app-header').classList.add('hidden'); document.querySelector('.bottom-nav').classList.add('hidden'); initChat(); }
            else { document.getElementById('app-header').classList.remove('hidden'); document.querySelector('.bottom-nav').classList.remove('hidden'); }
            
            if(p === 'attendance') loadAttendance();
            if(p === 'tracker') loadTracker();
            if(p === 'results') loadResults();
            if(p === 'history') loadHistory();
        };

        function loadAttendance() {
            const isAdmin = auth.currentUser?.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
            const container = document.getElementById('attendance-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.data().name] = d.data());
                container.innerHTML = students.map(s => {
                    const status = data[s]?.status || "";
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="flex gap-2">
                        <button onclick="${isAdmin ? `setA('${s}','P')` : 'alert(\'Only Usthad\')'}" class="att-btn ${status === 'P' ? 'bg-emerald-600 text-white' : ''}">PRESENT</button>
                        <button onclick="${isAdmin ? `setA('${s}','A')` : 'alert(\'Only Usthad\')'}" class="att-btn ${status === 'A' ? 'bg-red-600 text-white' : ''}">ABSENT</button>
                    </div></div>`;
                }).join('');
            });
        }

        window.setA = (n, s) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, status: s }, { merge: true });

        function loadTracker() {
            const container = document.getElementById('tracker-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.data().name] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="grid grid-cols-5 gap-1">
                        ${["Subhi","Duhar","Asr","Maghrib","Isha"].map(p => `<button onclick="toggleP('${s}','${p}',${!!d[p]})" class="p-btn ${d[p] ? 'active' : ''}">${d[p] ? '✓' : p}</button>`).join('')}
                    </div></div>`;
                }).join('');
            });
        }

        window.toggleP = (n, p, cur) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, [p]: !cur }, { merge: true });

        window.loadResults = () => {
            const container = document.getElementById('results-list');
            container.innerHTML = fullResults.map((r, i) => `
                <div class="card res-card" onclick="document.getElementById('marks-${i}').classList.toggle('hidden')">
                    <div class="flex justify-between items-center">
                        <div><p class="text-[10px] font-black uppercase">${r.name}</p><p class="text-[8px] font-bold ${r.remark === 'DISTINCTION' ? 'text-emerald-600' : 'text-gray-400'}">${r.remark}</p></div>
                        <p class="text-lg font-black text-emerald-800">${r.total}/600</p>
                    </div>
                    <div id="marks-${i}" class="hidden subject-grid">
                        <div class="sub-box"><p class="text-[7px] text-gray-400">Duroosul I</p><p class="text-[10px] font-black">${r.scores['Dur-1']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400">Fiqh</p><p class="text-[10px] font-black">${r.scores['Fiq']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400">Tajweed</p><p class="text-[10px] font-black">${r.scores['Taj']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400">Duroosul II</p><p class="text-[10px] font-black">${r.scores['Dur-2']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400">Quran</p><p class="text-[10px] font-black">${r.scores['Quran']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400">Practical</p><p class="text-[10px] font-black">${r.scores['Prac']}</p></div>
                    </div>
                </div>`).join('');
        };

        async function loadHistory() {
            const snap = await getDocs(collection(db, "daily"));
            const st = {}; students.forEach(s => st[s] = { p:0, pr:0 });
            snap.forEach(d => {
                const doc = d.data();
                if(st[doc.name]) {
                    ["Subhi","Duhar","Asr","Maghrib","Isha"].forEach(p => { if(doc[p]) st[doc.name].pr++; });
                    if(doc.status === 'P') st[doc.name].p++;
                }
            });
            document.getElementById('history-list').innerHTML = students.map(s => `<div class="card"><p class="font-black text-sm uppercase mb-2">${s}</p><div class="flex justify-between text-[10px] font-bold"><span class="text-emerald-600">PRAYERS: ${st[s].pr}</span><span class="text-blue-600">PRESENT: ${st[s].p}</span></div></div>`).join('');
        }

        function initChat() {
            const user = auth.currentUser;
            const isAdmin = user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
            if (isAdmin) chatName = "ADMIN";
            else if (!chatName) {
                let n = prompt("Name:"); if (n && n.trim()) { chatName = n.trim(); localStorage.setItem('madrasa_chat_name', chatName); }
                else { navigate('profile'); return; }
            }
            onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
                const container = document.getElementById('chat-messages'); container.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data(); const isMe = data.sender === chatName;
                    container.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2">
                        <span class="text-[8px] font-black uppercase text-gray-400 px-1">${data.sender} ${isAdmin ? `<button onclick="deleteMsg('${d.id}')" class="text-red-500 ml-2">DEL</button>` : ''}</span>
                        <div class="msg-box ${isMe ? 'msg-me' : 'msg-them'}"><p>${data.text}</p></div>
                    </div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById(
