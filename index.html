<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 90px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .glass-header { background: linear-gradient(135deg, #065f46 0%, #059669 100%); color: white; border-radius: 0 0 35px 35px; padding: 40px 20px; text-align: center; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #94a3b8; font-weight: 800; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .admin-box { background: #f0fdf4; border: 1px dashed #10b981; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .notice-card { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="glass-header shadow-lg">
            <h1 id="display-madrasa-name" class="text-2xl font-black uppercase tracking-tighter">Hidayatul Islam</h1>
            <p id="display-sub-text" class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Achangi • Class 6 • 2026</p>
        </div>

        <div id="home-page" class="view-page p-4">
            
            <div id="holiday-banner" class="notice-card hidden">
                <p class="font-black text-amber-800 uppercase text-[10px] mb-1">📢 MADRASA NOTICE</p>
                <p id="holiday-reason-text" class="text-sm font-bold text-amber-900"></p>
            </div>

            <div class="admin-box">
                <p class="text-[9px] font-black text-emerald-700 mb-3 uppercase text-center"><i class="fa-solid fa-tools"></i> Settings Panel</p>
                
                <div class="mb-4 pb-4 border-b border-emerald-100">
                    <p class="text-[8px] font-black text-emerald-600 mb-2 uppercase">Post Leave/Notice</p>
                    <textarea id="holiday-input" class="w-full p-3 border rounded-xl text-xs mb-2 outline-none font-bold" placeholder="Type notice here..."></textarea>
                    <div class="flex gap-2">
                        <button onclick="postNotice()" class="flex-1 bg-amber-600 text-white py-2 rounded-lg text-[9px] font-black uppercase">Post Notice</button>
                        <button onclick="clearNotice()" class="bg-gray-400 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase">Clear</button>
                    </div>
                </div>

                <div class="space-y-2 mb-4">
                    <input type="text" id="edit-name" placeholder="Madrasa Name" class="w-full p-3 rounded-lg border text-xs font-bold outline-none">
                    <input type="text" id="edit-sub" placeholder="Place/Class Info" class="w-full p-3 rounded-lg border text-xs font-bold outline-none">
                    <button onclick="updateHeader()" class="w-full bg-emerald-700 text-white py-2 rounded-lg text-[9px] font-black uppercase">Save Name</button>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="text" id="up-subhi" placeholder="Subhi" class="p-2 border rounded text-xs font-bold">
                    <input type="text" id="up-duhar" placeholder="Duhar" class="p-2 border rounded text-xs font-bold">
                    <input type="text" id="up-asr" placeholder="Asr" class="p-2 border rounded text-xs font-bold">
                    <input type="text" id="up-magh" placeholder="Magh" class="p-2 border rounded text-xs font-bold">
                    <input type="text" id="up-isha" placeholder="Isha" class="p-2 border rounded text-xs font-bold">
                </div>
                <button onclick="updateAzanTimes()" class="w-full bg-blue-700 text-white py-2 rounded-lg text-[9px] font-black uppercase">Save Timings</button>
            </div>

            <div class="card">
                <p class="text-[10px] font-black text-gray-400 text-center mb-4 uppercase tracking-widest">Azan Timings</p>
                <div class="grid grid-cols-5 gap-1 text-[9px] font-bold text-emerald-800 text-center uppercase">
                    <div class="bg-emerald-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi">05:15</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar">12:38</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ASR<br><span id="t-asr">03:58</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">MAGH<br><span id="t-magh">06:39</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ISHA<br><span id="t-isha">07:49</span></div>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="view-page hidden p-4">
             <div id="tracker-list" class="space-y-3"></div>
        </div>

        <div id="results-page" class="view-page hidden p-4">
             <div id="results-list" class="space-y-3"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house text-xl mb-1"></i><br>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-calendar-check text-xl mb-1"></i><br>TRACKER</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-graduation-cap text-xl mb-1"></i><br>RESULTS</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ലൈവ് സിങ്കിംഗ് (Notice board ഉൾപ്പെടെ)
        function syncData() {
            onSnapshot(doc(db, "settings", "header_info"), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    document.getElementById('display-madrasa-name').innerText = d.name || "Hidayatul Islam";
                    document.getElementById('display-sub-text').innerText = d.subtext || "Achangi • Class 6 • 2026";
                }
            });

            onSnapshot(doc(db, "settings", "madrasa_status"), (snap) => {
                const banner = document.getElementById('holiday-banner');
                if(snap.exists() && snap.data().isHoliday) {
                    banner.classList.remove('hidden');
                    document.getElementById('holiday-reason-text').innerText = snap.data().reason;
                } else {
                    banner.classList.add('hidden');
                }
            });

            onSnapshot(doc(db, "settings", "timings"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    if(d.subhi) document.getElementById('t-subhi').innerText = d.subhi;
                    if(d.duhar) document.getElementById('t-duhar').innerText = d.duhar;
                    if(d.asr) document.getElementById('t-asr').innerText = d.asr;
                    if(d.magh) document.getElementById('t-magh').innerText = d.magh;
                    if(d.isha) document.getElementById('t-isha').innerText = d.isha;
                }
            });
        }
        syncData();

        window.postNotice = async () => {
            const reason = document.getElementById('holiday-input').value;
            if(!reason) return alert("Please type a reason!");
            await setDoc(doc(db, "settings", "madrasa_status"), { isHoliday: true, reason: reason });
            document.getElementById('holiday-input').value = "";
            alert("Notice Posted!");
        };

        window.clearNotice = async () => {
            await setDoc(doc(db, "settings", "madrasa_status"), { isHoliday: false, reason: "" });
            alert("Notice Cleared!");
        };

        window.updateHeader = async () => {
            const name = document.getElementById('edit-name').value;
            const sub = document.getElementById('edit-sub').value;
            await setDoc(doc(db, "settings", "header_info"), { name, subtext: sub }, { merge: true });
            alert("Name Updated!");
        };

        window.updateAzanTimes = async () => {
            const data = {
                subhi: document.getElementById('up-subhi').value || document.getElementById('t-subhi').innerText,
                duhar: document.getElementById('up-duhar').value || document.getElementById('t-duhar').innerText,
                asr: document.getElementById('up-asr').value || document.getElementById('t-asr').innerText,
                magh: document.getElementById('up-magh').value || document.getElementById('t-magh').innerText,
                isha: document.getElementById('up-isha').value || document.getElementById('t-isha').innerText
            };
            await setDoc(doc(db, "settings", "timings"), data, { merge: true });
            alert("Timings Saved!");
        };

        window.navigate = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-page').forEach(page => page.classList.add('hidden'));
            document.getElementById(p + '-page').classList.remove('hidden');
        };
    </script>
</body>
</html>
