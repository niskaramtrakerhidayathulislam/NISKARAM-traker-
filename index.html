<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Pro Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .main-card { background: linear-gradient(180deg, #064e3b 0%, #065f46 100%); border-radius: 0 0 40px 40px; padding: 25px 20px; text-align: center; }
        .task-card { background: #161b22; border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
        .p-btn { background: #21262d; border: 1px solid #30363d; padding: 10px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; color: #c9d1d9; }
        .jamath { background: #059669 !important; color: white !important; }
        .alone { background: #2563eb !important; color: white !important; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 class="text-[10px] font-bold text-emerald-200 uppercase tracking-widest">Hidayatul Islam Madrasa Achangi</h2>
        <h1 class="text-xl font-black uppercase text-white mb-4">Class 6 Pro Tracker</h1>
        
        <div class="grid grid-cols-2 gap-3 mb-2">
            <div class="stat-box">
                <p class="text-[9px] uppercase opacity-70">Total Points</p>
                <p id="total-pts" class="text-xl font-bold">0</p>
            </div>
            <div class="stat-box">
                <p class="text-[9px] uppercase opacity-70">Daily Rank</p>
                <p id="daily-rank" class="text-xl font-bold">#1</p>
            </div>
        </div>
    </div>

    <div class="p-4">
        <h2 class="text-xs font-bold uppercase text-emerald-500 mb-3 ml-1">Daily Prayers (Salat)</h2>
        <div id="prayer-list"></div>

        <h2 class="text-xs font-bold uppercase text-emerald-500 mb-3 mt-6 ml-1">Other Activities</h2>
        <div class="task-card">
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-bold">Salath (Swalath)</span>
                <input type="number" id="swalath-count" placeholder="Count" class="w-20 p-2 rounded bg-gray-800 text-white border border-gray-700 text-xs">
            </div>
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-bold">Quran Recitation</span>
                <select id="quran-status" class="w-24 p-2 rounded bg-gray-800 text-white border border-gray-700 text-xs">
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                </select>
            </div>
            <button onclick="saveExtras()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold text-sm uppercase">Save Activities</button>
        </div>
    </div>

    <script>
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];
        let db = JSON.parse(localStorage.getItem('madrassa_pro_v1')) || { points: 0, records: {} };

        function loadUI() {
            document.getElementById('total-pts').innerText = db.points;
            const container = document.getElementById('prayer-list');
            container.innerHTML = "";

            prayers.forEach(p => {
                const status = db.records[p] || "";
                container.innerHTML += `
                    <div class="task-card">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold uppercase text-sm">${p}</span>
                            <span class="text-[10px] opacity-60">${status ? 'Done' : 'Pending'}</span>
                        </div>
                        <div class="btn-group">
                            <button onclick="markPrayer('${p}', 'jamath')" class="p-btn ${status === 'jamath' ? 'jamath' : ''}">Jamath (+10)</button>
                            <button onclick="markPrayer('${p}', 'alone')" class="p-btn ${status === 'alone' ? 'alone' : ''}">Alone (+5)</button>
                        </div>
                    </div>`;
            });
        }

        window.markPrayer = (p, type) => {
            if (db.records[p]) return; // Once marked, cannot change easily
            db.records[p] = type;
            db.points += (type === 'jamath' ? 10 : 5);
            save();
        };

        window.saveExtras = () => {
            const sc = document.getElementById('swalath-count').value;
            const qs = document.getElementById('quran-status').value;
            if(sc > 0) db.points += Math.floor(sc / 10); // 1 point for every 10 Swalath
            if(qs === 'yes') db.points += 15;
            alert("Activities Saved!");
            save();
        };

        function save() {
            localStorage.setItem('madrassa_pro_v1', JSON.stringify(db));
            loadUI();
        }

        loadUI();
    </script>
</body>
</html>
