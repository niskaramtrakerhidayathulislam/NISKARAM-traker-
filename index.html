<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .hidden { display: none; }
        .main-card { background: linear-gradient(180deg, #064e3b 0%, #065f46 100%); border-radius: 0 0 40px 40px; padding: 30px 20px; text-align: center; position: relative; }
        .timer-box { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .student-card { background: #161b22; border-radius: 18px; padding: 18px; margin-bottom: 16px; border: 1px solid #30363d; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
        .p-btn { background: #21262d; border: 1px solid #30363d; padding: 12px 2px; border-radius: 10px; font-size: 10px; font-weight: 800; color: #c9d1d9; cursor: pointer; }
        .active { background: #10b981 !important; color: white !important; }
        .login-box { background: #1f2937; padding: 30px; border-radius: 20px; border: 1px solid #374151; width: 90%; max-width: 380px; }
        /* ഇൻപുട്ട് ബോക്സിനുള്ളിലെ അക്ഷരങ്ങൾ തെളിഞ്ഞു കാണാൻ */
        .input-field { background-color: white !important; color: black !important; font-weight: bold; }
    </style>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // നിങ്ങൾ ഇപ്പോൾ അയച്ചുതന്ന ഏറ്റവും പുതിയ Config
        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31",
            measurementId: "G-5HG7QCXYE7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginPage = document.getElementById('login-page');
        const mainContent = document.getElementById('main-content');
        const emailField = document.getElementById('email');
        const passwordField = document.getElementById('password');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginPage.classList.add('hidden');
                mainContent.classList.remove('hidden');
                loadTracker();
            } else {
                loginPage.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        });

        window.handleLogin = () => {
            if(!emailField.value || !passwordField.value) return alert("ദയവായി ഇമെയിലും പാസ്‌വേഡും ടൈപ്പ് ചെയ്യുക");
            signInWithEmailAndPassword(auth, emailField.value, passwordField.value)
                .catch(err => alert("ലോഗിൻ പരാജയപ്പെട്ടു: " + err.message));
        };

        window.handleSignUp = () => {
            if(!emailField.value || !passwordField.value) return alert("വിവരങ്ങൾ നൽകിയ ശേഷം Create Account അമർത്തുക");
            createUserWithEmailAndPassword(auth, emailField.value, passwordField.value)
                .then(() => alert("അക്കൗണ്ട് വിജയകരമായി നിർമ്മിച്ചു! ഇനി ലോഗിൻ ചെയ്യാം."))
                .catch(err => alert("പിശക്: " + err.message));
        };

        window.forgotPassword = () => {
            if(!emailField.value) return alert("നിങ്ങളുടെ ഇമെയിൽ നൽകുക!");
            sendPasswordResetEmail(auth, emailField.value)
                .then(() => alert("പാസ്‌വേഡ് മാറ്റാനുള്ള ലിങ്ക് ഇമെയിലിൽ അയച്ചിട്ടുണ്ട്."));
        };

        window.handleLogout = () => signOut(auth);
    </script>

    <div id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="login-box shadow-2xl text-center">
            <h2 class="text-2xl font-black text-emerald-400 mb-6 uppercase tracking-wider">Hidayatul Islam</h2>
            
            <div class="text-left mb-4">
                <label class="text-xs text-gray-400 ml-1">Email Id</label>
                <input type="email" id="email" placeholder="example@gmail.com" class="input-field w-full p-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="text-left mb-6">
                <label class="text-xs text-gray-400 ml-1">Password</label>
                <input type="password" id="password" placeholder="******" class="input-field w-full p-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl mb-3 uppercase shadow-lg transition">Login</button>
            
            <div class="flex items-center my-4">
                <hr class="flex-grow border-gray-700">
                <span class="px-3 text-gray-500 text-xs">അല്ലെങ്കിൽ</span>
                <hr class="flex-grow border-gray-700">
            </div>

            <button onclick="handleSignUp()" class="w-full border border-emerald-500 text-emerald-400 font-bold py-3 rounded-xl mb-4 text-xs uppercase hover:bg-emerald-500/10 transition">Create New Account</button>
            
            <p onclick="forgotPassword()" class="text-xs text-gray-400 cursor-pointer underline hover:text-white">Forgot Password?</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="main-card">
            <button onclick="handleLogout()" class="absolute top-4 right-4 text-[10px] bg-white/10 px-3 py-1 rounded-full border border-white/20 uppercase font-bold">Logout</button>
            <h1 class="text-xl font-black uppercase text-emerald-50">Hidayatul Islam Tracker</h1>
            <div class="timer-box">
                <p id="next-label" class="text-[10px] text-emerald-300 uppercase font-black mb-1">അടുത്ത ബാങ്ക് സമയം</p>
                <div id="timer" class="text-4xl font-black font-mono">00:00:00</div>
            </div>
            <div class="grid grid-cols-5 gap-1 text-[10px] font-black uppercase tracking-tighter">
                <div>Subhi<br><span class="text-yellow-400">05:15</span></div>
                <div>Duhar<br><span>12:38</span></div>
                <div>Asr<br><span>03:58</span></div>
                <div>Maghrib<br><span>06:39</span></div>
                <div>Isha<br><span>07:49</span></div>
            </div>
        </div>
        <div id="list" class="p-5"></div>
        <div class="p-6 text-center border-t border-gray-800 mt-10">
            <p class="text-gray-400 text-xs">Technical Support:</p>
            <p class="font-bold text-emerald-500">Abdul Kareem Falili AL-jalali</p>
            <a href="https://wa.me/919113695271" class="text-xs text-emerald-400 underline">WhatsApp Support</a>
        </div>
    </div>

    <script>
        const PRAYER_TIMES = [
            { id: 'Subhi', h: 5, m: 15 }, { id: 'Duhar', h: 12, m: 38 },
            { id: 'Asr', h: 15, m: 58 }, { id: 'Maghrib', h: 18, m: 39 }, { id: 'Isha', h: 19, m: 49 }
        ];

        function loadTracker() {
            startTimer();
            const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            students.forEach(name => {
                listDiv.innerHTML += `
                    <div class="student-card">
                        <h3 class="font-black text-gray-100 uppercase mb-2 text-lg">${name}</h3>
                        <div class="prayer-grid">
                            ${["Subhi", "Duhar", "Asr", "Maghrib", "Isha"].map(p => `<button onclick="submitP('${name}','${p}',this)" class="p-btn">${p}</button>`).join('')}
                        </div>
                    </div>`;
            });
        }

        function startTimer() {
            setInterval(() => {
                const now = new Date();
                let target = null; let name = "";
                for (let p of PRAYER_TIMES) {
                    let t = new Date(); t.setHours(p.h, p.m, 0);
                    if (t > now) { target = t; name = p.id; break; }
                }
                if (!target) {
                    target = new Date(); target.setDate(target.getDate() + 1);
                    target.setHours(PRAYER_TIMES[0].h, PRAYER_TIMES[0].m, 0); name = PRAYER_TIMES[0].id;
                }
                const diff = target - now;
                const hh = Math.floor(diff/3600000); const mm = Math.floor((diff%3600000)/60000); const ss = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
                document.getElementById('next-label').innerText = `അടുത്ത ബാങ്ക് (${name}) ഇനി:`;
            }, 1000);
        }

        function submitP(n, p, b) {
            if(b.classList.contains('active')) return;
            const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfoB6SzEuo4nrvGKGzdcjrvXLqFCZyu6kKyTa0mG8Gl8yUPMA/formResponse";
            const formData = new FormData();
            formData.append("entry.877237437", n);
            formData.append("entry.330346532", p);
            fetch(FORM_URL, { method: "POST", body: formData, mode: "no-cors" }).then(() => {
                b.classList.add('active'); b.innerText = "✓ " + p;
            });
        }
    </script>
</body>
</html>
