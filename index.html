<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 30px 20px; text-align: center; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
        .p-btn { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 800; width: 100%; }
        .p-btn.active { background: #10b981 !important; color: white !important; }
        .att-btn { padding: 12px 0; border-radius: 10px; font-size: 10px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; border: none; }
        .a-active { background: #dc2626 !important; color: white !important; border: none; }
        .l-active { background: #2563eb !important; color: white !important; border: none; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase tracking-tight">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest">Class 6 - Achangi</p>
        <div id="display-date" class="text-xs font-bold text-amber-400 mt-2 uppercase"></div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card shadow-2xl">
            <h2 class="text-lg font-black text-emerald-700 mb-6 uppercase">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 border rounded-xl mb-4 outline-none bg-gray-50">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 border rounded-xl mb-2 outline-none bg-gray-50">
            
            <div class="text-right mb-6">
                <span onclick="handleResetPassword()" class="text-[10px] text-gray-500 font-bold underline cursor-pointer">Forgot Password?</span>
            </div>

            <button onclick="handleLogin()" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl mb-4">LOGIN</button>
            <p class="text-xs">New user? <span onclick="toggleAuth(true)" class="text-emerald-700 font-bold underline cursor-pointer">Create Account</span></p>
        </div>

        <div id="signup-box" class="card shadow-2xl hidden">
            <h2 class="text-lg font-black text-blue-700 mb-4 uppercase">Create Account</h2>
            <input type="email" id="s-email" placeholder="Email" class="w-full p-4 border rounded-xl mb-4 outline-none">
            <input type="password" id="s-pass" placeholder="Password" class="w-full p-4 border rounded-xl mb-6 outline-none">
            <button onclick="handleSignUp()" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl mb-4">SIGN UP</button>
            <p class="text-xs" onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div class="card text-center">
                <h3 class="text-xs font-black text-gray-400 mb-4 uppercase tracking-widest">Azan Timings</h3>
                <div class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span class="text-emerald-700">05:15</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span class="text-emerald-700">12:38</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span class="text-emerald-700">03:58</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span class="text-emerald-700">06:39</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span class="text-emerald-700">07:49</span></div>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>
        
        <div id="profile-page" class="p-5 hidden text-center">
            <div class="card py-10">
                <i class="fa-solid fa-circle-user text-5xl text-emerald-700 mb-4"></i>
                <p id="user-email-text" class="text-sm font-bold text-gray-500 mb-8"></p>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-3 rounded-xl uppercase text-xs">Sign Out</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-user-circle"></i>ME</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN = "Kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];
        const today = new Date().toLocaleDateString('en-CA');
        document.getElementById('display-date').innerText = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });

        window.navigate = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            ['home', 'tracker', 'attendance', 'history', 'profile'].forEach(pg => document.getElementById(pg+'-page').classList.toggle('hidden', pg !== p));
            if(p === 'tracker') loadTracker();
            if(p === 'attendance') loadAttendance();
            if(p === 'history') loadHistory();
        };

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) document.getElementById('user-email-text').innerText = u.email;
        });

        window.toggleAuth = (showSignup) => {
            document.getElementById('login-box').classList.toggle('hidden', showSignup);
            document.getElementById('signup-box').classList.toggle('hidden', !showSignup);
        };

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        window.handleSignUp = () => createUserWithEmailAndPassword(auth, document.getElementById('s-email').value, document.getElementById('s-pass').value).then(() => alert("Success!")).catch(e => alert(e.message));
        window.handleLogout = () => signOut(auth);

        // Forgot Password Function
        window.handleResetPassword = () => {
            const email = document.getElementById('email').value;
            if(!email) { alert("Please enter your email address first!"); return; }
            sendPasswordResetEmail(auth, email)
                .then(() => alert("Password reset link sent to your email!"))
                .catch(e => alert(e.message));
        };

        function loadTracker() {
            const container = document.getElementById('tracker-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", today)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s + "_" + today] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="grid grid-cols-5 gap-1">
                        ${prayers.map(p => `<button onclick="toggleP('${s}','${p}',${!!d[p]})" class="p-btn ${d[p] ? 'active' : ''}">${d[p] ? '✓' : p}</button>`).join('')}
                    </div></div>`;
                }).join('');
            });
        }

        window.toggleP = (n, p, cur) => setDoc(doc(db, "daily", n + "_" + today), { name: n, date: today, [p]: !cur }, { merge: true });

        function loadAttendance() {
            const isAdmin = auth.currentUser?.email === ADMIN || auth.currentUser?.email === "multicall9@gmail.com";
            const container = document.getElementById('attendance-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", today)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s + "_" + today] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p>
                        <div class="flex gap-2">
                            <button onclick="${isAdmin ? `setA('${s}','P')` : 'alert(\'Usthad only\')'}" class="att-btn ${d.status === 'P' ? 'p-active' : ''}">PRESENT</button>
                            <button onclick="${isAdmin ? `setA('${s}','A')` : 'alert(\'Usthad only\')'}" class="att-btn ${d.status === 'A' ? 'a-active' : ''}">ABSENT</button>
                            <button onclick="${isAdmin ? `setA('${s}','L')` : 'alert(\'Usthad only\')'}" class="att-btn ${d.status === 'L' ? 'l-active' : ''}">LEAVE</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        window.setA = (n, s) => setDoc(doc(db, "daily", n + "_" + today), { name: n, date: today, status: s }, { merge: true });

        async function loadHistory() {
            const snap = await getDocs(collection(db, "daily"));
            const scores = {}; students.forEach(s => scores[s] = 0);
            snap.forEach(d => { const doc = d.data(); if(scores[doc.name] !== undefined) prayers.forEach(p => { if(doc[p]) scores[doc.name]++; }); });
            document.getElementById('history-list').innerHTML = students.sort((a,b) => scores[b]-scores[a]).map(s => `
                <div class="card flex justify-between items-center py-5">
                    <span class="font-black text-sm uppercase">${s}</span>
                    <span class="font-black text-lg text-emerald-600">${scores[s]}</span>
                </div>`).join('');
        }
    </script>
</body>
</html>
