<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Prayer Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #059669; }
        .niskaram-btn { transition: 0.2s; border: 1px solid #e2e8f0; font-weight: 600; font-size: 11px; }
        .active { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .star-box { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .progress-link { font-size: 10px; color: #059669; text-decoration: underline; cursor: pointer; margin-top: 4px; display: inline-block; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-emerald-800 p-8 text-white rounded-b-[3rem] shadow-xl text-center">
        <h1 class="text-2xl font-bold uppercase">Hidayatul Islam Madrasa</h1>
        <p id="today" class="text-emerald-100 mt-1 text-sm"></p>

        <div class="mt-6 grid grid-cols-5 gap-1 bg-emerald-900/40 p-3 rounded-2xl text-[10px]">
            <div>Fajr<br><span class="text-xs font-bold">05:17</span></div>
            <div>Dhuhr<br><span class="text-xs font-bold">12:39</span></div>
            <div>Asr<br><span class="text-xs font-bold">03:59</span></div>
            <div>Maghrib<br><span class="text-xs font-bold">06:38</span></div>
            <div>Isha<br><span class="text-xs font-bold">07:49</span></div>
        </div>
    </div>

    <div class="p-4">
        <div class="star-box shadow-lg">
            <div class="text-3xl mb-1">🏆</div>
            <h2 class="font-black text-lg uppercase tracking-wider">Star of the Week</h2>
            <p class="text-white/90 font-bold mt-1">Dishan, Fazil, Afreena</p>
        </div>

        <div class="space-y-4" id="list"></div>
    </div>

    <script>
        const d = new Date();
        const dateKey = d.toDateString();
        document.getElementById('today').innerText = d.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Luhr", "Asr", "Maghrib", "Isha"];
        
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfoB6SzEuo4nrvGKGzdcjrvXLqFCZyu6kKyTa0mG8Gl8yUPMA/formResponse";
        const NAME_ENTRY = "entry.877237437";
        const PRAYER_ENTRY = "entry.330346532";

        let localData = JSON.parse(localStorage.getItem('hidayatul_p_data')) || { date: dateKey, entries: [] };
        let historyData = JSON.parse(localStorage.getItem('prayer_history')) || {};

        if (localData.date !== dateKey) {
            localData = { date: dateKey, entries: [] };
            localStorage.setItem('hidayatul_p_data', JSON.stringify(localData));
        }

        const listDiv = document.getElementById('list');

        students.forEach(name => {
            let score = localData.entries.filter(e => e.startsWith(name)).length;
            let prayerButtons = prayers.map(p => {
                const isDone = localData.entries.includes(`${name}-${p}`);
                return `<button onclick="submitPrayer('${name}', '${p}', this)" 
                        class="niskaram-btn py-2 rounded-lg bg-gray-50 text-gray-700 ${isDone ? 'active' : ''}">
                        ${p}${isDone ? ' ✓' : ''}</button>`;
            }).join('');

            listDiv.innerHTML += `
                <div class="card p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">${name}</h3>
                            <span onclick="showProgress('${name}')" class="progress-link">📊 My Progress</span>
                        </div>
                        <span class="bg-emerald-100 text-emerald-800 text-[10px] px-3 py-1 rounded-full font-bold">Today: ${score}/5</span>
                    </div>
                    <div class="grid grid-cols-5 gap-2">${prayerButtons}</div>
                </div>
            `;
        });

        function submitPrayer(studentName, prayerName, btn) {
            if(btn.classList.contains('active')) return;
            const formData = new FormData();
            formData.append(NAME_ENTRY, studentName);
            formData.append(PRAYER_ENTRY, prayerName);
            fetch(FORM_URL, { method: "POST", body: formData, mode: "no-cors" }).then(() => {
                btn.classList.add('active');
                btn.innerHTML += ' ✓';
                localData.entries.push(`${studentName}-${prayerName}`);
                localStorage.setItem('hidayatul_p_data', JSON.stringify(localData));
                
                // ചരിത്രം സേവ് ചെയ്യുന്നു
                historyData[studentName] = (historyData[studentName] || 0) + 1;
                localStorage.setItem('prayer_history', JSON.stringify(historyData));
                
                alert(`${studentName}-ന്റെ ${prayerName} രേഖപ്പെടുത്തി!`);
                location.reload(); 
            });
        }

        function showProgress(name) {
            let total = historyData[name] || 0;
            alert(`${name}, നിങ്ങൾ ഈ ആഴ്ച ഇതുവരെ ${total} നിസ്കാരങ്ങൾ പൂർത്തിയാക്കിയിട്ടുണ്ട്! മാഷാ അള്ളാ!`);
        }
    </script>
</body>
</html>
