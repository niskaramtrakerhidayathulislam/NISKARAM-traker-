<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .input-style { w-full p-4 border rounded-xl mb-4 outline-none bg-[#f0f4f8] border-none text-sm; }
        .p-btn { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 800; width: 100%; }
        .p-btn.active { background: #10b981 !important; color: white !important; }
        .att-btn { padding: 12px 0; border-radius: 10px; font-size: 10px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; border: none; }
        .a-active { background: #dc2626 !important; color: white !important; border: none; }
        .l-active { background: #2563eb !important; color: white !important; border: none; }
        .date-picker-input { background: #047857; color: white; border: none; font-weight: bold; padding: 5px 10px; border-radius: 8px; font-size: 12px; outline: none; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase tracking-tight">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest mb-3">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="date-picker-input" onchange="changeDate(this.value)">
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase tracking-widest">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] outline-none text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-[#f0f4f8] outline-none text-sm">
            
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-6 shadow-lg uppercase tracking-widest">Login</button>
            
            <div class="flex flex-col gap-3">
                <p class="text-xs font-bold text-gray-500">New user? <span onclick="toggleAuth(true)" class="text-emerald-700 underline cursor-pointer">Create Account</span></p>
                <p onclick="handleResetPassword()" class="text-[10px] text-gray-400 font-bold underline cursor-pointer uppercase tracking-tighter">Forgot Password?</p>
            </div>
        </div>

        <div id="signup-box" class="card hidden">
            <h2 class="text-xl font-black text-blue-800 mb-8 uppercase tracking-widest">Register</h2>
            <input type="email" id="s-email" placeholder="Enter Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] outline-none text-sm">
            <input type="password" id="s-pass" placeholder="Create Password" class="w-full p-4 rounded-xl mb-6 bg-[#f0f4f8] outline-none text-sm">
            
            <button onclick="handleSignUp()" class="w-full bg-blue-800 text-white font-black py-4 rounded-xl mb-6 shadow-lg uppercase tracking-widest">Create Account</button>
            
            <p onclick="toggleAuth(false)" class="text-xs font-bold text-gray-500 underline cursor-pointer uppercase">Back to Login</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div class="card bg-emerald-50 border-emerald-100 mb-4 text-center">
                <p class="text-[10px] font-black text-emerald-800 uppercase tracking-widest">Madrasa Status</p>
                <p class="font-bold text-sm text-amber-600 mt-1">Ramadan/Eid Leave</p>
            </div>
            <div class="card">
                <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase flex justify-between">Azan Timings</h3>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi" class="text-emerald-700">05:15</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar" class="text-emerald-700">12:38</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span id="t-asr" class="text-emerald-700">03:58</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span id="t-magh" class="text-emerald-700">06:39</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span id="t-isha" class="text-emerald-700">07:49</span></div>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>
        
        <div id="profile-page" class="p-5 hidden text-center">
            <div class="card py-10">
                <p id="user-email-text" class="text-xs font-bold text-gray-500 mb-8"></p>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-3 rounded-xl uppercase text-[10px]">Sign Out</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-user-circle"></i>ME</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN = "kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        document.getElementById('global-date').value = selectedDate;

        window.changeDate = (val) => { selectedDate = val; navigate(document.querySelector('.nav-item.active').innerText.toLowerCase(), null); };

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) document.getElementById('user-email-text').innerText = u.email;
        });

        window.toggleAuth = (showSignup) => {
            document.getElementById('login-box').classList.toggle('hidden', showSignup);
            document.getElementById('signup-box').classList.toggle('hidden', !showSignup);
        };

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        window.handleSignUp = () => createUserWithEmailAndPassword(auth, document.getElementById('s-email').value, document.getElementById('s-pass').value).then(() => alert("Success!")).catch(e => alert(e.message));
        window.handleLogout = () => signOut(auth);
        window.handleResetPassword = () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Enter email!");
            sendPasswordResetEmail(auth, email).then(() => alert("Reset link sent to email!")).catch(e => alert(e.message));
        };

        window.navigate = (p, el) => {
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            ['home', 'tracker', 'attendance', 'history', 'profile'].forEach(pg => document.getElementById(pg+'-page').classList.toggle('hidden', !pg.includes(p)));
            if(p.includes('tracker')) loadTracker();
            if(p.includes('attendance')) loadAttendance();
            if(p.includes('history')) loadHistory();
        };

        function loadTracker() {
            const container = document.getElementById('tracker-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="grid grid-cols-5 gap-1">
                        ${["Subhi","Duhar","Asr","Maghrib","Isha"].map(p => `<button onclick="toggleP('${s}','${p}',${!!d[p]})" class="p-btn ${d[p] ? 'active' : ''}">${d[p] ? '✓' : p}</button>`).join('')}
                    </div></div>`;
                }).join('');
            });
        }

        function loadAttendance() {
            const isAdmin = auth.currentUser?.email.toLowerCase() === ADMIN.toLowerCase();
            const container = document.getElementById('attendance-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p>
                        <div class="flex gap-2">
                            <button onclick="${isAdmin ? `setA('${s}','P')` : 'alert(\'Usthad only\')'}" class="att-btn ${d.status === 'P' ? 'p-active' : ''}">PRESENT</button>
                            <button onclick="${isAdmin ? `setA('${s}','A')` : 'alert(\'Usthad only\')'}" class="att-btn ${d.status === 'A' ? 'a-active' : ''}">ABSENT</button>
                            <button onclick="${isAdmin ? `setA('${s}','L')` : 'alert(\'Usthad only\')'}" class="att-btn ${d.status === 'L' ? 'l-active' : ''}">LEAVE</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        async function loadHistory() {
            const snap = await getDocs(collection(db, "daily"));
            const stats = {}; students.forEach(s => stats[s] = { p:0, pr:0, abs:0, leave:0 });
            snap.forEach(d => {
                const doc = d.data();
                if(stats[doc.name]) {
                    ["Subhi","Duhar","Asr","Maghrib","Isha"].forEach(p => { if(doc[p]) stats[doc.name].pr++; });
                    if(doc.status === 'P') stats[doc.name].p++;
                    if(doc.status === 'A') stats[doc.name].abs++;
                    if(doc.status === 'L') stats[doc.name].leave++;
                }
            });
            document.getElementById('history-list').innerHTML = students.map(s => `
                <div class="card"><p class="font-black text-sm uppercase mb-2">${s}</p>
                <div class="flex justify-between text-[10px] font-bold">
                    <span class="text-emerald-600">PRAYERS: ${stats[s].pr}</span>
                    <span class="text-blue-600">PRESENT: ${stats[s].p}</span>
                    <span class="text-red-600">ABSENT: ${stats[s].abs}</span>
                    <span class="text-gray-500">LEAVE: ${stats[s].leave}</span>
                </div></div>`).join('');
        }

        window.toggleP = (n, p, cur) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, [p]: !cur }, { merge: true });
        window.setA = (n, s) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, status: s }, { merge: true });
    </script>
</body>
</html>
