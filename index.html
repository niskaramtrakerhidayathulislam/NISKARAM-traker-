<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 90px; }
        .hidden { display: none; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .glass-header { background: linear-gradient(135deg, #065f46 0%, #059669 100%); color: white; border-radius: 0 0 35px 35px; padding: 40px 20px; text-align: center; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #94a3b8; font-weight: 800; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; text-transform: uppercase; }
        .admin-only { background: #f0fdf4; border: 1px dashed #10b981; padding: 15px; border-radius: 15px; margin: 15px; }
    </style>
</head>
<body>

    <div id="auth-page" class="min-h-screen flex flex-col justify-center px-6">
        <div class="card py-10 text-center">
            <h2 class="text-2xl font-black text-emerald-900 mb-6 uppercase">Hidayatul Islam</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl bg-gray-50 mb-4 border font-bold outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-gray-50 mb-6 border font-bold outline-none">
            <button onclick="handleAuth()" id="auth-btn" class="btn-main">Login</button>
            <p class="mt-6 text-xs font-bold text-gray-400 uppercase">New? <span onclick="toggleAuth()" id="toggle-text" class="text-emerald-700 underline">Register</span></p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="glass-header shadow-lg">
            <h1 id="display-madrasa-name" class="text-2xl font-black uppercase tracking-tighter">Hidayatul Islam</h1>
            <p id="display-sub-text" class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Achangi • Class 6 • 2026</p>
        </div>

        <div id="home-page" class="view-page p-4">
            <div id="admin-header-tool" class="admin-only hidden mb-4">
                <p class="text-[9px] font-black text-emerald-700 mb-3 uppercase text-center"><i class="fa-solid fa-pen-to-square"></i> Edit Header Details (Usthad Only)</p>
                <div class="space-y-2">
                    <input type="text" id="edit-name" placeholder="Madrasa Name" class="w-full p-3 rounded-lg border text-xs font-bold outline-none">
                    <input type="text" id="edit-sub" placeholder="Place, Class & Year (e.g. Achangi • Class 6)" class="w-full p-3 rounded-lg border text-xs font-bold outline-none">
                    <button onclick="updateHeader()" class="w-full bg-emerald-700 text-white py-3 rounded-xl text-[10px] font-black uppercase">Update Header</button>
                </div>
            </div>

            <div id="admin-notice-tool" class="admin-only hidden">
                <p class="text-[9px] font-black text-red-600 mb-2 uppercase">Post Leave Notice</p>
                <textarea id="leave-reason" class="w-full p-3 border rounded-xl text-xs mb-2 outline-none" placeholder="Reason for leave..."></textarea>
                <button onclick="postLeave()" class="bg-red-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase">Post Leave</button>
            </div>
            
            <div class="card mt-4">
                <p class="text-[10px] font-black text-gray-400 text-center mb-4 uppercase">Azan Timings</p>
                <div id="azan-display" class="grid grid-cols-5 gap-1 text-[9px] font-bold text-emerald-800 text-center">
                    <div class="bg-emerald-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi">05:15</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar">12:38</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ASR<br><span id="t-asr">03:58</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">MAGH<br><span id="t-magh">06:39</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ISHA<br><span id="t-isha">07:49</span></div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house text-xl mb-1"></i><br>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-calendar-check text-xl mb-1"></i><br>TRACKER</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-graduation-cap text-xl mb-1"></i><br>RESULTS</div>
            <div onclick="logout()" class="nav-item"><i class="fa-solid fa-power-off text-xl mb-1 text-red-400"></i><br>EXIT</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            if(u) {
                const isAdmin = u.email === ADMIN_EMAIL;
                document.getElementById('admin-header-tool').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-notice-tool').classList.toggle('hidden', !isAdmin);
                syncHeader();
            }
        });

        // Header വിവരങ്ങൾ ഡാറ്റാബേസിൽ നിന്ന് എടുക്കുന്നു
        function syncHeader() {
            onSnapshot(doc(db, "settings", "header_info"), (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    document.getElementById('display-madrasa-name').innerText = data.name || "Hidayatul Islam";
                    document.getElementById('display-sub-text').innerText = data.subtext || "Achangi • Class 6 • 2026";
                }
            });
        }

        // Header അപ്ഡേറ്റ് ചെയ്യുന്നു (Admin Only)
        window.updateHeader = async () => {
            const name = document.getElementById('edit-name').value;
            const sub = document.getElementById('edit-sub').value;
            if(!name || !sub) return alert("Please fill both fields!");
            
            await setDoc(doc(db, "settings", "header_info"), {
                name: name,
                subtext: sub
            }, { merge: true });
            
            alert("Header Updated Successfully!");
            document.getElementById('edit-name').value = "";
            document.getElementById('edit-sub').value = "";
        };

        // ... (handleAuth, logout, navigate functions old same) ...
        window.handleAuth = () => { /* ... */ }; 
        window.logout = () => signOut(auth);
        window.navigate = (p, el) => { /* ... */ };
    </script>
</body>
</html>
