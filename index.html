<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Madrasa - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 100px; }
        .glass-header { background: linear-gradient(135deg, #065f46 0%, #059669 100%); color: white; border-radius: 0 0 50px 50px; padding: 40px 20px; text-align: center; }
        .section-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .namaz-btn { flex: 1; text-align: center; py: 3; border-radius: 12px; border: 1px solid #f1f5f9; font-size: 10px; font-weight: 800; color: #cbd5e1; background: white; }
        .active-green { background: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .att-status { font-size: 10px; font-weight: 800; }
        .present-text { color: #10b981; }
        .absent-text { color: #ef4444; }
        .admin-box { display: none; background: #fffbeb; border: 1px dashed #f59e0b; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .show-admin { display: block !important; }
    </style>
</head>
<body>

    <div class="glass-header shadow-lg">
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-sm font-bold uppercase tracking-wider">Niscaram Tracker</h2>
            <img src="https://www.samastha.in/logo.png" class="h-8 w-8 rounded-full bg-white p-1" alt="Logo">
        </div>
        <h1 class="text-2xl font-black mb-1">ಹಿದಾಯತುಲ್ ಇಸ್ಲಾಂ ಮದರಸ</h1>
        <p class="text-xs opacity-80 font-medium mb-4">ಅಚಂಗಿ, ಸಕ್ಲೇಶಪುರ</p>
        <div class="flex justify-center">
            <input type="date" id="global-date" class="bg-white/20 border-none text-white font-bold text-sm p-2 rounded-xl outline-none text-center">
        </div>
    </div>

    <div class="p-4 max-w-md mx-auto">

        <div class="grid grid-cols-5 gap-2 mb-6">
            <div class="bg-emerald-50 p-2 rounded-xl text-center border border-emerald-100">
                <p class="text-[8px] font-black text-emerald-800">05:13</p>
            </div>
            <div class="bg-emerald-50 p-2 rounded-xl text-center border border-emerald-100">
                <p class="text-[8px] font-black text-emerald-800">12:37</p>
            </div>
            <div class="bg-emerald-50 p-2 rounded-xl text-center border border-emerald-100">
                <p class="text-[8px] font-black text-emerald-800">03:57</p>
            </div>
            <div class="bg-emerald-50 p-2 rounded-xl text-center border border-emerald-100">
                <p class="text-[8px] font-black text-emerald-800">06:39</p>
            </div>
            <div class="bg-emerald-50 p-2 rounded-xl text-center border border-emerald-100">
                <p class="text-[8px] font-black text-emerald-800">07:49</p>
            </div>
        </div>

        <div class="section-card bg-[#064e3b] text-white">
            <div class="flex items-center gap-2 mb-2 opacity-70">
                <i class="fa-solid fa-book-open text-sm"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">ಇಂದಿನ ಮನೆಗೆಲಸ</p>
            </div>
            <p id="display-homework" class="text-sm font-bold">ಯಾವುದೇ ಅಪ್‌ಡೇಟ್ ಇಲ್ಲ.</p>
        </div>

        <div id="admin-tools" class="admin-box">
            <p class="text-center text-[10px] font-black text-amber-800 mb-3 uppercase">Usthad Control Panel</p>
            <textarea id="homework-input" class="w-full p-3 border rounded-xl text-xs font-bold mb-2 outline-none" placeholder="Update homework here..."></textarea>
            <button onclick="saveHomework()" class="w-full bg-emerald-700 text-white py-3 rounded-xl text-[10px] font-black uppercase">Post Homework</button>
        </div>

        <div class="section-card">
            <div class="flex items-center justify-center gap-2 mb-6 opacity-40">
                <i class="fa-solid fa-user-check text-sm"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">ದೈನಂದಿನ ಹಾಜರಾತಿ</p>
            </div>
            <div id="attendance-list" class="space-y-4">
                </div>
        </div>

        <div class="flex items-center justify-center gap-2 mb-4 opacity-40 mt-8">
            <i class="fa-solid fa-person-praying text-sm"></i>
            <p class="text-[10px] font-black uppercase tracking-widest">ನಮಾಜ್ ಟ್ರ್ಯಾಕರ್</p>
        </div>
        <div id="namaz-list" class="space-y-3">
            </div>

        <div class="py-12 text-center">
            <button onclick="triggerAdmin()" class="text-[8px] font-black text-gray-200 uppercase tracking-[5px]">Admin</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let isAdmin = false;

        document.getElementById('global-date').value = selectedDate;
        document.getElementById('global-date').onchange = (e) => { selectedDate = e.target.value; loadAll(); };

        window.triggerAdmin = () => {
            const pin = prompt("Enter Admin PIN:");
            if(pin === "8181") {
                isAdmin = true;
                document.getElementById('admin-tools').classList.add('show-admin');
                alert("Admin Mode Enabled");
            }
        };

        function loadAll() {
            renderAttendance();
            renderNamaz();
        }

        function renderAttendance() {
            const container = document.getElementById('attendance-list');
            container.innerHTML = students.map(name => `
                <div class="flex justify-between items-center px-2">
                    <span class="text-xs font-black text-gray-700 uppercase">${name}</span>
                    <button onclick="toggleAttendance('${name}')" id="att-${name}" class="text-[10px] font-black text-gray-200">...</button>
                </div>
            `).join('');
            
            students.forEach(name => {
                onSnapshot(doc(db, "daily_attendance", `${selectedDate}_${name}`), snap => {
                    const btn = document.getElementById(`att-${name}`);
                    if(btn && snap.exists()){
                        const status = snap.data().status;
                        btn.innerHTML = status === 'present' ? '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>' : '<i class="fa-solid fa-circle-xmark text-rose-400 text-lg"></i>';
                    } else if(btn) { btn.innerHTML = '<i class="fa-solid fa-circle text-gray-100 text-lg"></i>'; }
                });
            });
        }

        function renderNamaz() {
            const container = document.getElementById('namaz-list');
            container.innerHTML = students.map(name => `
                <div class="bg-white p-4 rounded-[20px] shadow-sm border border-gray-50">
                    <p class="text-[10px] font-black uppercase mb-3 text-emerald-900 ml-1">${name}</p>
                    <div class="flex gap-1">
                        ${["Subhi", "Duhar", "Asr", "Maghrib", "Isha"].map(p => `
                            <button onclick="toggleNamaz('${name}','${p}')" id="n-${name}-${p}" class="namaz-btn py-3 rounded-lg border text-[10px] font-bold uppercase">${p[0]}</button>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            students.forEach(name => {
                onSnapshot(doc(db, "namaz_tracker", `${selectedDate}_${name}`), snap => {
                    const data = snap.data();
                    ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"].forEach(p => {
                        const btn = document.getElementById(`n-${name}-${p}`);
                        if(btn){
                            if(data && data[p]) btn.classList.add('active-green');
                            else btn.classList.remove('active-green');
                        }
                    });
                });
            });
        }

        window.toggleAttendance = async (name) => {
            if(!isAdmin) return;
            const ref = doc(db, "daily_attendance", `${selectedDate}_${name}`);
            const snap = await getDoc(ref);
            await setDoc(ref, { name: name, status: (snap.exists() && snap.data().status === 'present') ? 'absent' : 'present' });
        };

        window.toggleNamaz = async (name, p) => {
            if(!isAdmin) return;
            const ref = doc(db, "namaz_tracker", `${selectedDate}_${name}`);
            const snap = await getDoc(ref);
            await setDoc(ref, { [p]: !(snap.exists() && snap.data()[p]) }, { merge: true });
        };

        window.saveHomework = async () => {
            const text = document.getElementById('homework-input').value;
            await setDoc(doc(db, "settings", "homework"), { text: text });
            document.getElementById('homework-input').value = "";
            alert("Updated");
        };

        onSnapshot(doc(db, "settings", "homework"), snap => {
            if(snap.exists()) document.getElementById('display-homework').innerText = snap.data().text;
        });

        loadAll();
    </script>
</body>
</html>
