<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Madrasa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f1f5f9; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 90px; }
        .hidden { display: none; }
        .card { background: white; border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { background: var(--primary); color: white; padding: 40px 20px; border-radius: 0 0 30px 30px; text-align: center; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; text-transform: uppercase; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { font-size: 10px; font-weight: 800; color: #94a3b8; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-page" class="min-h-screen flex flex-col justify-center px-6">
        <div class="card py-10 text-center shadow-2xl">
            <h2 class="text-3xl font-black text-emerald-900 mb-2 uppercase tracking-tighter">Madrasa Connect</h2>
            <p class="text-[10px] font-bold text-gray-400 mb-8 uppercase">Hidayatul Islam • Achangi</p>
            
            <div id="login-form">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl bg-gray-50 mb-4 border-none outline-none font-bold text-sm">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-gray-50 mb-6 border-none outline-none font-bold text-sm">
                <button onclick="handleAuth()" id="auth-btn" class="btn-main shadow-lg active:scale-95 transition-all">Login</button>
                <p class="mt-8 text-xs font-bold text-gray-400">Don't have an account? <span onclick="toggleAuth()" id="toggle-text" class="text-emerald-700 underline cursor-pointer">Register</span></p>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="header shadow-lg">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Hidayatul Islam</h1>
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Class 6 • New Edition 2026</p>
        </div>

        <div id="home-page" class="page-view">
            <div class="card text-center">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Azan Timings</h3>
                <div class="grid grid-cols-5 gap-1 text-[9px] font-bold text-emerald-800">
                    <div class="bg-emerald-50 p-2 rounded-lg">SUBHI<br>05:15</div>
                    <div class="bg-emerald-50 p-2 rounded-lg">DUHAR<br>12:38</div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ASR<br>03:58</div>
                    <div class="bg-emerald-50 p-2 rounded-lg">MAGH<br>06:39</div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ISHA<br>07:49</div>
                </div>
            </div>
            <div class="card p-10 text-center">
                <i class="fa-solid fa-circle-check text-5xl text-emerald-600 mb-4"></i>
                <h2 class="font-black text-emerald-900 uppercase">Success!</h2>
                <p class="text-xs text-gray-500 mt-2">ലോഗിൻ പൂർത്തിയായി. ബാക്കി വിവരങ്ങൾ ഓരോന്നായി നമുക്ക് ഇവിടെ ചേർക്കാം.</p>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-house text-xl mb-1"></i><br>HOME</div>
            <div onclick="logout()" class="nav-item"><i class="fa-solid fa-power-off text-xl mb-1 text-red-400"></i><br>LOGOUT</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Your New Config
        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9",
            measurementId: "G-8NW073CSLY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
        });

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggle-text').innerText = isLogin ? 'Register' : 'Login';
        };

        window.handleAuth = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if (isLogin) {
                signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            } else {
                createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            }
        };

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
