<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; overflow-x: hidden; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 9px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .att-btn { padding: 12px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; border: none; }
        .a-active { background: #dc2626 !important; color: white !important; border: none; }
        .chat-container { height: 350px; overflow-y: auto; background: #f9fafb; padding: 10px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; max-width: 80%; padding: 10px; border-radius: 15px; font-size: 13px; position: relative; }
        .msg-own { background: #dcf8c6; margin-left: auto; border-bottom-right-radius: 2px; }
        .msg-other { background: white; margin-right: auto; border-bottom-left-radius: 2px; border: 1px solid #eee; }
        .msg-info { font-size: 8px; color: #888; display: block; margin-top: 4px; }
        .voice-btn { background: #065f46; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .subject-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .sub-box { background: #f1f5f9; padding: 6px; border-radius: 8px; text-align: center; font-size: 10px; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3 uppercase">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none" onchange="changeDate(this.value)">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div id="holiday-banner" class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-xl hidden mb-4">
                <p class="font-black text-amber-800 text-[10px] uppercase">📢 Notice</p>
                <p id="holiday-reason-text" class="text-sm font-bold text-amber-900"></p>
            </div>
            <div id="admin-holiday-tool" class="card hidden border-emerald-300 bg-emerald-50">
                <textarea id="holiday-reason-input" class="w-full p-3 border rounded-xl text-xs mb-3 outline-none" placeholder="Type leave reason..."></textarea>
                <button onclick="toggleGlobalHoliday()" id="holiday-toggle-btn" class="w-full py-3 rounded-xl text-xs font-black uppercase text-white shadow-md"></button>
            </div>
            <div class="card mt-2">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3 text-center">Azan Timings</p>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase text-center">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span id="t-subhi" class="text-emerald-700">05:15</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span id="t-duhar" class="text-emerald-700">12:38</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span id="t-asr" class="text-emerald-700">03:58</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span id="t-magh" class="text-emerald-700">06:39</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span id="t-isha" class="text-emerald-700">07:49</span></div>
                </div>
                <div id="admin-azan-tool" class="hidden border-t mt-4 pt-4">
                    <div class="grid grid-cols-5 gap-1 mb-3">
                        <input type="text" id="up-subhi" placeholder="Subhi" class="p-1 border rounded text-[9px]">
                        <input type="text" id="up-duhar" placeholder="Duhar" class="p-1 border rounded text-[9px]">
                        <input type="text" id="up-asr" placeholder="Asr" class="p-1 border rounded text-[9px]">
                        <input type="text" id="up-magh" placeholder="Magh" class="p-1 border rounded text-[9px]">
                        <input type="text" id="up-isha" placeholder="Isha" class="p-1 border rounded text-[9px]">
                    </div>
                    <button onclick="updateAzanTimes()" class="w-full bg-emerald-600 text-white py-2 rounded-lg text-[10px] font-black uppercase">Update Timings</button>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        <div id="results-page" class="p-5 hidden">
            <h2 class="text-center font-black text-emerald-800 uppercase mb-4 tracking-widest">Public Results 2026</h2>
            <input type="text" id="search-results" onkeyup="searchStudent()" placeholder="Search student name..." class="w-full p-4 mb-4 rounded-xl border-none outline-none shadow-sm text-sm">
            <div id="results-list"></div>
        </div>
        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>

        <div id="profile-page" class="p-5 hidden">
            <div class="card text-center mb-4">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <i class="fa-solid fa-circle-user text-6xl text-emerald-700"></i>
                    <div class="text-left">
                        <p id="user-email-text" class="text-sm font-black text-gray-700"></p>
                        <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full font-bold uppercase">Online Member</span>
                    </div>
                </div>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-2 rounded-xl text-[10px] uppercase">Sign Out</button>
            </div>

            <div class="card p-4">
                <h3 class="text-xs font-black text-gray-500 uppercase mb-4 tracking-widest border-b pb-2"><i class="fa-solid fa-comments mr-2"></i>Community Chat</h3>
                <div id="chat-messages" class="chat-container"></div>
                <div id="typing-indicator" class="text-[10px] text-gray-400 italic mb-1 h-4"></div>
                <div class="flex gap-2 items-center">
                    <label class="cursor-pointer text-gray-400"><i class="fa-solid fa-image text-xl"></i><input type="file" id="chat-img" class="hidden" accept="image/*" onchange="uploadImage()"></label>
                    <input type="text" id="chat-input" placeholder="Type message..." class="flex-1 p-3 bg-gray-100 rounded-xl text-sm outline-none border-none" oninput="showTyping()">
                    <button id="send-btn" onclick="sendMessage()" class="bg-emerald-700 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
                    <button id="record-btn" onmousedown="startRecording()" onmouseup="stopRecording()" class="voice-btn shadow-lg"><i class="fa-solid fa-microphone"></i></button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-scroll"></i>RESULTS</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-comments"></i>CHAT</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card shadow-2xl">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase tracking-widest">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 outline-none text-sm border-none shadow-inner">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-2 bg-gray-100 outline-none text-sm border-none shadow-inner">
            <div class="text-right mb-6"><span onclick="handleResetPassword()" class="text-[10px] text-gray-500 font-bold underline cursor-pointer uppercase">Forgot Password?</span></div>
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-6 shadow-lg uppercase">Login</button>
            <p class="text-xs font-bold text-gray-400">New parent? <span onclick="toggleAuth(true)" class="text-emerald-700 underline cursor-pointer">Create Account</span></p>
        </div>
        <div id="signup-box" class="card hidden">
            <h2 class="text-xl font-black text-blue-800 mb-8 uppercase tracking-widest">Register</h2>
            <input type="email" id="s-email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-gray-100 border-none outline-none">
            <input type="password" id="s-pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-gray-100 border-none outline-none">
            <button onclick="handleSignUp()" class="w-full bg-blue-800 text-white font-black py-4 rounded-xl mb-4 uppercase">Sign Up</button>
            <p onclick="toggleAuth(false)" class="text-xs font-bold text-gray-400 underline cursor-pointer uppercase">Back to Login</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let globalHoliday = false;

        const fullResults = [
            { name: "MUHAMMAD SIFAN", reg: "550211", scores: { "Dur-1": "90 A", "Fiq": "77 B+", "Taj": "84 A", "Dur-2": "69 B", "Quran": "78 B+", "Prac": "92 A+" }, total: 490, remark: "DISTINCTION" },
            { name: "MUHAMMAD YASEEN", reg: "550212", scores: { "Dur-1": "68 B", "Fiq": "68 B", "Taj": "60 C+", "Dur-2": "63 B", "Quran": "72 B+", "Prac": "88 A" }, total: 419, remark: "PASSED" },
            { name: "MUHAMMAD SUHAIR", reg: "550213", scores: { "Dur-1": "80 B+", "Fiq": "76 B+", "Taj": "87 A", "Dur-2": "76 B+", "Quran": "69 B", "Prac": "95 A+" }, total: 483, remark: "DISTINCTION" },
            { name: "MUHAMMAD FAZIL", reg: "550214", scores: { "Dur-1": "81 A", "Fiq": "77 B+", "Taj": "78 B+", "Dur-2": "74 B+", "Quran": "45 C", "Prac": "94 A+" }, total: 449, remark: "PASSED" },
            { name: "TWALHATH", reg: "550215", scores: { "Dur-1": "57 C+", "Fiq": "49 C", "Taj": "52 C+", "Dur-2": "45 C", "Quran": "68 B", "Prac": "98 A++" }, total: 369, remark: "PASSED" },
            { name: "MUHAMMAD DISHAN K.A", reg: "550216", scores: { "Dur-1": "90 A", "Fiq": "89 A", "Taj": "91 A+", "Dur-2": "81 A", "Quran": "80 B+", "Prac": "98 A++" }, total: 529, remark: "DISTINCTION" },
            { name: "RASEENA", reg: "550217", scores: { "Dur-1": "60 C+", "Fiq": "58 C+", "Taj": "40 C", "Dur-2": "54 C+", "Quran": "40 C", "Prac": "98 A++" }, total: 350, remark: "PASSED" },
            { name: "NAFEESATH AIZA", reg: "550218", scores: { "Dur-1": "58 C+", "Fiq": "50 C", "Taj": "52 C+", "Dur-2": "53 C+", "Quran": "47 C", "Prac": "95 A+" }, total: 355, remark: "PASSED" },
            { name: "AFREENA", reg: "550219", scores: { "Dur-1": "76 B+", "Fiq": "76 B+", "Taj": "81 A", "Dur-2": "70 B", "Quran": "70 B", "Prac": "99 A++" }, total: 472, remark: "PASSED" },
            { name: "MISHA FATHIMA", reg: "550220", scores: { "Dur-1": "40 C", "Fiq": "47 C", "Taj": "50 C", "Dur-2": "47 C", "Quran": "44 C", "Prac": "85 A" }, total: 313, remark: "PASSED" },
            { name: "SHAKIRA", reg: "550221", scores: { "Dur-1": "96 A++", "Fiq": "96 A++", "Taj": "95 A+", "Dur-2": "91 A+", "Quran": "80 B+", "Prac": "100 A++" }, total: 558, remark: "DISTINCTION" },
            { name: "FATHIMATH RIFA", reg: "550222", scores: { "Dur-1": "75 B+", "Fiq": "72 B+", "Taj": "75 B+", "Dur-2": "66 B", "Quran": "51 C+", "Prac": "83 A" }, total: 422, remark: "PASSED" },
            { name: "SUHAIBA", reg: "550223", scores: { "Dur-1": "79 B+", "Fiq": "68 B", "Taj": "86 A", "Dur-2": "73 B+", "Quran": "50 C", "Prac": "93 A+" }, total: 449, remark: "PASSED" },
            { name: "KADEEJATHU NILA", reg: "550224", scores: { "Dur-1": "84 A", "Fiq": "70 B", "Taj": "84 A", "Dur-2": "78 B+", "Quran": "71 B+", "Prac": "100 A++" }, total: 487, remark: "DISTINCTION" },
            { name: "FATHIMATH FIDA", reg: "550225", scores: { "Dur-1": "79 B+", "Fiq": "77 B+", "Taj": "80 B+", "Dur-2": "64 B", "Quran": "73 B+", "Prac": "99 A++" }, total: 472, remark: "PASSED" }
        ];

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('user-email-text').innerText = u.email;
                const isAdmin = u.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                document.getElementById('admin-holiday-tool').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-azan-tool').classList.toggle('hidden', !isAdmin);
                syncHoliday();
                loadAzanTimes();
                loadChat();
            }
        });

        // AZAN EDIT
        window.updateAzanTimes = () => {
            const data = { subhi: document.getElementById('up-subhi').value, duhar: document.getElementById('up-duhar').value, asr: document.getElementById('up-asr').value, magh: document.getElementById('up-magh').value, isha: document.getElementById('up-isha').value };
            setDoc(doc(db, "settings", "timings"), data, {merge: true}).then(() => alert("Updated!"));
        };
        function loadAzanTimes() {
            onSnapshot(doc(db, "settings", "timings"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    if(d.subhi) document.getElementById('t-subhi').innerText = d.subhi;
                    if(d.duhar) document.getElementById('t-duhar').innerText = d.duhar;
                    if(d.asr) document.getElementById('t-asr').innerText = d.asr;
                    if(d.magh) document.getElementById('t-magh').innerText = d.magh;
                    if(d.isha) document.getElementById('t-isha').innerText = d.isha;
                }
            });
        }

        // CHAT SYSTEM
        window.sendMessage = async () => {
            const text = document.getElementById('chat-input').value;
            if(!text.trim()) return;
            await addDoc(collection(db, "chats"), {
                sender: auth.currentUser.email,
                text: text,
                type: 'text',
                time: Timestamp.now()
            });
            document.getElementById('chat-input').value = "";
        };

        function loadChat() {
            const q = query(collection(db, "chats"), orderBy("time", "desc"), limit(50));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isOwn = m.sender === auth.currentUser.email;
                    container.innerHTML += `
                        <div class="msg ${isOwn ? 'msg-own' : 'msg-other'}">
                            <span class="text-[9px] font-bold text-emerald-800">${m.sender.split('@')[0]}</span>
                            <p>${m.type === 'text' ? m.text : m.type === 'img' ? `<img src="${m.url}" class="rounded-lg max-w-full">` : `<i class="fa-solid fa-microphone mr-2"></i> Voice Message`}</p>
                            <span class="msg-info">${m.time?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // VOICE & IMAGE SIMULATION (For Web Integration)
        window.uploadImage = () => { alert("Image selected. Integration ready!"); };
        window.startRecording = () => { document.getElementById('record-btn').style.background = 'red'; };
        window.stopRecording = () => { document.getElementById('record-btn').style.background = '#065f46'; alert("Voice recorded!"); };
        window.showTyping = () => { setDoc(doc(db, "status", "typing"), { user: auth.currentUser.email.split('@')[0], time: Date.now() }); };

        // NAVIGATION & OTHER FEATURES (Attendance, Result, History - Remains Correct)
        window.navigate = (p, el) => {
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            ['home', 'tracker', 'attendance', 'results', 'history', 'profile'].forEach(pg => document.getElementById(pg+'-page').classList.toggle('hidden', !pg.includes(p)));
            if(p === 'results') loadResults();
            if(p.includes('tracker
