<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
        .p-btn { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 800; width: 100%; }
        .p-btn.active { background: #10b981 !important; color: white !important; }
        .att-btn { padding: 15px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; }
        .a-active { background: #dc2626 !important; color: white !important; }
        .status-leave { background: #2563eb; color: white; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 900; text-align: center; }
        .notice-card { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none" onchange="changeDate(this.value)">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div id="holiday-banner" class="notice-card hidden">
                <p class="font-black text-amber-800 uppercase text-[10px] mb-1">📢 മദ്‌റസ അറിയിപ്പ്</p>
                <p id="holiday-reason-text" class="text-sm font-bold text-amber-900"></p>
            </div>

            <div id="admin-holiday-tool" class="card hidden border-emerald-300 bg-emerald-50">
                <p class="text-[10px] font-black text-emerald-800 uppercase mb-3 text-center">അവധി അറിയിപ്പ് നൽകുക</p>
                <textarea id="holiday-reason-input" class="w-full p-3 border rounded-xl text-xs mb-3 outline-none" placeholder="അവധിയുടെ കാരണം ഇവിടെ എഴുതുക..."></textarea>
                <button id="holiday-toggle-btn" onclick="toggleGlobalHoliday()" class="w-full py-3 rounded-xl text-xs font-black uppercase transition-all shadow-md"></button>
            </div>
            
            <div class="card mt-4">
                <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase">Azan Timings</h3>
                <div id="azan-list" class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase text-center">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br><span class="text-emerald-700">05:15</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br><span class="text-emerald-700">12:38</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br><span class="text-emerald-700">03:58</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br><span class="text-emerald-700">06:39</span></div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br><span class="text-emerald-700">07:49</span></div>
                </div>
            </div>
        </div>

        <div id="attendance-page" class="p-5 hidden">
            <div id="attendance-list"></div>
        </div>

        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>
        
        <div id="profile-page" class="p-5 hidden text-center">
            <div class="card py-10">
                <p id="user-email-text" class="text-xs font-bold text-gray-500 mb-8"></p>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-3 rounded-xl uppercase text-[10px]">Sign Out</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-user-circle"></i>ME</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] outline-none text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-2 bg-[#f0f4f8] outline-none text-sm">
            
            <div class="text-right mb-6">
                <span onclick="handleResetPassword()" class="text-[10px] text-gray-500 font-bold underline cursor-pointer uppercase">Forgot Password?</span>
            </div>

            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-4 uppercase">Login</button>
            <p class="text-xs font-bold text-gray-400">New user? <span onclick="toggleAuth(true)" class="text-emerald-700 underline cursor-pointer">Create Account</span></p>
        </div>
        <div id="signup-box" class="card hidden">
            <h2 class="text-xl font-black text-blue-800 mb-8 uppercase">Register</h2>
            <input type="email" id="s-email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] outline-none text-sm">
            <input type="password" id="s-pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 bg-[#f0f4f8] outline-none text-sm">
            <button onclick="handleSignUp()" class="w-full bg-blue-800 text-white font-black py-4 rounded-xl mb-4 uppercase">Register</button>
            <p onclick="toggleAuth(false)" class="text-xs font-bold text-gray-400 underline cursor-pointer">Back to Login</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN = "kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let globalHoliday = false;

        document.getElementById('global-date').value = selectedDate;

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('user-email-text').innerText = u.email;
                if(u.email.toLowerCase() === ADMIN.toLowerCase()) document.getElementById('admin-holiday-tool').classList.remove('hidden');
                syncHoliday();
            }
        });

        function syncHoliday() {
            onSnapshot(doc(db, "settings", "madrasa_status"), (snap) => {
                const data = snap.exists() ? snap.data() : { isHoliday: false, reason: "" };
                globalHoliday = data.isHoliday;
                
                const banner = document.getElementById('holiday-banner');
                const reasonText = document.getElementById('holiday-reason-text');
                
                if(globalHoliday) {
                    banner.classList.remove('hidden');
                    reasonText.innerText = data.reason || "ഇന്ന് മദ്‌റസ അവധിയാണ്.";
                } else {
                    banner.classList.add('hidden');
                }

                const btn = document.getElementById('holiday-toggle-btn');
                btn.innerText = globalHoliday ? "അവധി അവസാനിപ്പിക്കുക" : "അവധി അറിയിപ്പ് നൽകുക";
                btn.className = globalHoliday ? "w-full py-3 rounded-xl text-xs font-black uppercase bg-red-600 text-white shadow-md" : "w-full py-3 rounded-xl text-xs font-black uppercase bg-blue-600 text-white shadow-md";
            });
        }

        window.toggleGlobalHoliday = () => {
            const reason = document.getElementById('holiday-reason-input').value;
            if(!globalHoliday && !reason) {
                alert("അവധിയുടെ കാരണം എഴുതുക!");
                return;
            }
            const confirmMsg = globalHoliday ? "മദ്‌റസ അവധി അവസാനിപ്പിക്കണോ?" : "ഈ അറിയിപ്പ് നൽകണോ?";
            if(confirm(confirmMsg)) {
                setDoc(doc(db, "settings", "madrasa_status"), { 
                    isHoliday: !globalHoliday,
                    reason: !globalHoliday ? reason : ""
                });
                document.getElementById('holiday-reason-input').value = "";
            }
        };

        window.handleResetPassword = () => {
            const email = document.getElementById('email').value;
            if(!email) { alert("ഇമെയിൽ ടൈപ്പ് ചെയ്യുക!"); return; }
            sendPasswordResetEmail(auth, email).then(() => alert("പാസ്‌വേഡ് മാറ്റാനുള്ള ലിങ്ക് ഇമെയിലിലേക്ക് അയച്ചിട്ടുണ്ട്.")).catch(e => alert(e.message));
        };

        window.changeDate = (val) => { selectedDate = val; navigate(document.querySelector('.nav-item.active').innerText.toLowerCase(), null); };

        window.navigate = (p, el) => {
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            ['home', 'tracker', 'attendance', 'history', 'profile'].forEach(pg => document.getElementById(pg+'-page').classList.toggle('hidden', !pg.includes(p)));
            if(p.includes('tracker')) loadTracker();
            if(p.includes('attendance')) loadAttendance();
            if(p.includes('history')) loadHistory();
        };

        function loadAttendance() {
            const isAdmin = auth.currentUser?.email.toLowerCase() === ADMIN.toLowerCase();
            const container = document.getElementById('attendance-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    if(globalHoliday) return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="status-leave">LEAVE</div></div>`;
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="flex gap-2">
                        <button onclick="${isAdmin ? `setA('${s}','P')` : 'alert(\'ഉസ്താദിന് മാത്രമേ അനുവാദമുള്ളൂ!\')'}" class="att-btn ${d.status === 'P' ? 'p-active text-white bg-emerald-600' : ''}">PRESENT</button>
                        <button onclick="${isAdmin ? `setA('${s}','A')` : 'alert(\'ഉസ്താദിന് മാത്രമേ അനുവാദമുള്ളൂ!\')'}" class="att-btn ${d.status === 'A' ? 'a-active text-white bg-red-600' : ''}">ABSENT</button>
                    </div></div>`;
                }).join('');
            });
        }

        function loadTracker() {
            const container = document.getElementById('tracker-list');
            onSnapshot(query(collection(db, "daily"), where("date", "==", selectedDate)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const d = data[s + "_" + selectedDate] || {};
                    return `<div class="card"><p class="text-xs font-black uppercase mb-3">${s}</p><div class="grid grid-cols-5 gap-1">
                        ${["Subhi","Duhar","Asr","Maghrib","Isha"].map(p => `<button onclick="toggleP('${s}','${p}',${!!d[p]})" class="p-btn ${d[p] ? 'active' : ''}">${d[p] ? '✓' : p}</button>`).join('')}
                    </div></div>`;
                }).join('');
            });
        }

        async function loadHistory() {
            const snap = await getDocs(collection(db, "daily"));
            const stats = {}; students.forEach(s => stats[s] = { p:0, a:0, pr:0 });
            snap.forEach(d => {
                const doc = d.data();
                if(stats[doc.name]) {
                    ["Subhi","Duhar","Asr","Maghrib","Isha"].forEach(p => { if(doc[p]) stats[doc.name].pr++; });
                    if(doc.status === 'P') stats[doc.name].p++;
                    if(doc.status === 'A') stats[doc.name].a++;
                }
            });
            document.getElementById('history-list').innerHTML = students.map(s => `<div class="card"><p class="font-black text-sm uppercase mb-2">${s}</p><div class="flex justify-between text-[10px] font-bold">
                <span class="text-emerald-600">PRAYERS: ${stats[s].pr}</span><span class="text-blue-600">PRESENT: ${stats[s].p}</span><span class="text-red-600">ABSENT: ${stats[s].a}</span>
            </div></div>`).join('');
        }

        window.toggleP = (n, p, cur) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, [p]: !cur }, { merge: true });
        window.setA = (n, s) => setDoc(doc(db, "daily", n + "_" + selectedDate), { name: n, date: selectedDate, status: s }, { merge: true });
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        window.handleSignUp = () => createUserWithEmailAndPassword(auth, document.getElementById('s-email').value, document.getElementById('s-pass').value).catch(e => alert(e.message));
        window.handleLogout = () => signOut(auth);
        window.toggleAuth = (s) => { document.getElementById('login-box').classList.toggle('hidden', s); document.getElementById('signup-box').classList.toggle('hidden', !s); };
    </script>
</body>
</html>
