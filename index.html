<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niskaram Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f3f4f6; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .hidden { display: none; }
        .header-top { background: #1a1a1a; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .green-banner { background: var(--primary); color: white; padding: 30px 10px; border-radius: 0 0 30px 30px; text-align: center; margin-bottom: 20px; }
        .student-card { background: white; border-radius: 25px; padding: 20px; margin: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .prayer-btn { background: #f3f4f6; color: #1f2937; border-radius: 15px; padding: 15px 5px; font-size: 11px; font-weight: 700; width: 100%; transition: all 0.3s; border: none; }
        .prayer-btn.active { background: #10b981; color: white; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #94a3b8; font-weight: 800; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .date-picker { background: rgba(255,255,255,0.2); color: white; border-radius: 20px; padding: 5px 15px; font-size: 12px; font-weight: bold; border: none; outline: none; }
    </style>
</head>
<body>

    <div id="app-header">
        <div class="header-top">
            <h1 class="text-xl font-bold uppercase tracking-tight">Niskaram Tracker</h1>
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041038.png" width="30" class="rounded-full">
        </div>
        <div class="green-banner">
            <p class="text-[10px] font-bold opacity-80 mb-2 uppercase tracking-widest">Class 6 - Achangi</p>
            <select id="date-select" class="date-picker">
                <option value="today" id="today-opt">14/03/2026</option>
            </select>
        </div>
    </div>

    <div id="home-page" class="view-page p-4">
        <div class="bg-white p-6 rounded-[25px] shadow-sm mb-4">
             <p class="text-[10px] font-black text-emerald-800 uppercase mb-4 text-center tracking-widest">Admin Settings</p>
             <input type="text" id="edit-name" placeholder="Madrasa Name" class="w-full p-4 rounded-xl bg-gray-50 mb-3 border-none outline-none font-bold text-sm">
             <input type="text" id="edit-sub" placeholder="Place/Class Info" class="w-full p-4 rounded-xl bg-gray-50 mb-4 border-none outline-none font-bold text-sm">
             <button id="btn-save-name" class="w-full bg-emerald-800 text-white py-4 rounded-xl font-bold uppercase text-xs">Save Details</button>
        </div>
    </div>

    <div id="tracker-page" class="view-page hidden">
        <div class="px-4 mb-4">
            <div class="bg-emerald-50 p-4 rounded-[20px] border border-emerald-100">
                <div class="flex gap-2">
                    <input type="text" id="new-student-name" placeholder="Add New Student" class="flex-1 p-3 rounded-xl border-none outline-none text-xs font-bold">
                    <button id="btn-add-student" class="bg-emerald-700 text-white px-5 rounded-xl text-[10px] font-black uppercase">Add</button>
                </div>
                <div id="student-edit-list" class="flex flex-wrap gap-2 mt-3"></div>
            </div>
        </div>
        <div id="tracker-list">
            </div>
    </div>

    <div class="bottom-nav shadow-lg">
        <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house text-xl mb-1"></i><br>HOME</div>
        <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-check-to-slot text-xl mb-1"></i><br>TRACKER</div>
        <div class="nav-item"><i class="fa-solid fa-user-check text-xl mb-1"></i><br>ATTEND</div>
        <div class="nav-item"><i class="fa-solid fa-file-invoice text-xl mb-1"></i><br>RESULTS</div>
        <div class="nav-item"><i class="fa-solid fa-chart-line text-xl mb-1"></i><br>STATS</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const initialStudents = ["DISHAN", "SIFAN", "FAZIL", "SUHAIR", "YASEEN", "TWALHATH", "AFREENA", "RASEENA", "AYIZZA", "MISHA", "NILA", "FIDA", "SHAKIRA", "SUHAIBA", "RIFA"];
        let studentList = [];

        // Set Date
        const today = new Date();
        document.getElementById('today-opt').innerText = today.toLocaleDateString('en-GB');

        // Sync Data
        onSnapshot(doc(db, "settings", "students_list"), (snap) => {
            if (snap.exists()) {
                studentList = snap.data().names || [];
            } else {
                studentList = initialStudents;
                setDoc(doc(db, "settings", "students_list"), { names: initialStudents });
            }
            renderStudentManager();
            renderTracker();
        });

        window.navigate = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-page').forEach(page => page.classList.add('hidden'));
            document.getElementById(p + '-page').classList.remove('hidden');
        };

        function renderStudentManager() {
            const container = document.getElementById('student-edit-list');
            container.innerHTML = studentList.map(name => `
                <span onclick="removeStudent('${name}')" class="bg-white border text-[9px] font-bold px-3 py-1 rounded-full text-emerald-700 cursor-pointer shadow-sm">${name} ×</span>
            `).join('');
        }

        function renderTracker() {
            const container = document.getElementById('tracker-list');
            const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];
            container.innerHTML = studentList.map(name => `
                <div class="student-card">
                    <h3 class="text-xs font-black mb-4 uppercase tracking-tighter">${name}</h3>
                    <div class="grid grid-cols-5 gap-2">
                        ${prayers.map(p => `
                            <button id="btn-${name}-${p}" onclick="togglePrayer('${name}', '${p}')" class="prayer-btn">
                                ${p}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            syncNamazData();
        }

        document.getElementById('btn-add-student').onclick = async () => {
            const name = document.getElementById('new-student-name').value.trim().toUpperCase();
            if (name && !studentList.includes(name)) {
                await setDoc(doc(db, "settings", "students_list"), { names: [...studentList, name] });
                document.getElementById('new-student-name').value = "";
            }
        };

        window.removeStudent = async (name) => {
            if(confirm(`Remove ${name}?`)) {
                await setDoc(doc(db, "settings", "students_list"), { names: studentList.filter(s => s !== name) });
            }
        };

        window.togglePrayer = async (student, prayer) => {
            const date = new Date().toLocaleDateString('en-CA');
            const ref = doc(db, "namaz_tracker", `${date}_${student}`);
            const snap = await getDoc(ref);
            let current = snap.exists() ? snap.data()[prayer] : false;
            await setDoc(ref, { [prayer]: !current }, { merge: true });
        };

        function syncNamazData() {
            const date = new Date().toLocaleDateString('en-CA');
            studentList.forEach(student => {
                onSnapshot(doc(db, "namaz_tracker", `${date}_${student}`), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"].forEach(p => {
                            const btn = document.getElementById(`btn-${student}-${p}`);
                            if(btn) {
                                if(data[p]) {
                                    btn.classList.add('active');
                                    btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                                } else {
                                    btn.classList.remove('active');
                                    btn.innerHTML = p;
                                }
                            }
                        });
                    }
                });
            });
        }
    </script>
</body>
</html>
