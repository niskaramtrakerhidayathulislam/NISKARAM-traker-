<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 90px; }
        .hidden { display: none; }
        .card { background: white; border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #edf2f7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .glass-header { background: linear-gradient(135deg, #065f46 0%, #059669 100%); color: white; border-radius: 0 0 35px 35px; padding: 40px 20px; text-align: center; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #94a3b8; font-weight: 800; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .notice-card { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin: 15px; }
        .admin-tool { background: #f0fdf4; border: 1px dashed #16a34a; padding: 15px; border-radius: 15px; margin: 15px; }
        .btn-save { background: var(--primary); color: white; padding: 8px 15px; border-radius: 10px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="auth-page" class="min-h-screen flex flex-col justify-center px-6">
        <div class="card py-10 text-center shadow-2xl">
            <h2 class="text-3xl font-black text-emerald-900 mb-8 uppercase tracking-tighter">Hidayatul Islam</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl bg-gray-50 mb-4 outline-none border font-bold">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-gray-50 mb-6 outline-none border font-bold">
            <button onclick="handleAuth()" id="auth-btn" class="w-full bg-[#065f46] text-white py-4 rounded-xl font-black uppercase">Login</button>
            <p class="mt-8 text-xs font-bold text-gray-400">New? <span onclick="toggleAuth()" id="toggle-text" class="text-emerald-700 underline">Register</span></p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="glass-header">
            <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Achangi • Class 6 • 2026</p>
        </div>

        <div id="home-page" class="view-page">
            <div id="holiday-notice" class="notice-card hidden">
                <p class="text-[10px] font-black text-amber-800 uppercase mb-1">📢 Madrasa Notice</p>
                <p id="holiday-text" class="text-sm font-bold text-amber-900"></p>
            </div>

            <div id="admin-notice-tool" class="admin-tool hidden">
                <p class="text-[9px] font-black text-emerald-800 mb-2 uppercase">Post Leave Notice (Usthad Only)</p>
                <textarea id="notice-input" class="w-full p-3 rounded-lg text-xs border mb-2" placeholder="Enter reason for leave..."></textarea>
                <div class="flex gap-2">
                    <button onclick="updateNotice(true)" class="btn-save bg-red-600">Post Leave</button>
                    <button onclick="updateNotice(false)" class="btn-save bg-gray-500">Clear</button>
                </div>
            </div>

            <div class="card text-center">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Azan Timings</h3>
                <div id="azan-display" class="grid grid-cols-5 gap-1 text-[9px] font-bold text-emerald-800 uppercase">
                    <div class="bg-emerald-50 p-2 rounded-lg">SUBHI<br><span id="time-subhi">05:15</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">DUHAR<br><span id="time-duhar">12:38</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ASR<br><span id="time-asr">03:58</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">MAGH<br><span id="time-magh">06:39</span></div>
                    <div class="bg-emerald-50 p-2 rounded-lg">ISHA<br><span id="time-isha">07:49</span></div>
                </div>

                <div id="admin-azan-tool" class="hidden mt-6 pt-4 border-t border-dashed">
                    <p class="text-[9px] font-black text-emerald-800 mb-2 uppercase">Edit Azan Timings</p>
                    <div class="grid grid-cols-3 gap-2 mb-3">
                        <input type="text" id="edit-subhi" placeholder="Subhi" class="p-2 border rounded text-xs">
                        <input type="text" id="edit-duhar" placeholder="Duhar" class="p-2 border rounded text-xs">
                        <input type="text" id="edit-asr" placeholder="Asr" class="p-2 border rounded text-xs">
                        <input type="text" id="edit-magh" placeholder="Magh" class="p-2 border rounded text-xs">
                        <input type="text" id="edit-isha" placeholder="Isha" class="p-2 border rounded text-xs">
                    </div>
                    <button onclick="updateAzan()" class="btn-save w-full">Update Times</button>
                </div>
            </div>
        </div>

        <div id="results-page" class="view-page hidden px-4 py-2"><div id="results-list" class="space-y-3"></div></div>
        <div id="tracker-page" class="view-page hidden px-4 py-2"><div id="tracker-list" class="space-y-3"></div></div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house text-xl mb-1"></i><br>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-calendar-check text-xl mb-1"></i><br>TRACKER</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-graduation-cap text-xl mb-1"></i><br>RESULTS</div>
            <div onclick="logout()" class="nav-item"><i class="fa-solid fa-power-off text-xl mb-1 text-red-400"></i><br>EXIT</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnSz248OfMbDr3V3kD9NAZkVxxON2fIvE",
            authDomain: "madrasa-4c7e2.firebaseapp.com",
            projectId: "madrasa-4c7e2",
            storageBucket: "madrasa-4c7e2.firebasestorage.app",
            messagingSenderId: "770067409084",
            appId: "1:770067409084:web:52e38ae80a3601245248b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        let isLogin = true;

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            if(u) {
                const isAdmin = u.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                document.getElementById('admin-notice-tool').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-azan-tool').classList.toggle('hidden', !isAdmin);
                syncData();
            }
        });

        // Sync Data from Firebase
        function syncData() {
            // Sync Notice
            onSnapshot(doc(db, "settings", "notice"), (s) => {
                if(s.exists()) {
                    const d = s.data();
                    const box = document.getElementById('holiday-notice');
                    if(d.active) {
                        box.classList.remove('hidden');
                        document.getElementById('holiday-text').innerText = d.text;
                    } else box.classList.add('hidden');
                }
            });

            // Sync Azan
            onSnapshot(doc(db, "settings", "timings"), (s) => {
                if(s.exists()) {
                    const d = s.data();
                    Object.keys(d).forEach(k => {
                        const el = document.getElementById('time-'+k);
                        if(el) el.innerText = d[k];
                    });
                }
            });
        }

        // Admin Functions
        window.updateNotice = (active) => {
            const text = document.getElementById('notice-input').value;
            setDoc(doc(db, "settings", "notice"), { active, text });
            document.getElementById('notice-input').value = "";
        };

        window.updateAzan = () => {
            const data = {
                subhi: document.getElementById('edit-subhi').value || document.getElementById('time-subhi').innerText,
                duhar: document.getElementById('edit-duhar').value || document.getElementById('time-duhar').innerText,
                asr: document.getElementById('edit-asr').value || document.getElementById('time-asr').innerText,
                magh: document.getElementById('edit-magh').value || document.getElementById('time-magh').innerText,
                isha: document.getElementById('edit-isha').value || document.getElementById('time-isha').innerText
            };
            setDoc(doc(db, "settings", "timings"), data);
            alert("Times Updated!");
        };

        // Auth Logic
        window.handleAuth = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(isLogin) signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            else createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggle-text').innerText = isLogin ? 'Register' : 'Login';
        };

        window.logout = () => signOut(auth);

        window.navigate = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-page').forEach(page => page.classList.add('hidden'));
            document.getElementById(p + '-page').classList.remove('hidden');
        };
    </script>
</body>
</html>
