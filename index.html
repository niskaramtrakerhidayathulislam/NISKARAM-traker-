<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Prayer Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-left: 5px solid #059669; }
        .niskaram-btn { transition: 0.3s; border: 1px solid #e2e8f0; font-weight: 600; }
        .active { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .prayer-time-box { background: #f1f5f9; padding: 12px; border-radius: 15px; margin-bottom: 15px; display: grid; grid-template-cols: repeat(5, 1fr); gap: 8px; text-align: center; font-size: 11px; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.05); }
        .score-box { background: #ecfdf5; color: #065f46; padding: 2px 10px; border-radius: 20px; font-size: 13px; border: 1px solid #10b981; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-emerald-800 p-8 text-white rounded-b-[3rem] shadow-2xl text-center">
        <h1 class="text-2xl font-bold tracking-wide uppercase leading-tight">Hidayatul Islam Madrasa</h1>
        <p id="today" class="text-emerald-100 mt-2 font-medium text-sm"></p>
        
        <div id="prayer-times" class="mt-6 prayer-time-box text-gray-800 font-bold">
            <div><div class="text-emerald-700">Fajr</div><div class="text-lg">05:17</div></div>
            <div><div class="text-emerald-700">Dhuhr</div><div class="text-lg">12:39</div></div>
            <div><div class="text-emerald-700">Asr</div><div class="text-lg">03:59</div></div>
            <div><div class="text-emerald-700">Maghrib</div><div class="text-lg">06:38</div></div>
            <div><div class="text-emerald-700">Isha</div><div class="text-lg">07:49</div></div>
        </div>
    </div>

    <div class="p-4 space-y-5" id="list"></div>

    <script>
        const d = new Date();
        const dateKey = d.toDateString();
        document.getElementById('today').innerText = d.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Luhr", "Asr", "Maghrib", "Isha"];
        
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfoB6SzEuo4nrvGKGzdcjrvXLqFCZyu6kKyTa0mG8Gl8yUPMA/formResponse";
        const NAME_ENTRY = "entry.877237437";
        const PRAYER_ENTRY = "entry.330346532";

        let localData = JSON.parse(localStorage.getItem('hidayatul_p_data')) || { date: dateKey, entries: [] };

        if (localData.date !== dateKey) {
            localData = { date: dateKey, entries: [] };
            localStorage.setItem('hidayatul_p_data', JSON.stringify(localData));
        }

        const listDiv = document.getElementById('list');

        students.forEach(name => {
            let score = localData.entries.filter(e => e.startsWith(name)).length;
            let prayerButtons = prayers.map(p => {
                const isDone = localData.entries.includes(`${name}-${p}`);
                return `<button id="${name}-${p}" onclick="submitPrayer('${name}', '${p}', this)" 
                        class="niskaram-btn py-2 text-[11px] rounded-lg bg-gray-50 text-gray-700 ${isDone ? 'active' : ''}">
                        ${p}${isDone ? ' ✓' : ''}</button>`;
            }).join('');

            listDiv.innerHTML += `
                <div class="card p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center font-bold text-lg">${name[0]}</div>
                            <h3 class="font-bold text-gray-800 text-lg">${name}</h3>
                        </div>
                        <span class="score-box font-bold" id="score-${name}">Today: ${score}/5</span>
                    </div>
                    <div class="grid grid-cols-5 gap-2">
                        ${prayerButtons}
                    </div>
                </div>
            `;
        });

        function submitPrayer(studentName, prayerName, btn) {
            if(btn.classList.contains('active')) return;
            const formData = new FormData();
            formData.append(NAME_ENTRY, studentName);
            formData.append(PRAYER_ENTRY, prayerName);
            fetch(FORM_URL, { method: "POST", body: formData, mode: "no-cors" }).then(() => {
                btn.classList.add('active');
                btn.innerHTML += ' ✓';
                localData.entries.push(`${studentName}-${prayerName}`);
                localStorage.setItem('hidayatul_p_data', JSON.stringify(localData));
                let newScore = localData.entries.filter(e => e.startsWith(studentName)).length;
                document.getElementById(`score-${studentName}`).innerText = `Today: ${newScore}/5`;
                alert(`${studentName}-ന്റെ ${prayerName} നിസ്കാരം രേഖപ്പെടുത്തി!`);
            }).catch(() => alert("Error! Net Connection പരിശോധിക്കുക."));
        }
    </script>
</body>
</html>
