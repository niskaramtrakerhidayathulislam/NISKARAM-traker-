<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 80px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 8px; border: 1px solid #ddd; }
        .p-btn { background: #f9fafb; border: 1px solid #ccc; padding: 12px 0; border-radius: 8px; font-size: 11px; font-weight: bold; width: 100%; transition: 0.2s; }
        .p-btn.active { background: #10b981 !important; color: white !important; border-color: #059669; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; font-size: 10px; font-weight: bold; color: #9ca3af; cursor: pointer; }
        .nav-item.active { color: #065f46; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-[#065f46] text-white p-5 text-center rounded-b-3xl">
        <h1 class="text-lg font-black uppercase">Hidayatul Islam</h1>
        <p id="top-date" class="text-[10px] font-bold opacity-75"></p>
    </div>

    <div id="auth-page" class="p-6">
        <div class="card shadow-md text-center">
            <h2 class="font-bold mb-4">LOGIN / REGISTER</h2>
            <input type="email" id="user-email" placeholder="Email" class="w-full p-3 border rounded mb-3 outline-none">
            <input type="password" id="user-pass" placeholder="Password" class="w-full p-3 border rounded mb-4 outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-[#065f46] text-white py-3 rounded font-bold mb-2">LOGIN</button>
            <button onclick="handleAuth('signup')" class="w-full border border-[#065f46] text-[#065f46] py-3 rounded font-bold">CREATE ACCOUNT</button>
        </div>
    </div>

    <div id="main-app" class="p-3 hidden">
        <div id="tracker-page">
            <div id="tracker-list"></div>
        </div>
        <div id="attend-page" class="hidden">
            <div id="attend-list"></div>
        </div>
        <div id="stats-page" class="hidden">
            <div id="stats-list"></div>
        </div>
    </div>

    <div id="nav-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="showPage('tracker', this)"><i class="fa fa-list-check block text-xl"></i>TRACKER</div>
        <div class="nav-item" onclick="showPage('attend', this)"><i class="fa fa-user-clock block text-xl"></i>ATTEND</div>
        <div class="nav-item" onclick="showPage('stats', this)"><i class="fa fa-chart-simple block text-xl"></i>STATS</div>
        <div class="nav-item" onclick="handleLogout()"><i class="fa fa-sign-out block text-xl"></i>EXIT</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const USTHAD = "Kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];
        const today = new Date().toLocaleDateString('en-CA');

        document.getElementById('top-date').innerText = new Date().toDateString().toUpperCase();

        onAuthStateChanged(auth, (u) => {
            if(u) {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                loadTracker();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
            }
        });

        window.handleAuth = (type) => {
            const e = document.getElementById('user-email').value;
            const p = document.getElementById('user-pass').value;
            if(type === 'login') signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            else createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        window.handleLogout = () => signOut(auth);

        window.showPage = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            ['tracker', 'attend', 'stats'].forEach(id => document.getElementById(id+'-page').classList.toggle('hidden', id !== p));
            if(p === 'tracker') loadTracker();
            if(p === 'attend') loadAttend();
            if(p === 'stats') loadStats();
        };

        async function loadTracker() {
            const container = document.getElementById('tracker-list');
            container.innerHTML = "<p class='text-center py-5'>Loading...</p>";
            
            onSnapshot(query(collection(db, "daily"), where("date", "==", today)), (snap) => {
                const data = {}; snap.forEach(d => data[d.id] = d.data());
                container.innerHTML = students.map(s => {
                    const sData = data[s + "_" + today] || {};
                    return `<div class="card">
                        <p class="font-bold text-sm mb-3 uppercase text-emerald-900">${s}</p>
                        <div class="grid grid-cols-5 gap-1">
                            ${prayers.map(p => `<button onclick="toggleP('${s}','${p}',${!!sData[p]})" class="p-btn ${sData[p] ? 'active' : ''}">${sData[p] ? '✓' : p}</button>`).join('')}
                        </div>
                    </div>`;
                }).join('');
            });
        }

        window.toggleP = async (name, prayer, current) => {
            await setDoc(doc(db, "daily", name + "_" + today), { name, date: today, [prayer]: !current }, { merge: true });
        };

        async function loadAttend() {
            const isAdmin = auth.currentUser.email === USTHAD;
            const container = document.getElementById('attend-list');
            container.innerHTML = "Loading...";
            
            const snap = await getDocs(query(collection(db, "daily"), where("date", "==", today)));
            const data = {}; snap.forEach(d => data[d.id] = d.data());

            container.innerHTML = students.map(s => {
                const sData = data[s + "_" + today] || {};
                return `<div class="card flex justify-between items-center">
                    <p class="font-bold text-sm uppercase">${s}</p>
                    <div class="flex gap-2">
                        <button onclick="${isAdmin ? `setA('${s}','P')` : ''}" class="px-4 py-2 rounded font-bold text-xs ${sData.present ? 'bg-green-600 text-white' : 'bg-gray-100'}">P</button>
                        <button onclick="${isAdmin ? `setA('${s}','A')` : ''}" class="px-4 py-2 rounded font-bold text-xs ${sData.absent ? 'bg-red-600 text-white' : 'bg-gray-100'}">A</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.setA = async (name, type) => {
            await setDoc(doc(db, "daily", name + "_" + today), { name, date: today, present: type==='P', absent: type==='A' }, { merge: true });
            loadAttend();
        };

        async function loadStats() {
            const container = document.getElementById('stats-list');
            container.innerHTML = "Calculating...";
            const snap = await getDocs(collection(db, "daily"));
            const scores = {}; students.forEach(s => scores[s] = 0);
            snap.forEach(d => {
                const doc = d.data();
                if(scores[doc.name] !== undefined) prayers.forEach(p => { if(doc[p]) scores[doc.name]++; });
            });
            container.innerHTML = students.sort((a,b) => scores[b]-scores[a]).map(s => `
                <div class="card flex justify-between items-center"><span>${s}</span><span class="font-bold text-emerald-600">${scores[s]}</span></div>
            `).join('');
        }
    </script>
</body>
</html>
