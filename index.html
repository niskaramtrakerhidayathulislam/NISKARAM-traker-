<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .header-bg {
            background: linear-gradient(135deg, #065f46 0%, #059669 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="main-card w-full max-w-md overflow-hidden text-center">
        <div class="header-bg p-10 text-white">
            <i class="fa-solid fa-clock-rotate-left text-5xl mb-4 opacity-80"></i>
            <h1 class="text-xl font-black uppercase tracking-tighter">
                HIDAYATUL ISLAM CONNECT
            </h1>
        </div>

        <div class="p-10">
            <h2 class="text-2xl font-bold text-emerald-900 mb-4 leading-relaxed">
                ಸದ್ಯಕ್ಕೆ ಇದನ್ನು ಸ್ಥಗಿತಗೊಳಿಸಲಾಗಿದೆ
            </h2>
            
            <div class="w-16 h-1 bg-emerald-100 mx-auto mb-6"></div>
            
            <p class="text-gray-500 text-sm font-medium leading-loose">
                ಮದರಸಕ್ಕೆ ಸಂಬಂಧಿಸಿದ ಅಪ್‌ಡೇಟ್‌ಗಳಿಗಾಗಿ ಮತ್ತು <br>
                ಹೆಚ್ಚಿನ ಮಾಹಿತಿಗಾಗಿ ದಯವಿಟ್ಟು ನೇರವಾಗಿ ಸಂಪರ್ಕಿಸಿ.
            </p>

            <div class="mt-10">
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest">
                    Hidayatul Islam Madrasa, Achangi
                </p>
            </div>
        </div>
    </div>

</body>
</html>
