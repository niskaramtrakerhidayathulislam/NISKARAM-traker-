<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Prayer Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .hidden { display: none; }
        .card { background: white; border-radius: 15px; border-left: 5px solid #059669; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .niskaram-btn { transition: 0.2s; border: 1px solid #e2e8f0; font-weight: 600; font-size: 11px; padding: 10px 5px; border-radius: 8px; background: #f8fafc; }
        .active { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .countdown-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="pb-20">

    <div id="auth-page" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 w-full max-w-md text-center rounded-[25px] shadow-xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-2 font-serif">ഹിദായതുൽ ഇസ്‌ലാം</h2>
            <p class="text-gray-500 text-sm mb-6 font-medium">ഫോൺ നമ്പർ നൽകി ലോഗിൻ ചെയ്യുക</p>
            <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-4 border rounded-xl mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="handleLogin()" class="w-full bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-800 transition">പ്രവേശിക്കുക (ENTER)</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="bg-emerald-800 p-6 text-white rounded-b-[3rem] shadow-xl text-center relative">
            <button onclick="logout()" class="absolute top-4 right-4 text-[10px] bg-white/10 px-3 py-1 rounded-full border border-white/20">Log Out</button>
            <h1 class="text-xl font-bold uppercase tracking-wide">Hidayatul Islam Tracker</h1>
            
            <div class="bg-yellow-500/20 text-yellow-200 inline-block px-4 py-1 rounded-full text-[11px] font-bold mt-2">
                റമദാൻ 23, 1447 ഹിജ്റ
            </div>
            
            <p id="today" class="text-emerald-100 mt-2 text-sm font-medium"></p>

            <div class="countdown-box">
                <p id="next-prayer-name" class="text-[10px] uppercase tracking-widest opacity-80 font-bold">അടുത്ത ബാങ്ക് സമയം</p>
                <p id="timer" class="text-3xl font-black tracking-tighter mt-1">00:00:00</p>
            </div>
            
            <div class="mt-6 grid grid-cols-5 gap-1 bg-emerald-900/40 p-3 rounded-2xl text-[9px] uppercase font-bold">
                <div>Subhi<br><span class="text-xs text-yellow-400">05:15</span></div>
                <div>Luhar<br><span class="text-xs">12:39</span></div>
                <div>Asr<br><span class="text-xs">03:59</span></div>
                <div>Maghrib<br><span class="text-xs">06:38</span></div>
                <div>Isha<br><span class="text-xs">07:49</span></div>
            </div>
        </div>

        <div class="p-4 space-y-4" id="list"></div>
    </div>

    <script>
        // ബാങ്ക് സമയങ്ങൾ ഇവിടെ കൃത്യമായി നൽകിയിട്ടുണ്ട്
        const PRAYER_TIMES = {
            "Subhi": "05:15",
            "Luhar": "12:39",
            "Asr": "15:59",    // 24hr format: 03:59 PM
            "Maghrib": "18:38", // 24hr format: 06:38 PM
            "Isha": "19:49"     // 24hr format: 07:49 PM
        };

        function updateTimer() {
            const now = new Date();
            let nextTarget = null;
            let nextName = "";

            // അടുത്ത ബാങ്ക് ഏതാണെന്ന് കണ്ടെത്തുന്നു
            for (let name in PRAYER_TIMES) {
                const [hrs, mins] = PRAYER_TIMES[name].split(':');
                const target = new Date();
                target.setHours(hrs, mins, 0);

                if (target > now) {
                    nextTarget = target;
                    nextName = name;
                    break;
