<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; padding-bottom: 90px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #e5e7eb; }
        .p-btn { background: #f3f4f6; border: 1px solid #ddd; padding: 10px 2px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .p-btn.active { background: #10b981 !important; color: white !important; border: none; }
        .bottom-nav { background: white; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 10px; color: #9ca3af; cursor: pointer; }
        .nav-item.active { color: #065f46; }
        .notice-box { background: #fbbf24; color: black; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; border: 2px solid black; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-[#065f46] text-white p-6 text-center rounded-b-[30px] mb-4">
        <h1 class="text-xl font-bold uppercase">Hidayatul Islam</h1>
        <p id="today-date" class="text-xs opacity-80 mt-1"></p>
    </div>

    <div id="auth-page" class="p-6 text-center">
        <div class="card shadow-lg">
            <h2 class="text-lg font-bold mb-4">LOGIN</h2>
            <input type="email" id="login-email" placeholder="Email" class="w-full p-3 border rounded mb-3 outline-none">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-3 border rounded mb-3 outline-none">
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white py-3 rounded font-bold">LOGIN</button>
            <p class="text-xs mt-4" onclick="toggleAuth('signup')">New User? Register</p>
        </div>
        <div id="signup-box" class="card shadow-lg hidden mt-4">
            <input type="email" id="signup-email" placeholder="New Email" class="w-full p-3 border rounded mb-3 outline-none">
            <input type="password" id="signup-password" placeholder="New Password" class="w-full p-3 border rounded mb-3 outline-none">
            <button onclick="handleSignUp()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">CREATE ACCOUNT</button>
        </div>
    </div>

    <div id="main-content" class="p-4 hidden">
        <div id="home-page">
            <div id="notice-board" class="notice-box hidden"></div>
            <div id="admin-notice-ui" class="card hidden">
                <textarea id="notice-input" class="w-full p-2 border rounded" placeholder="Write notice..."></textarea>
                <button onclick="saveNotice()" class="mt-2 bg-[#065f46] text-white px-4 py-1 rounded text-xs">POST</button>
            </div>
            <div class="card text-center">
                <p class="text-[10px] font-bold text-gray-400 mb-2">AZAN TIMINGS</p>
                <div class="grid grid-cols-5 gap-1 text-[9px] font-bold">
                    <div>SUBHI<br>05:15</div><div>DUHAR<br>12:38</div><div>ASR<br>03:58</div><div>MAGH<br>06:39</div><div>ISHA<br>07:49</div>
                </div>
            </div>
        </div>

        <div id="tracker-page" class="hidden"></div>
        <div id="attend-page" class="hidden"></div>
        <div id="history-page" class="hidden"></div>
    </div>

    <div id="navbar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fa fa-house block text-lg"></i>HOME</div>
        <div class="nav-item" onclick="showPage('tracker', this)"><i class="fa fa-check-square block text-lg"></i>TRACKER</div>
        <div class="nav-item" onclick="showPage('attend', this)"><i class="fa fa-user-clock block text-lg"></i>ATTEND</div>
        <div class="nav-item" onclick="showPage('history', this)"><i class="fa fa-medal block text-lg"></i>STATS</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0",
            authDomain: "hidayatul-islam-traker.firebaseapp.com",
            projectId: "hidayatul-islam-traker",
            storageBucket: "hidayatul-islam-traker.firebasestorage.app",
            messagingSenderId: "82744495268",
            appId: "1:82744495268:web:afc2f87d3d06884363ea31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN = "Kereemk81@gmail.com";
        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];
        const today = new Date().toLocaleDateString('en-CA');

        document.getElementById('today-date').innerText = new Date().toDateString();

        window.showPage = (p, el) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            ['home', 'tracker', 'attend', 'history'].forEach(id => document.getElementById(id+'-page').classList.toggle('hidden', id !== p));
            if(p === 'tracker') loadTracker();
            if(p === 'attend') loadAttend();
            if(p === 'history') loadHistory();
        };

        onAuthStateChanged(auth, (u) => {
            if(u) {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('admin-notice-ui').classList.toggle('hidden', u.email !== ADMIN);
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('navbar').classList.add('hidden');
            }
        });

        // NOTICE BOARD
        onSnapshot(doc(db, "settings", "notice"), (d) => {
            const b = document.getElementById('notice-board');
            if(d.exists() && d.data().text) { b.innerText = d.data().text; b.classList.remove('hidden'); }
            else b.classList.add('hidden');
        });

        window.saveNotice = () => setDoc(doc(db, "settings", "notice"), { text: document.getElementById('notice-input').value });

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value).catch(e => alert(e.message));
        window.handleSignUp = () => createUserWithEmailAndPassword(auth, document.getElementById('signup-email').value, document.getElementById('signup-password').value).catch(e => alert(e.message));
        window.toggleAuth = (m) => document.getElementById('signup-box').classList.toggle('hidden');

        async function loadTracker() {
            const container = document.getElementById('tracker-page');
            container.innerHTML = "Loading...";
            const snap = await getDocs(query(collection(db, "daily"), where("date", "==", today)));
            const data = {}; snap.forEach(d => data[d.data().name] = d.data());

            container.innerHTML = students.map(s => {
                const sData = data[s] || {};
                return `<div class="card">
                    <p class="font-bold text-sm mb-3">${s}</p>
                    <div class="grid grid-cols-5 gap-1">
                        ${prayers.map(p => `<button onclick="togglePrayer('${s}','${p}', ${!!sData[p]})" class="p-btn ${sData[p] ? 'active' : ''}">${sData[p] ? '✓' : p}</button>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        window.togglePrayer = async (name, prayer, current) => {
            const id = name + "_" + today;
            await setDoc(doc(db, "daily", id), { name, date: today, [prayer]: !current }, { merge: true });
            loadTracker();
        };

        async function loadAttend() {
            const isAdmin = auth.currentUser.email === ADMIN;
            const container = document.getElementById('attend-page');
            container.innerHTML = "Loading...";
            const snap = await getDocs(query(collection(db, "daily"), where("date", "==", today)));
            const data = {}; snap.forEach(d => data[d.data().name] = d.data());

            container.innerHTML = students.map(s => {
                const sData = data[s] || {};
                return `<div class="card flex justify-between items-center">
                    <p class="font-bold text-sm">${s}</p>
                    <div class="flex gap-2">
                        <button onclick="${isAdmin ? `setAtt('${s}','present')` : ''}" class="px-3 py-1 rounded text-xs font-bold ${sData.present ? 'bg-green-600 text-white' : 'bg-gray-100'}">P</button>
                        <button onclick="${isAdmin ? `setAtt('${s}','absent')` : ''}" class="px-3 py-1 rounded text-xs font-bold ${sData.absent ? 'bg-red-600 text-white' : 'bg-gray-100'}">A</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.setAtt = async (name, type) => {
            const id = name + "_" + today;
            await setDoc(doc(db, "daily", id), { name, date: today, present: type==='present', absent: type==='absent' }, { merge: true });
            loadAttend();
        };

        async function loadHistory() {
            const container = document.getElementById('history-page');
            container.innerHTML = "Calculating...";
            const snap = await getDocs(collection(db, "daily"));
            const scores = {}; students.forEach(s => scores[s] = 0);
            snap.forEach(d => {
                const doc = d.data();
                if(scores[doc.name] !== undefined) prayers.forEach(p => { if(doc[p]) scores[doc.name]++; });
            });
            container.innerHTML = students.sort((a,b) => scores[b]-scores[a]).map(s => `
                <div class="card flex justify-between"><span>${s}</span><span class="font-bold text-green-600">${scores[s]}</span></div>
            `).join('');
        }
    </script>
</body>
</html>
