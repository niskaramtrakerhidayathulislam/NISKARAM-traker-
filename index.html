<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .main-card { background: linear-gradient(180deg, #064e3b 0%, #065f46 100%); border-radius: 0 0 40px 40px; padding: 30px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer-box { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .student-card { background: #161b22; border-radius: 18px; padding: 18px; margin-bottom: 16px; border: 1px solid #30363d; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
        .p-btn { background: #21262d; border: 1px solid #30363d; padding: 12px 2px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; color: #c9d1d9; }
        .p-btn.active { background: #10b981 !important; color: white !important; border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16,185,129,0.3); }
        .ramadan-tag { background: #d97706; color: white; padding: 6px 15px; border-radius: 50px; font-size: 12px; font-weight: 900; display: inline-block; }
        .footer-contact { margin-top: 30px; padding: 30px 20px; border-top: 1px solid #30363d; text-align: center; font-size: 13px; color: #8b949e; background: #0d1117; }
        .whatsapp-link { color: #10b981; font-weight: bold; text-decoration: none; display: block; margin-top: 8px; border: 1px solid #10b981; padding: 10px; border-radius: 10px; transition: 0.3s; }
        .whatsapp-link:active { background: #10b981; color: white; }
    </style>
</head>
<body class="pb-10">

    <div class="main-card">
        <h1 class="text-xl font-black uppercase tracking-widest text-emerald-50">Hidayatul Islam</h1>
        <div class="ramadan-tag mt-4">റമദാൻ 23, 1447 ഹിജ്റ</div>
        
        <div class="timer-box">
            <p id="next-label" class="text-[10px] text-emerald-300 uppercase font-black mb-2 tracking-widest">അടുത്ത ബാങ്ക് സമയം</p>
            <div id="timer" class="text-5xl font-black font-mono tracking-tighter text-white">00:00:00</div>
        </div>

        <div class="grid grid-cols-5 gap-1 text-[10px] font-black opacity-90 mt-4 uppercase tracking-tighter">
            <div>Subhi<br><span class="text-yellow-400 text-xs">05:15</span></div>
            <div>Duhar<br><span class="text-xs">12:38</span></div>
            <div>Asr<br><span class="text-xs">03:58</span></div>
            <div>Maghrib<br><span class="text-xs">06:39</span></div>
            <div>Isha<br><span class="text-xs">07:49</span></div>
        </div>
    </div>

    <div class="p-5" id="list"></div>

    <div class="footer-contact">
        <p class="uppercase tracking-widest text-[10px] mb-2">Technical Support</p>
        <p class="text-gray-200 font-bold text-lg">Abdul Kareem Falili AL-jalali</p>
        <p class="text-sm mt-1">Contact for any technical issues:</p>
        <a href="https://wa.me/919113695271" class="whatsapp-link">
            💬 Chat on WhatsApp
        </a>
        <p class="mt-4 text-[10px] opacity-50">© 2026 Hidayatul Islam Madrasa</p>
    </div>

    <script>
        const PRAYER_TIMES = [
            { id: 'Subhi', h: 5, m: 15 },
            { id: 'Duhar', h: 12, m: 38 },
            { id: 'Asr', h: 15, m: 58 },
            { id: 'Maghrib', h: 18, m: 39 },
            { id: 'Isha', h: 19, m: 49 }
        ];

        function updateTimer() {
            const now = new Date();
            let target = null;
            let name = "";

            for (let p of PRAYER_TIMES) {
                let t = new Date();
                t.setHours(p.h, p.m, 0);
                if (t > now) { target = t; name = p.id; break; }
            }

            if (!target) {
                target = new Date();
                target.setDate(target.getDate() + 1);
                target.setHours(PRAYER_TIMES[0].h, PRAYER_TIMES[0].m, 0);
                name = PRAYER_TIMES[0].id;
            }

            const diff = target - now;
            const hh = Math.floor(diff / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);

            document.getElementById('timer').innerText = 
                `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
            document.getElementById('next-label').innerText = `അടുത്ത ബാങ്ക് (${name}) ഇനി:`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function loadStudents() {
            // നിങ്ങൾ നൽകിയ കൃത്യമായ ക്രമം (Order)
            const students = [
                "Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", 
                "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", 
                "Shakira", "Suhaiba", "Rifa"
            ];
            
            const listDiv = document.getElementById('list');
            const prayers = ["Subhi", "Duhar", "Asr", "Maghrib", "Isha"];

            students.forEach(name => {
                listDiv.innerHTML += `
                    <div class="student-card">
                        <h3 class="font-black text-gray-100 text-lg uppercase tracking-tight">${name}</h3>
                        <div class="prayer-grid">
                            ${prayers.map(p => `<button onclick="submitP('${name}','${p}',this)" class="p-btn">${p}</button>`).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function submitP(n, p, b) {
            if(b.classList.contains('active')) return;
            const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfoB6SzEuo4nrvGKGzdcjrvXLqFCZyu6kKyTa0mG8Gl8yUPMA/formResponse";
            const formData = new FormData();
            formData.append("entry.877237437", n);
            formData.append("entry.330346532", p);

            fetch(FORM_URL, { method: "POST", body: formData, mode: "no-cors" }).then(() => {
                b.classList.add('active'); b.innerText = "✓ " + p;
                alert(`${n}: ${p} രേഖപ്പെടുത്തി!`);
            }).catch(() => alert("Error: Check internet connection."));
        }

        window.onload = loadStudents;
    </script>
</body>
</html>
