<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayatul Islam Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .hidden { display: none; }
        .header-card { background: #065f46; color: white; border-radius: 0 0 35px 35px; padding: 25px 20px; text-align: center; }
        .bottom-nav { background: white; border-top: 1px solid #e5e7eb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 9px; color: #9ca3af; cursor: pointer; flex: 1; font-weight: 800; }
        .nav-item.active { color: #065f46; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
        .p-btn { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 800; width: 100%; }
        .p-btn.active { background: #10b981 !important; color: white !important; }
        .att-btn { padding: 15px 0; border-radius: 10px; font-size: 11px; font-weight: 900; flex: 1; text-align: center; background: #f9fafb; color: #6b7280; border: 1px solid #eee; }
        .p-active { background: #059669 !important; color: white !important; }
        .a-active { background: #dc2626 !important; color: white !important; }
        .res-card { border-left: 5px solid #065f46; cursor: pointer; }
        .subject-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd; }
        .sub-box { background: #f8fafc; padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #edf2f7; }
        .notice-card { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="app-header" class="header-card hidden">
        <h1 class="text-2xl font-black uppercase">Hidayatul Islam</h1>
        <p class="text-[9px] font-bold opacity-80 mb-3">Class 6 - Achangi</p>
        <input type="date" id="global-date" class="bg-[#047857] text-white font-bold p-1 rounded-lg text-xs outline-none" onchange="changeDate(this.value)">
    </div>

    <div id="main-content" class="hidden">
        <div id="home-page" class="p-5">
            <div id="holiday-banner" class="notice-card hidden">
                <p class="font-black text-amber-800 uppercase text-[10px] mb-1">📢 MADRASA NOTICE</p>
                <p id="holiday-reason-text" class="text-sm font-bold text-amber-900"></p>
            </div>
            <div id="admin-holiday-tool" class="card hidden border-emerald-300 bg-emerald-50">
                <textarea id="holiday-reason-input" class="w-full p-3 border rounded-xl text-xs mb-3 outline-none" placeholder="Type reason for leave notice..."></textarea>
                <button onclick="toggleGlobalHoliday()" id="holiday-toggle-btn" class="w-full py-3 rounded-xl text-xs font-black uppercase text-white shadow-md"></button>
            </div>
            <div class="card mt-4 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Azan Timings</p>
                <div class="grid grid-cols-5 gap-1 text-[9px] font-bold uppercase">
                    <div class="bg-gray-50 p-2 rounded-lg">SUBHI<br>05:15</div>
                    <div class="bg-gray-50 p-2 rounded-lg">DUHAR<br>12:38</div>
                    <div class="bg-gray-50 p-2 rounded-lg">ASR<br>03:58</div>
                    <div class="bg-gray-50 p-2 rounded-lg">MAGH<br>06:39</div>
                    <div class="bg-gray-50 p-2 rounded-lg">ISHA<br>07:49</div>
                </div>
            </div>
        </div>

        <div id="results-page" class="p-5 hidden">
            <h2 class="text-center font-black text-emerald-800 uppercase mb-4 tracking-widest">Public Exam Results 2026</h2>
            <input type="text" id="search-results" onkeyup="searchStudent()" placeholder="Search student name..." class="w-full p-4 mb-6 rounded-xl border-none outline-none shadow-sm text-sm">
            <div id="results-list"></div>
        </div>

        <div id="attendance-page" class="p-5 hidden"><div id="attendance-list"></div></div>
        <div id="tracker-page" class="p-5 hidden"><div id="tracker-list"></div></div>
        <div id="history-page" class="p-5 hidden"><div id="history-list"></div></div>
        <div id="profile-page" class="p-5 hidden text-center">
            <div class="card py-10">
                <p id="user-email-text" class="text-xs font-bold text-gray-500 mb-8"></p>
                <button onclick="handleLogout()" class="w-full border-2 border-red-500 text-red-600 font-bold py-3 rounded-xl uppercase text-[10px]">Sign Out</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i>HOME</div>
            <div class="nav-item" onclick="navigate('tracker', this)"><i class="fa-solid fa-clipboard-check"></i>TRACKER</div>
            <div class="nav-item" onclick="navigate('attendance', this)"><i class="fa-solid fa-user-check"></i>ATTEND</div>
            <div class="nav-item" onclick="navigate('results', this)"><i class="fa-solid fa-scroll"></i>RESULTS</div>
            <div class="nav-item" onclick="navigate('history', this)"><i class="fa-solid fa-medal"></i>STATS</div>
            <div class="nav-item" onclick="navigate('profile', this)"><i class="fa-solid fa-user-circle"></i>ME</div>
        </div>
    </div>

    <div id="auth-page" class="p-6 min-h-screen flex flex-col justify-center text-center">
        <div id="login-box" class="card">
            <h2 class="text-xl font-black text-emerald-800 mb-8 uppercase tracking-widest">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] border-none outline-none text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-2 bg-[#f0f4f8] border-none outline-none text-sm">
            <div class="text-right mb-6"><span onclick="handleResetPassword()" class="text-[10px] text-gray-400 font-bold underline cursor-pointer uppercase">Forgot Password?</span></div>
            <button onclick="handleLogin()" class="w-full bg-[#065f46] text-white font-black py-4 rounded-xl mb-4 uppercase shadow-lg">Login</button>
            <p class="text-xs font-bold text-gray-400 uppercase">New User? <span onclick="toggleAuth(true)" class="text-emerald-700 underline cursor-pointer">Create Account</span></p>
        </div>
        <div id="signup-box" class="card hidden">
            <h2 class="text-xl font-black text-blue-800 mb-8 uppercase">Register</h2>
            <input type="email" id="s-email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 bg-[#f0f4f8] border-none outline-none text-sm">
            <input type="password" id="s-pass" placeholder="Create Password" class="w-full p-4 rounded-xl mb-6 bg-[#f0f4f8] border-none outline-none text-sm">
            <button onclick="handleSignUp()" class="w-full bg-blue-800 text-white font-black py-4 rounded-xl mb-4 uppercase">Sign Up</button>
            <p onclick="toggleAuth(false)" class="text-xs font-bold text-gray-400 underline cursor-pointer uppercase">Back to Login</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA39r0TDE8BpdJ4vfOn0T3zvzYLV5ksTY0", authDomain: "hidayatul-islam-traker.firebaseapp.com", projectId: "hidayatul-islam-traker", storageBucket: "hidayatul-islam-traker.firebasestorage.app", messagingSenderId: "82744495268", appId: "1:82744495268:web:afc2f87d3d06884363ea31" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "kereemk81@gmail.com";
        const fullResults = [
            { name: "MUHAMMAD SIFAN", reg: "550211", scores: { "Dur-1": "90 A", "Fiq": "77 B+", "Taj": "84 A", "Dur-2": "69 B", "Quran": "78 B+", "Prac": "92 A+" }, total: 490, remark: "DISTINCTION" },
            { name: "MUHAMMAD YASEEN", reg: "550212", scores: { "Dur-1": "68 B", "Fiq": "68 B", "Taj": "60 C+", "Dur-2": "63 B", "Quran": "72 B+", "Prac": "88 A" }, total: 419, remark: "PASSED" },
            { name: "MUHAMMAD SUHAIR", reg: "550213", scores: { "Dur-1": "80 B+", "Fiq": "76 B+", "Taj": "87 A", "Dur-2": "76 B+", "Quran": "69 B", "Prac": "95 A+" }, total: 483, remark: "DISTINCTION" },
            { name: "MUHAMMAD FAZIL", reg: "550214", scores: { "Dur-1": "81 A", "Fiq": "77 B+", "Taj": "78 B+", "Dur-2": "74 B+", "Quran": "45 C", "Prac": "94 A+" }, total: 449, remark: "PASSED" },
            { name: "TWALHATH", reg: "550215", scores: { "Dur-1": "57 C+", "Fiq": "49 C", "Taj": "52 C+", "Dur-2": "45 C", "Quran": "68 B", "Prac": "98 A++" }, total: 369, remark: "PASSED" },
            { name: "MUHAMMAD DISHAN K.A", reg: "550216", scores: { "Dur-1": "90 A", "Fiq": "89 A", "Taj": "91 A+", "Dur-2": "81 A", "Quran": "80 B+", "Prac": "98 A++" }, total: 529, remark: "DISTINCTION" },
            { name: "RASEENA", reg: "550217", scores: { "Dur-1": "60 C+", "Fiq": "58 C+", "Taj": "40 C", "Dur-2": "54 C+", "Quran": "40 C", "Prac": "98 A++" }, total: 350, remark: "PASSED" },
            { name: "NAFEESATH AIZA", reg: "550218", scores: { "Dur-1": "58 C+", "Fiq": "50 C", "Taj": "52 C+", "Dur-2": "53 C+", "Quran": "47 C", "Prac": "95 A+" }, total: 355, remark: "PASSED" },
            { name: "AFREENA", reg: "550219", scores: { "Dur-1": "76 B+", "Fiq": "76 B+", "Taj": "81 A", "Dur-2": "70 B", "Quran": "70 B", "Prac": "99 A++" }, total: 472, remark: "PASSED" },
            { name: "MISHA FATHIMA", reg: "550220", scores: { "Dur-1": "40 C", "Fiq": "47 C", "Taj": "50 C", "Dur-2": "47 C", "Quran": "44 C", "Prac": "85 A" }, total: 313, remark: "PASSED" },
            { name: "SHAKIRA", reg: "550221", scores: { "Dur-1": "96 A++", "Fiq": "96 A++", "Taj": "95 A+", "Dur-2": "91 A+", "Quran": "80 B+", "Prac": "100 A++" }, total: 558, remark: "DISTINCTION" },
            { name: "FATHIMATH RIFA", reg: "550222", scores: { "Dur-1": "75 B+", "Fiq": "72 B+", "Taj": "75 B+", "Dur-2": "66 B", "Quran": "51 C+", "Prac": "83 A" }, total: 422, remark: "PASSED" },
            { name: "SUHAIBA", reg: "550223", scores: { "Dur-1": "79 B+", "Fiq": "68 B", "Taj": "86 A", "Dur-2": "73 B+", "Quran": "50 C", "Prac": "93 A+" }, total: 449, remark: "PASSED" },
            { name: "KADEEJATHU NILA", reg: "550224", scores: { "Dur-1": "84 A", "Fiq": "70 B", "Taj": "84 A", "Dur-2": "78 B+", "Quran": "71 B+", "Prac": "100 A++" }, total: 487, remark: "DISTINCTION" },
            { name: "FATHIMATH FIDA", reg: "550225", scores: { "Dur-1": "79 B+", "Fiq": "77 B+", "Taj": "80 B+", "Dur-2": "64 B", "Quran": "73 B+", "Prac": "99 A++" }, total: 472, remark: "PASSED" }
        ];

        const students = ["Dishan", "Sifan", "Fazil", "Suhair", "Yaseen", "Twalhath", "Afreena", "Raseena", "Ayizza", "Misha", "Nila", "Fida", "Shakira", "Suhaiba", "Rifa"];
        let selectedDate = new Date().toLocaleDateString('en-CA');
        let globalHoliday = false;

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-page').classList.toggle('hidden', !!u);
            document.getElementById('main-content').classList.toggle('hidden', !u);
            document.getElementById('app-header').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('user-email-text').innerText = u.email;
                if(u.email.toLowerCase() === ADMIN_EMAIL) document.getElementById('admin-holiday-tool').classList.remove('hidden');
                syncHoliday();
            }
        });

        window.navigate = (p, el) => {
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            ['home', 'tracker', 'attendance', 'results', 'history', 'profile'].forEach(pg => document.getElementById(pg+'-page').classList.toggle('hidden', !pg.includes(p)));
            if(p === 'results') loadResults();
            if(p.includes('tracker')) loadTracker();
            if(p.includes('attendance')) loadAttendance();
            if(p.includes('history')) loadHistory();
        };

        window.loadResults = () => {
            const container = document.getElementById('results-list');
            container.innerHTML = fullResults.map((r, i) => `
                <div class="card res-card result-item" onclick="document.getElementById('marks-${i}').classList.toggle('hidden')">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="student-name text-[10px] font-black text-gray-800 uppercase">${r.name}</p>
                            <p class="text-[8px] font-bold ${r.remark === 'DISTINCTION' ? 'text-emerald-600' : 'text-gray-400'}">${r.remark}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black text-emerald-800">${r.total}/600</p>
                        </div>
                    </div>
                    <div id="marks-${i}" class="hidden subject-grid">
                        <div class="sub-box"><p class="text-[7px] text-gray-400 uppercase">Duroosul I</p><p class="text-[10px] font-black">${r.scores['Dur-1']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400 uppercase">Fiqh</p><p class="text-[10px] font-black">${r.scores['Fiq']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400 uppercase">Tajweed</p><p class="text-[10px] font-black">${r.scores['Taj']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400 uppercase">Duroosul II</p><p class="text-[10px] font-black">${r.scores['Dur-2']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400 uppercase">Quran</p><p class="text-[10px] font-black">${r.scores['Quran']}</p></div>
                        <div class="sub-box"><p class="text-[7px] text-gray-400 uppercase">Practical</p><p class="text-[10px] font-black">${r.scores['Prac']}</p></div>
                    </div>
                </div>
            `).join('');
        };

        window.searchStudent = () => {
            let input = document.getElementById('search-results').value.toLowerCase();
            let items = document.getElementsByClassName('result-item');
            for (let i = 0; i < items.length; i++) {
                let name = items[i].querySelector('.student-name').innerText.toLowerCase();
                items[i].style.display = name.includes(input) ? "" : "none";
            }
        };

        // ... Sync Holiday, Auth, Tracker functions remain same as provided code ...
        function syncHoliday() {
            onSnapshot(doc(db, "settings", "madrasa_status"), (snap) => {
                const data = snap.exists() ? snap.data() : { isHoliday: false, reason: "" };
                globalHoliday = data.isHoliday;
                const banner = document.getElementById('holiday-banner');
                if(globalHoliday) { banner.classList.remove('hidden'); document.getElementById('holiday-reason-text').innerText = data.reason; }
                else banner.classList.add('hidden');
                const btn = document.getElementById('holiday-toggle-btn');
                btn.innerText = globalHoliday ? "CANCEL LEAVE NOTICE" : "POST LEAVE NOTICE";
                btn.className = globalHoliday ? "w-full py-3 rounded-xl text-xs font-black uppercase bg-red-600 shadow-md" : "w-full py-3 rounded-xl text-xs font-black uppercase bg-blue-600 shadow-md";
            });
        }
        window.toggleGlobalHoliday = () => {
            const reason = document.getElementById('holiday-reason-input').value;
            if(!globalHoliday && !reason) return alert("Type reason!");
            setDoc(doc(db, "settings", "madrasa_status"), { isHoliday: !globalHoliday, reason: !globalHoliday ? reason : "" });
        };
        window.handleResetPassword = () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Enter email!");
            sendPasswordResetEmail(auth, email).then(() => alert("Reset link sent!")).catch(e => alert(e.message));
        };
        window.changeDate = (val) => { selectedDate = val; navigate('home', null); };
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        window.handleSignUp = () => createUserWithEmailAndPassword(auth, document.getElementById('s-email').value, document.getElementById('s-pass').value).then(() => alert("Success!"));
        window.handleLogout = () => signOut(auth);
        window.toggleAuth = (s) => { document.getElementById('login-box').classList.toggle('hidden', s); document.getElementById('signup-box').classList.toggle('hidden', !s); };
    </script>
</body>
</html>
